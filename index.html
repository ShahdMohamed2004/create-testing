  document.addEventListener('click', function(ev){
    var t = ev.target;
    if(!t || !t.closest) return;
    var head = t.closest('.stu-weak-toggle');
    if(!head) return;
    if(t.tagName==='BUTTON' || t.tagName==='INPUT') return;
    var id = head.getAttribute('data-target');
    if(!id) return;
    var body = document.getElementById(id);
    if(!body) return;
    var ic = head.querySelector('.toggle-ic');
    if(body.style.display==='none'){ body.style.display=''; if(ic) ic.textContent='▼'; }
    else { body.style.display='none'; if(ic) ic.textContent='▶'; }
  }, false);

  // -------------------------------------------------------------
  // Fix 4: Reading Passage Editor (admin/edit tab, per section)
  // Reads/writes cfg.parts[i].secs[j].pass.tx
  // -------------------------------------------------------------
  function injectPassageEditors(){
    try{
      if(typeof S==='undefined' || !S) return;
      if(S.view==='exam' || S.view==='results') return;
      if(typeof gcfg!=='function') return;
      var cfg = gcfg();
      if(!cfg || !cfg.parts) return;

      var esecs = document.querySelectorAll('.esec');
      if(!esecs.length) return;

      var idx = 0;
      cfg.parts.forEach(function(part, pi){
        (part.secs||[]).forEach(function(sec, si){
          var esec = esecs[idx++];
          if(!esec) return;
          var isReading = (part.id==='reading') || (sec.pass && typeof sec.pass.tx==='string');
          if(!isReading) return;

          var headerRow = esec.parentElement;
          if(!headerRow || !headerRow.parentElement) return;
          var sib = headerRow.nextElementSibling;
          if(sib && sib.classList && sib.classList.contains('passage-editor-mount')) return;

          var passT = (sec.pass && sec.pass.t) || ('Reading Passage — '+(sec.ttl||''));
          var passTx = (sec.pass && sec.pass.tx) || '';
          var titleId = 'pass-title-'+pi+'-'+si;
          var bodyId  = 'pass-body-'+pi+'-'+si;
          var statusId = 'pass-status-'+pi+'-'+si;
          var mount = document.createElement('div');
          mount.className = 'passage-editor-mount';
          mount.style.cssText = 'background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.28);border-radius:9px;padding:11px;margin:6px 0 10px;';
          mount.innerHTML =
              '<details open style="margin:0;">'
            +   '<summary style="cursor:pointer;font-size:11px;font-weight:700;color:#a5b4fc;margin-bottom:6px;list-style:none;">'
            +     '📖 Reading Passage Editor — '+_esc(sec.ttl||'')+' <span style="font-size:9px;opacity:.65;">(click to collapse)</span>'
            +   '</summary>'
            +   '<div style="margin-top:8px;">'
            +     '<div style="margin-bottom:8px;"><label style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px;">Passage Title</label>'
            +     '<input type="text" id="'+titleId+'" value="'+_esc(passT)+'" style="width:100%;padding:7px 9px;font-size:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#f1f5f9;"></div>'
            +     '<div><label style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px;">Passage Text (shown to students)</label>'
            +     '<textarea id="'+bodyId+'" data-pi="'+pi+'" data-si="'+si+'" data-titleid="'+titleId+'" class="passage-edit-textarea" '
            +     'style="width:100%;min-height:180px;padding:9px;font-size:12px;font-family:inherit;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#f1f5f9;line-height:1.7;resize:vertical;">'+_esc(passTx)+'</textarea></div>'
            +     '<div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">'
            +       '<button type="button" class="btn bgg bsm" data-passage-save="'+pi+'-'+si+'" style="font-size:11px;">💾 Save Passage</button>'
            +       '<span id="'+statusId+'" style="font-size:10px;color:#94a3b8;"></span>'
            +     '</div>'
            +   '</div>'
            + '</details>';
          headerRow.parentElement.insertBefore(mount, headerRow.nextSibling);
        });
      });
    }catch(e){ console.warn('injectPassageEditors', e); }
  }

  function savePassageFromTextareas(){
    try{
      if(typeof gcfg!=='function' || typeof scfg!=='function') return false;
      var cfg = gcfg();
      var changed = false;
      document.querySelectorAll('textarea.passage-edit-textarea').forEach(function(ta){
        var pi = parseInt(ta.getAttribute('data-pi'),10);
        var si = parseInt(ta.getAttribute('data-si'),10);
        var titleId = ta.getAttribute('data-titleid');
        var titleEl = titleId ? document.getElementById(titleId) : null;
        var part = cfg.parts && cfg.parts[pi];
        var sec = part && part.secs && part.secs[si];
        if(!sec) return;
        if(!sec.pass) sec.pass = {t:'', tx:''};
        sec.pass.tx = ta.value;
        if(titleEl) sec.pass.t = titleEl.value;
        changed = true;
      });
      if(changed){ scfg(cfg); }
      return changed;
    }catch(e){ console.warn('savePassageFromTextareas', e); return false; }
  }

  document.addEventListener('click', function(ev){
    var t = ev.target;
    if(!t || !t.closest) return;
    var btn = t.closest('[data-passage-save]');
    if(!btn) return;
    ev.preventDefault();
    var ok = savePassageFromTextareas();
    var key = btn.getAttribute('data-passage-save');
    var status = document.getElementById('pass-status-'+key);
    if(ok){
      if(status){ status.textContent='✅ تم الحفظ'; status.style.color='#4ade80'; }
      if(typeof toast==='function') toast('💾 تم حفظ النص');
    } else {
      if(status){ status.textContent='⚠️ لا يوجد نص للحفظ'; status.style.color='#fbbf24'; }
    }
  }, false);

  // Hook saveAdmin so the global "Save All" also persists passages
  function patchSaveAdmin(){
    if(typeof window.saveAdmin === 'function' && !window.saveAdmin._passagePatched){
      var _origSaveAdmin = window.saveAdmin;
      window.saveAdmin = function(){
        try{ savePassageFromTextareas(); }catch(e){}
        try{ return _origSaveAdmin.apply(this, arguments); }catch(e){ console.warn('saveAdmin', e); }
      };
      window.saveAdmin._passagePatched = true;
    }
  }

  // -------------------------------------------------------------
  // Run all enhancements after every render
  // -------------------------------------------------------------
  function runAllEnhancements(){
    enhanceCEFRBadges();
    injectPerStudentWeakness();
    makeOverallWeaknessCollapsible();
    injectPassageEditors();
    patchSaveAdmin();
  }

  if(typeof window.render === 'function' && !window.render._fixesV5Patched){
    var _origRender = window.render;
    window.render = function(){
      var r;
      try{ r = _origRender.apply(this, arguments); }catch(e){ console.error('render error', e); }
      setTimeout(runAllEnhancements, 30);
      setTimeout(runAllEnhancements, 220);
      return r;
    };
    window.render._fixesV5Patched = true;
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(runAllEnhancements, 100); });
  } else {
    setTimeout(runAllEnhancements, 100);
  }

  var _moTimer = null;
  try{
    var mo = new MutationObserver(function(){
      if(_moTimer) return;
      _moTimer = setTimeout(function(){ _moTimer = null; runAllEnhancements(); }, 250);
    });
    mo.observe(document.body, { childList:true, subtree:true });
  }catch(e){}

  console.log('[patch-block-fixes-v5] installed');
})();
</script>

<!--  PATCH BLOCK: results accordion + cross-device storage hints  -->
<!-- ============================================================ -->
<style id="accordion-patch-style">
.acc-wrap{border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.03);margin:6px 0;overflow:hidden;}
.acc-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;background:rgba(99,102,241,.08);font-size:12px;font-weight:600;color:#e0e7ff;transition:background .15s;}
.acc-head:hover{background:rgba(99,102,241,.16);}
.acc-head .acc-arrow{display:inline-block;transition:transform .2s;font-size:11px;opacity:.7;}
.acc-wrap.open .acc-head .acc-arrow{transform:rotate(90deg);}
.acc-body{display:none;padding:10px 12px;font-size:12px;line-height:1.55;color:#cbd5e1;max-height:60vh;overflow:auto;}
.acc-wrap.open .acc-body{display:block;}
.acc-preview{font-size:11px;color:#94a3b8;font-weight:400;margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%;}
@media print{.acc-body{display:block !important;max-height:none !important;}}
</style>
<script id="accordion-patch-script">
(function(){
  'use strict';
  // Threshold: text longer than this gets collapsed in result views
  var LONG = 220;

  function makeAcc(text, label){
    var wrap = document.createElement('div');
    wrap.className = 'acc-wrap';
    var head = document.createElement('div');
    head.className = 'acc-head';
    var preview = String(text).slice(0, 80).replace(/\s+/g,' ');
    head.innerHTML = '<span><span class="acc-arrow">▶</span> '+(label||'تفاصيل')+'</span>'
                   + '<span class="acc-preview">'+preview+(text.length>80?'…':'')+'</span>';
    var body = document.createElement('div');
    body.className = 'acc-body';
    body.style.whiteSpace = 'pre-wrap';
    body.textContent = text;
    head.addEventListener('click', function(){ wrap.classList.toggle('open'); });
    wrap.appendChild(head); wrap.appendChild(body);
    return wrap;
  }

  function enhance(){
    try{
      // Target answer boxes and AI feedback in the student detail / results view
      var sels = ['.ans-box', '.ai-box', '[data-collapsible]', '.long-text'];
      var nodes = document.querySelectorAll(sels.join(','));
      nodes.forEach(function(n){
        if(n.dataset.accDone === '1') return;
        var txt = n.textContent || '';
        if(txt.length < LONG) return;
        var label = n.classList.contains('ai-box') ? '🤖 AI Feedback' :
                    n.classList.contains('ans-box') ? '📝 Student Answer' : 'Details';
        var acc = makeAcc(txt, label);
        n.parentNode.insertBefore(acc, n);
        n.style.display = 'none';
        n.dataset.accDone = '1';
      });
    }catch(e){ console.warn('accordion enhance failed', e); }
  }

  // Run on every render — debounced
  var t;
  var mo = new MutationObserver(function(){
    clearTimeout(t);
    t = setTimeout(enhance, 200);
  });
  mo.observe(document.body, { childList:true, subtree:true });
  document.addEventListener('DOMContentLoaded', enhance);
  setTimeout(enhance, 500);

  // ── Storage health helper ───────────────────────────────────
  // Cross-device sync requires Supabase (already wired in this app).
  // localStorage is per-browser and per-device by design — it cannot sync.
  // This helper warns the user when local storage is filling up so they
  // can export and clear before it breaks.
  window.checkStorageQuota = function(){
    try{
      var used = 0;
      for(var i=0;i<localStorage.length;i++){
        var k = localStorage.key(i);
        var v = localStorage.getItem(k) || '';
        used += (k.length + v.length) * 2; // UTF-16 approx bytes
      }
      var mb = (used/1048576).toFixed(2);
      // Most mobile browsers give ~5–10 MB per origin
      if(used > 4 * 1024 * 1024){
        try{ if(typeof toast==='function') toast('⚠️ التخزين المحلي قارب على الامتلاء ('+mb+' MB) — صدِّر و امسح القديم', true); }catch(e){}
      }
      return { bytes: used, mb: mb };
    }catch(e){ return null; }
  };
  setTimeout(function(){ try{ window.checkStorageQuota(); }catch(e){} }, 2500);

  // ── Mobile viewport guard ──
  // Some legacy templates render results in a wide table that overflows on
  // small screens. Make any result container horizontally scrollable so the
  // student row + delete button stay reachable on phones worldwide.
  function fixMobileScroll(){
    var t = document.querySelectorAll('table.rtbl, table.rtb');
    t.forEach(function(tb){
      var p = tb.parentNode;
      if(!p || p.dataset.scrollWrapped === '1') return;
      if(getComputedStyle(p).overflowX === 'auto') { p.dataset.scrollWrapped='1'; return; }
      var w = document.createElement('div');
      w.style.cssText = 'width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;';
      w.dataset.scrollWrapped = '1';
      p.insertBefore(w, tb); w.appendChild(tb);
    });
  }
  setInterval(fixMobileScroll, 1500);

  console.log('[accordion + storage patch] installed');
})();
</script>

<script id="patch-v4-script">
(function(){
  'use strict';

  // ── Helpers ───────────────────────────────────────────────
  function _x(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function _supa(){ try{ return (typeof getSupaClient==='function')?getSupaClient():null; }catch(e){return null;} }
  function _findSub(id){
    try{
      var subs=(typeof gsubs==='function')?gsubs():[];
      var s=subs.find(function(x){return String(x.id)===String(id);});
      if(s) return s;
      var fb=JSON.parse(localStorage.getItem('msa_fb_cache')||'[]');
      return fb.find(function(x){return String(x.id)===String(id);})||null;
    }catch(e){return null;}
  }
  function _saveSub(sub){
    try{
      var subs=(typeof gsubs==='function')?gsubs():[];
      var i=subs.findIndex(function(x){return String(x.id)===String(sub.id);});
      if(i>=0) subs[i]=sub; else subs.push(sub);
      localStorage.setItem('msa_s',JSON.stringify(subs));
    }catch(e){}
  }
  function _toast(msg,bad){ try{ if(typeof toast==='function') toast(msg,!!bad); else alert(msg); }catch(e){alert(msg);} }

  // ── Email feedback panel renderer ─────────────────────────
  window.rEmailFeedbackPanel = function(sub){

    var id=sub.id;
    var email=sub.email||'';
    var prevText=String(sub.examinerFeedbackText||sub.examinerFeedback||'');
    var prevSubj=String(sub.examinerFeedbackSubject||('Your Test Feedback — '+(sub.name||'')));
    var fileInfo='';
    if(sub.examinerFeedbackFileUrl){
      fileInfo='<div class="efp-file-row">📎 <strong>Saved attachment:</strong> '
        +'<a href="'+_x(sub.examinerFeedbackFileUrl)+'" target="_blank" rel="noopener">'
        +_x(sub.examinerFeedbackFileName||'Download file')+'</a></div>';
    } else if(sub.examinerFeedbackFile && sub.examinerFeedbackFile.name){
      fileInfo='<div class="efp-file-row">📎 <em>Local-only attachment:</em> '+_x(sub.examinerFeedbackFile.name)+' (will be uploaded on Send)</div>';
    }
    var emailRow = email
      ? '<div class="efp-row"><label>📧 Recipient (Student Email)</label>'
        +'<input type="email" id="efp-to-'+id+'" value="'+_x(email)+'"></div>'
      : '<div class="efp-no-email">⚠️ هذا الطالب لم يُدخل بريدًا إلكترونيًا عند التسجيل. أدخلي البريد يدويًا أدناه لإرسال الملاحظات.<div style="margin-top:8px;"><input type="email" id="efp-to-'+id+'" placeholder="student@example.com" value=""></div></div>';
    return '<div class="email-fb-panel" id="efp-'+id+'">'
      +'<div class="efp-head">✉️ Send Feedback Email to Student'
        +(sub.examinerFeedbackSentAt?' <span style="font-size:10px;color:#4ade80;font-weight:500;">✅ Last sent: '+_x(new Date(sub.examinerFeedbackSentAt).toLocaleString())+'</span>':'')
      +'</div>'
      +'<div class="efp-body">'
      + emailRow
      +'<div class="efp-row"><label>Subject</label>'
        +'<input type="text" id="efp-subj-'+id+'" value="'+_x(prevSubj)+'"></div>'
      +'<div class="efp-row"><label>Message / Feedback Body</label>'
        +'<textarea id="efp-body-'+id+'" placeholder="اكتبي ملاحظاتك للطالب هنا...">'+_x(prevText)+'</textarea></div>'
      +'<div class="efp-row"><label>📎 Attachment (optional — uploaded to Supabase Storage)</label>'
        +'<input type="file" id="efp-file-'+id+'" style="padding:6px 4px;"></div>'
      + fileInfo
      +'<div class="efp-actions">'
        +'<button class="btn bgg bsm" onclick="sendStudentEmail(\''+id+'\')">📤 Save & Send Email</button>'
        +'<button class="btn bn bsm" onclick="saveStudentFeedbackOnly(\''+id+'\')">💾 Save Only</button>'
        +'<span class="efp-status" id="efp-st-'+id+'"></span>'
      +'</div>'
      +'<div style="font-size:10px;color:#64748b;margin-top:10px;line-height:1.5;">'
        +'الملاحظات تُحفَظ في Supabase وتُربَط بسجل الطالب. الرسالة تُفتَح فعليًا في برنامج البريد الافتراضي عندك (Gmail/Outlook) مع كل البيانات والمرفق جاهزة للإرسال — اضغطي Send من هناك ليصل الإيميل للطالب فعلًا.'
      +'</div>'
      +'</div></div>';
  };

  // ── Save-only (no send) ───────────────────────────────────
  window.saveStudentFeedbackOnly = function(id){
    _commitFeedback(id,false);
  };

  // ── Save + Send via mailto ────────────────────────────────
  window.sendStudentEmail = function(id){
    _commitFeedback(id,true);
  };

  function _commitFeedback(id,andSend){
    var sub=_findSub(id);
    if(!sub){ _toast('Student record not found',true); return; }
    var to   =(document.getElementById('efp-to-'+id)||{}).value||'';
    var subj =(document.getElementById('efp-subj-'+id)||{}).value||'';
    var body =(document.getElementById('efp-body-'+id)||{}).value||'';
    var fileInp=document.getElementById('efp-file-'+id);
    var statusEl=document.getElementById('efp-st-'+id);
    var setStatus=function(t){ if(statusEl) statusEl.textContent=t||''; };
    to=to.trim();
    if(andSend && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)){
      _toast('Please enter a valid recipient email',true); return;
    }
    setStatus('💾 Saving...');
    var file=(fileInp && fileInp.files && fileInp.files[0])||null;

    function finalize(fileUrl,fileName){
      sub.email = sub.email || to;
      sub.examinerFeedbackText    = body;
      sub.examinerFeedbackSubject = subj;
      sub.examinerFeedbackUpdatedAt = new Date().toISOString();
      if(fileUrl){
        sub.examinerFeedbackFileUrl  = fileUrl;
        sub.examinerFeedbackFileName = fileName||'';
      }
      _saveSub(sub);
      // Mirror to Supabase
      try{
        if(typeof fbUpdate==='function'){
          fbUpdate(sub.id,{
            email:sub.email,
            examinerFeedbackText:sub.examinerFeedbackText,
            examinerFeedbackSubject:sub.examinerFeedbackSubject,
            examinerFeedbackFileUrl:sub.examinerFeedbackFileUrl||null,
            examinerFeedbackFileName:sub.examinerFeedbackFileName||null,
            examinerFeedbackUpdatedAt:sub.examinerFeedbackUpdatedAt
          },null);
        }
      }catch(e){}
      if(!andSend){
        sub.examinerFeedbackSentAt=null;
        setStatus('✅ Saved');
        _toast('✅ Feedback saved');
        return;
      }
      // Build & open mailto:
      var bodyOut = body;
      if(sub.examinerFeedbackFileUrl){
        bodyOut += '\n\n----------\n📎 Attachment: '+sub.examinerFeedbackFileName
                +'\nDownload: '+sub.examinerFeedbackFileUrl;
      }
      bodyOut += '\n\n— Examiner';
      var url='mailto:'+encodeURIComponent(to)
            +'?subject='+encodeURIComponent(subj)
            +'&body='+encodeURIComponent(bodyOut);
      sub.examinerFeedbackSentAt=new Date().toISOString();
      _saveSub(sub);
      try{
        if(typeof fbUpdate==='function'){
          fbUpdate(sub.id,{examinerFeedbackSentAt:sub.examinerFeedbackSentAt},null);
        }
      }catch(e){}
      // Open mail client
      var win=window.open(url,'_blank');
      if(!win){ window.location.href=url; }
      setStatus('✅ Saved & email opened — اضغطي Send في برنامج البريد');
      _toast('✉️ Email composer opened — press Send there');
    }

    if(file){
      setStatus('☁️ Uploading attachment to Supabase...');
      var db=_supa();
      if(db){
        var fname='feedback/'+sub.sid+'_'+Date.now()+'_'+file.name.replace(/[^\w.\-]/g,'_');
        // Try 'audio' bucket first (known to exist), then 'feedback'
        var bucket='audio';
        db.storage.from(bucket).upload(fname,file,{contentType:file.type||'application/octet-stream',upsert:true})
          .then(function(up){
            if(up.error){
              // Try alternate bucket
              return db.storage.from('feedback').upload(fname,file,{contentType:file.type||'application/octet-stream',upsert:true})
                .then(function(up2){
                  if(up2.error){ throw up2.error; }
                  bucket='feedback';
                  return up2;
                });
            }
            return up;
          })
          .then(function(){
            var pub=db.storage.from(bucket).getPublicUrl(fname);
            var url=pub && pub.data ? pub.data.publicUrl : '';
            finalize(url,file.name);
          })
          .catch(function(err){
            console.warn('[feedback upload]',err);
            // Fallback: embed as data URL (size-limited)
            var rd=new FileReader();
            rd.onload=function(ev){
              sub.examinerFeedbackFile={name:file.name,type:file.type,size:file.size,data:ev.target.result};
              _saveSub(sub);
              setStatus('⚠️ Cloud upload failed — saved locally');
              finalize('',file.name);
            };
            rd.readAsDataURL(file);
          });
      } else {
        var rd=new FileReader();
        rd.onload=function(ev){
          sub.examinerFeedbackFile={name:file.name,type:file.type,size:file.size,data:ev.target.result};
          _saveSub(sub);
          finalize('',file.name);
        };
        rd.readAsDataURL(file);
      }
    } else {
      finalize(sub.examinerFeedbackFileUrl||'',sub.examinerFeedbackFileName||'');
    }
  }

  // ── Section accordions for big result/admin cards ────────
  var COLLAPSIBLE_TITLES = [
    'Item Analysis',
    'Skill Averages & Class Analysis',
    'Skill Averages',
    'Student Ranking',
    'Weakest',
    'Submissions',
    'Grade Distribution',
    'Weakness',
    'Cover Page',
    'Reading Passage',
    'Speaking Control',
    'Speaking',
    'Anti-Cheat',
    'Audio Playback',
    'Part Timers',
    'Cloud Sync',
    'Faculties',
    'Groups',
    'Rubric',
    'Examiner',
    'Admin',
    'Edit Panel',
    'Cover',
    'Test Statistics',
    'Class Average',
    'Score Overview'
  ];
  var COLLAPSED_BY_DEFAULT_RX = /Item Analysis|Skill Averages|Skill Averages & Class Analysis|Student Ranking|Weakest|Submissions|Grade Distribution|Weakness|Faculties|Groups|Rubric|Anti-Cheat|Cover Page|Reading Passage|Cloud Sync|Audio Playback|Part Timers|Cover/i;

  function _enhanceAccordions(){
    try{
      var view = (typeof S!=='undefined' && S) ? S.view : '';
      var onResults = (view==='results' || view==='admin');
      if(!onResults) return;
      var cards = document.querySelectorAll('.gc');
      cards.forEach(function(card){
        if(card.dataset.collapsibleApplied==='1') return;
        var head = card.querySelector(':scope > .gh');
        var body = card.querySelector(':scope > .gb');
        if(!head || !body) return;
        var h2 = head.querySelector('h2');
        if(!h2) return;
        var title = (h2.textContent||'').trim();
        var match = COLLAPSIBLE_TITLES.some(function(t){ return title.indexOf(t)>=0; });
        if(!match) return;
        card.classList.add('gc-collapsible');
        card.dataset.collapsibleApplied='1';
        // Collapsed by default for big sections
        if(COLLAPSED_BY_DEFAULT_RX.test(title)){
          card.classList.add('gc-collapsed');
        }
        head.addEventListener('click',function(ev){
          // Don't toggle if clicking on a control inside the head
          var tgt = ev.target;
          if(tgt && (tgt.tagName==='INPUT'||tgt.tagName==='SELECT'||tgt.tagName==='BUTTON'||tgt.tagName==='A'||tgt.tagName==='TEXTAREA'||tgt.closest && tgt.closest('button,input,select,a,textarea'))) return;
          card.classList.toggle('gc-collapsed');
        });
      });
    }catch(e){ console.warn('[accordion v4]',e); }
  }
  // Run on every DOM mutation, debounced
  var _t;
  var _mo = new MutationObserver(function(){
    clearTimeout(_t); _t=setTimeout(_enhanceAccordions,150);
  });
  _mo.observe(document.body,{childList:true,subtree:true});
  document.addEventListener('DOMContentLoaded',_enhanceAccordions);
  setTimeout(_enhanceAccordions,400);

  console.log('[patch v4: email feedback + accordions] installed');
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     PATCH v5 — Cuppy fixes (Apr 2026)
     - Speaking timer freeze fix (force restart on speaking phase)
     - Ghost / invalid student cleanup + force-delete fallback
     - Editor sections accordion (Skill Instructions, Audio Section Images, Audio, …)
     - Per-section multiple recording UI for Speaking
     - CSS hardening for action buttons (no overflow / duplicate render)
     ═══════════════════════════════════════════════════════════════════════ -->
<style>
/* Make delete/action cells always render their button cleanly */
.rtbl td button.btn{display:inline-flex;align-items:center;justify-content:center;line-height:1;vertical-align:middle;}

/* Accordion visuals for collapsible cards */
.gc.gc-collapsible > .gh{cursor:pointer;position:relative;user-select:none;}

  content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:14px;color:#94a3b8;transition:transform .2s;
}
.gc.gc-collapsible.gc-collapsed > .gh::after{transform:translateY(-50%) rotate(-90deg);}
.gc.gc-collapsible.gc-collapsed > .gb{display:none !important;}

  border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 9px;}
.sec-rec-row audio{flex:1;height:32px;}
.sec-rec-row .lbl{font-size:11px;color:#cbd5e1;font-weight:600;}
</style>
<script>
(function(){
  'use strict';
  if(window.__patchV5Installed) return;
  window.__patchV5Installed = true;

  // ═════════ 1. ACCORDION — extend titles + wider activation ═════════
  // Expand the v4 accordion list to include the editor titles the user asked
  // about. We re-implement the discovery loop so it covers the admin/edit view.
  var EXTRA_TITLES = [
    'Skill Instructions Editor','Audio Section Images','Audio',
    'Section Images','Skill Access Control','Group Management',
    'Faculty List','Rubric Editor','Cover Page Instructions'
  ];
  var COLLAPSED_DEFAULT_RX = /Skill Instructions Editor|Audio Section Images|🎙️ Audio|Section Images|Rubric Editor|Faculty List|Group Management|Skill Access Control|Cover Page/i;

  function _enhanceV5(){
    try{
      // Activate on results, admin, and any view (we filter by title-match anyway)
      var cards = document.querySelectorAll('.gc');
      cards.forEach(function(card){
        if(card.dataset.collapsibleV5==='1') return;
        var head = card.querySelector(':scope > .gh');
        var body = card.querySelector(':scope > .gb');
        if(!head || !body) return;
        var h2 = head.querySelector('h2');
        if(!h2) return;
        var title = (h2.textContent||'').trim();
        var matched = EXTRA_TITLES.some(function(t){ return title.indexOf(t)>=0; });
        if(!matched) return;
        card.classList.add('gc-collapsible');
        card.dataset.collapsibleV5 = '1';
        if(COLLAPSED_DEFAULT_RX.test(title)){
          card.classList.add('gc-collapsed');
        }
        head.addEventListener('click',function(ev){
          var tgt = ev.target;
          if(tgt && (tgt.tagName==='INPUT'||tgt.tagName==='SELECT'||tgt.tagName==='BUTTON'||tgt.tagName==='A'||tgt.tagName==='TEXTAREA' || (tgt.closest && tgt.closest('button,input,select,a,textarea')))) return;
          card.classList.toggle('gc-collapsed');
        });
      });
    }catch(e){ console.warn('[v5 accordion]',e); }
  }
  var _t5;
  var _mo5 = new MutationObserver(function(){ clearTimeout(_t5); _t5=setTimeout(_enhanceV5,120); });
  _mo5.observe(document.body,{childList:true,subtree:true});
  document.addEventListener('DOMContentLoaded',_enhanceV5);
  setTimeout(_enhanceV5,500);

  // ═════════ 2. SPEAKING TIMER — force-restart guard ═════════
  // The original startTimer is solid, but on certain re-renders S.tInt may
  // already exist (set but stopped) which prevents restart. Patch render() to
  // verify the speaking timer is actually ticking; if not, force a clean start.
  function _ensureSpeakingTimer(){
    try{
      if(typeof S==='undefined' || !S) return;
      if(S.phase!=='speaking' && S.phase!=='taking') return;
      var cfg = (typeof gcfg==='function')?gcfg():null; if(!cfg||!cfg.parts) return;
      var part = cfg.parts[S.pi]; if(!part) return;
      var pid = part.id;
      // For speaking, ensure a timer is running
      if(S.phase==='speaking' && pid==='speaking'){
        var lastTick = window.__lastSpeakingTickTs || 0;
        var now = Date.now();
        if(!S.tInt || (lastTick && (now - lastTick) > 2500)){
          if(typeof startTimer==='function'){
            try{ if(S.tInt){ clearInterval(S.tInt); S.tInt=null; } }catch(e){}
            try{ startTimer(cfg.timers[S.pi] || cfg.timers[3] || 14); }catch(e){}
          }
        }
      }
    }catch(e){ console.warn('[v5 timer]',e); }
  }
  // Tag every tick — wrap setInterval ticks via patching the tick text element
  // We piggyback on the existing #st-timer DOM updates by observing them.
  try{
    var stEl = null;
    setInterval(function(){
      if(!stEl) stEl = document.getElementById('st-timer');
      if(stEl && stEl.textContent && stEl.textContent.indexOf('--')<0){
        window.__lastSpeakingTickTs = Date.now();
      }
    },1000);
  }catch(e){}
  // Wrap render to call our guard after every render
  try{
    if(typeof window.render==='function' && !window.__renderV5Wrapped){
      window.__renderV5Wrapped = true;
      var _origR = window.render;
      window.render = function(){
        var r = _origR.apply(this, arguments);
        try{ setTimeout(_ensureSpeakingTimer, 120); }catch(e){}
        return r;
      };
    }
  }catch(e){}
  // Also poll every 3s as a safety net
  setInterval(_ensureSpeakingTimer, 3000);

  // ═════════ 2.5 PASSWORD EYE TOGGLE — auto-inject on every password input ═════════
  (function(){
    function wrap(inp){
      try{
        if(!inp || inp.dataset.eyeWrapped === '1') return;
        if(inp.type !== 'password') return;
        inp.dataset.eyeWrapped = '1';
        // Wrap input in a relative container so the toggle can sit absolutely
        var wrapper = document.createElement('span');
        wrapper.style.cssText = 'position:relative;display:inline-flex;align-items:center;width:100%;';
        var parent = inp.parentNode;
        if(!parent) return;
        // If parent is already a flex/inline-flex our wrap is OK
        parent.insertBefore(wrapper, inp);
        wrapper.appendChild(inp);
        // Ensure room for the icon
        var prevPad = inp.style.paddingRight;
        if(!prevPad || parseInt(prevPad) < 38) inp.style.paddingRight = '40px';
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.tabIndex = -1;
        btn.title = 'Show / hide password';
        btn.textContent = '👁';
        btn.style.cssText = 'position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;font-size:16px;color:#94a3b8;padding:4px 8px;line-height:1;z-index:5;';
        btn.addEventListener('click', function(ev){
          ev.preventDefault(); ev.stopPropagation();
          if(inp.type === 'password'){ inp.type = 'text'; btn.textContent = '🙈'; }
          else { inp.type = 'password'; btn.textContent = '👁'; }
        });
        wrapper.appendChild(btn);
      }catch(e){}
    }
    function scan(){ try{ document.querySelectorAll('input[type="password"]').forEach(wrap); }catch(e){} }
    scan();
    // Re-scan when DOM changes (gate is rendered dynamically into #m)
    try{
      var mo = new MutationObserver(function(){ scan(); });
      mo.observe(document.body, {childList:true, subtree:true});
    }catch(e){}
    setInterval(scan, 1500);
  })();

  // ═════════ 3. STUCK / GHOST STUDENT CLEANUP ═════════
  // Removes records that are missing id/name (these cause the red
  // "No students to export" error and hidden rows the user can't delete).
  window.cleanGhostStudents = function(silent){
    try{
      var raw = localStorage.getItem('msa_s'); if(!raw) return 0;
      var arr = JSON.parse(raw); if(!Array.isArray(arr)) return 0;
      var before = arr.length;
      var cleaned = arr.filter(function(s){
        if(!s || typeof s!=='object') return false;
        if(!s.id || !s.name) return false;
        var nm = String(s.name).trim();
        if(!nm || nm==='undefined' || nm==='null') return false;
        return true;
      });
      if(cleaned.length !== before){
        localStorage.setItem('msa_s', JSON.stringify(cleaned));
        if(!silent && typeof toast==='function') toast('🧹 Cleaned '+(before-cleaned.length)+' invalid student record(s)');
        if(typeof render==='function') render();
      }
      return before - cleaned.length;
    }catch(e){ console.warn('[cleanGhost]',e); return 0; }
  };
  // Auto-run once on load
  setTimeout(function(){ try{ window.cleanGhostStudents(true); }catch(e){} }, 1500);

  // ═════════ 4. FORCE-DELETE STUDENT — fallback when normal delete fails ═════════
  // Wraps deleteStudentRecord. If the record persists after the call (network
  // error, cloud reject, storage write failure), forces a local + cloud purge
  // and re-renders. Also exposes window.forceDeleteStudent(id).
  window.forceDeleteStudent = function(subId){
    try{
      var raw = localStorage.getItem('msa_s')||'[]';
      var arr = JSON.parse(raw); if(!Array.isArray(arr)) arr=[];
      var before = arr.length;
      arr = arr.filter(function(s){ return s && s.id !== subId; });
      localStorage.setItem('msa_s', JSON.stringify(arr));
      // Also try cloud
      try{
        if(typeof getSupaClient==='function'){
          var sc = getSupaClient();
          if(sc) sc.from('submissions').delete().eq('id', subId).then(function(){}).catch(function(){});
        }
      }catch(e){}
      if(typeof S!=='undefined' && S){ if(S.viewSub===subId) S.viewSub=null; }
      if(typeof render==='function') render();
      if(typeof toast==='function') toast('🗑️ Force-deleted (' + (before-arr.length) + ' record removed)');
      return true;
    }catch(e){ console.error('[forceDelete]',e); return false; }
  };

  // Wrap original deleteStudentRecord with a fallback
  try{
    if(typeof window.deleteStudentRecord === 'function' && !window.__delWrappedV5){
      window.__delWrappedV5 = true;
      var _origDel = window.deleteStudentRecord;
      window.deleteStudentRecord = function(subId, name){
        try{
          // Attempt original first (it will prompt confirmation)
          _origDel.call(this, subId, name);
        }catch(e){ console.warn('[origDel error]',e); }
        // After ~600ms verify removal — if still present, force-delete
        setTimeout(function(){
          try{
            var raw = localStorage.getItem('msa_s')||'[]';
            var arr = JSON.parse(raw);
            var still = Array.isArray(arr) && arr.some(function(s){return s && s.id===subId;});
            if(still){
              if(window.confirm('Normal delete didn\'t take effect. Force-delete this record locally + cloud?\n\nهل تريد فرض حذف هذا السجل محلياً وفي السحابة؟')){
                window.forceDeleteStudent(subId);
              }
            }
          }catch(e){}
        }, 600);
      };
    }
  }catch(e){}

  // ═════════ 5. ADMIN HELPER UI — clear-all-data button ═════════
  // Adds a small toolbar button on the results screen for nuking stuck records.
  function _injectAdminTools(){
    try{
      if(typeof S==='undefined' || !S || S.view!=='results') return;
      if(document.getElementById('v5-clean-btn')) return;
      // Find the results header bar where Excel/PDF buttons live
      var barTarget = document.querySelector('.gc .gh'); if(!barTarget) return;
      // Place the button near the Submissions header
      var headers = document.querySelectorAll('.gc .gh h2');
      var subHead = null;
      headers.forEach(function(h){
        if((h.textContent||'').indexOf('Submissions')>=0) subHead = h.parentElement;
      });
      if(!subHead) return;
      if(subHead.querySelector('#v5-clean-btn')) return;
      var btn = document.createElement('button');
      btn.id = 'v5-clean-btn';
      btn.className = 'btn br bsm';
      btn.style.cssText = 'margin-left:10px;font-size:11px;';
      btn.textContent = '🧹 Clean Ghost Records';
      btn.title = 'Remove invalid / hidden student records causing export errors';
      btn.onclick = function(ev){
        ev.preventDefault(); ev.stopPropagation();
        var n = window.cleanGhostStudents();
        if(!n){ if(typeof toast==='function') toast('No ghost records found ✓'); }
      };
      subHead.appendChild(btn);

      // Hard-reset button — purges ALL submissions locally AND from Supabase
      var rbtn = document.createElement('button');
      rbtn.id = 'v5-reset-all-btn';
      rbtn.className = 'btn br bsm';
      rbtn.style.cssText = 'margin-left:6px;font-size:11px;background:#7f1d1d;border-color:#dc2626;';
      rbtn.textContent = '💥 Reset All Data';
      rbtn.title = 'Permanently delete ALL student submissions (local + cloud) and reset analytics';
      rbtn.onclick = function(ev){
        ev.preventDefault(); ev.stopPropagation();
        var msg1 = 'PERMANENTLY DELETE ALL student submissions?\n\n'
                 + 'This wipes:\n'
                 + '  • All local records (msa_s)\n'
                 + '  • All Supabase rows in submissions\n'
                 + '  • All analytics derived from them\n\n'
                 + 'This CANNOT be undone. Continue?';
        if(!window.confirm(msg1)) return;
        if(!window.confirm('Are you absolutely sure? Type-to-confirm next.')) return;
        var typed = window.prompt('Type RESET to confirm:');
        if(!typed || typed.trim().toUpperCase() !== 'RESET'){
          if(typeof toast==='function') toast('Cancelled — nothing was deleted');
          return;
        }
        try{
          // Local wipe
          var beforeRaw = localStorage.getItem('msa_s') || '[]';
          var before = 0;
          try{ before = JSON.parse(beforeRaw).length || 0; }catch(_){}
          localStorage.setItem('msa_s', '[]');
          // Also clear any cached view state pointing at deleted records
          try{ if(typeof S!=='undefined' && S){ S.viewSub = null; } }catch(_){}
          // Cloud wipe (best-effort)
          var cloudMsg = '';
          try{
            if(typeof getSupaClient === 'function'){
              var sc = getSupaClient();
              if(sc){
                sc.from('submissions').delete().neq('id','__never__')
                  .then(function(res){
                    if(res && res.error){
                      if(typeof toast==='function') toast('Cloud wipe error: '+(res.error.message||'unknown'), true);
                    } else {
                      if(typeof toast==='function') toast('☁️ Cloud submissions deleted');
                    }
                  })
                  .catch(function(err){
                    if(typeof toast==='function') toast('Cloud wipe failed: '+(err && err.message ? err.message : err), true);
                  });
                cloudMsg = ' + cloud wipe queued';
              }
            }
          }catch(_){}
          if(typeof render === 'function') render();
          if(typeof toast === 'function') toast('💥 Reset complete — '+before+' local record(s) removed'+cloudMsg);
        }catch(e){
          if(typeof toast==='function') toast('Reset failed: '+(e && e.message ? e.message : e), true);
        }
      };
      subHead.appendChild(rbtn);
    }catch(e){}
  }
  setInterval(_injectAdminTools, 2000);

  // ═════════ 6. PER-SECTION RECORDING (multiple takes) ═════════
  // Adds a small UI strip below each speaking question that lets the student
  // keep multiple takes (latest one is the submitted answer). Non-destructive:
  // only kicks in for q.tp==='speak' that already has the existing recorder.
  // Storage: S._recBank[qid] = [{ts, blob}], plus we copy the most recent into
  // the existing S.spRecDone[qid] so the rest of the codebase keeps working.
  function _enhanceSpeakerRecorders(){
    try{
      if(typeof S==='undefined' || !S) return;
      if(S.phase!=='speaking') return;
      // Find every speaker recorder block that already exists, and append a takes strip
      var blocks = document.querySelectorAll('[data-speak-rec], .speak-rec, .qb');
      blocks.forEach(function(blk){
        var qid = blk.getAttribute('data-qid') || (blk.id||'').replace(/^qb-/,'');
        if(!qid) return;
        if(blk.querySelector('.sec-rec-list[data-qid="'+qid+'"]')) return;
        // Only attach if there is a record button inside (heuristic)
        var hasRec = blk.querySelector('button,audio');
        if(!hasRec) return;
        // Heuristic: only show on speaking questions
        var cfg = (typeof gcfg==='function')?gcfg():null;
        if(!cfg || !cfg.parts) return;
        var sp = cfg.parts.find(function(p){return p.id==='speaking';});
        if(!sp) return;
        var isSpeakQ = false;
        sp.secs.forEach(function(s){ s.qs.forEach(function(q){ if(q.id===qid && q.tp==='speak') isSpeakQ=true; }); });
        if(!isSpeakQ) return;
        // Create the list container
        S._recBank = S._recBank || {};
        S._recBank[qid] = S._recBank[qid] || [];
        var list = document.createElement('div');
        list.className = 'sec-rec-list';
        list.setAttribute('data-qid', qid);
        list.innerHTML = '<div class="lbl" style="font-size:11px;color:#94a3b8;">🎙️ Your takes (latest is submitted):</div>';
        S._recBank[qid].forEach(function(t,i){
          var row = document.createElement('div');
          row.className = 'sec-rec-row';
          row.innerHTML = '<span class="lbl">Take '+(i+1)+'</span>'
            + '<audio controls preload="metadata" src="'+(t.url||'')+'"></audio>'
            + '<button type="button" class="btn br bsm" style="font-size:10px;padding:3px 8px;" data-rmtake="'+i+'">✕</button>';
          row.querySelector('button').onclick = function(){
            S._recBank[qid].splice(i,1);
            // refresh primary
            var last = S._recBank[qid][S._recBank[qid].length-1];
            if(typeof S.spRecDone === 'object' && S.spRecDone){
              if(last) S.spRecDone[qid] = last.blob;
              else delete S.spRecDone[qid];
            }
            list.remove(); _enhanceSpeakerRecorders();
          };
          list.appendChild(row);
        });
        blk.appendChild(list);
      });
      // Hook the existing recorder finalize: every time S.spRecDone[qid] gets a
      // blob, push a copy into the bank. We poll because intercepting the
      // original recorder is fragile across versions.
      if(!window.__recBankPollerInstalled){
        window.__recBankPollerInstalled = true;
        var lastSig = {};
        setInterval(function(){
          try{
            if(typeof S==='undefined' || !S || !S.spRecDone) return;
            S._recBank = S._recBank || {};
            Object.keys(S.spRecDone).forEach(function(qid){
              var blob = S.spRecDone[qid]; if(!blob) return;
              var sig = blob.size + '_' + (blob.lastModified||0);
              if(lastSig[qid]===sig) return;
              lastSig[qid] = sig;
              S._recBank[qid] = S._recBank[qid] || [];
              try{
                var url = URL.createObjectURL(blob);
                S._recBank[qid].push({ ts: Date.now(), blob: blob, url: url });
              }catch(e){}
              // Refresh UI for that q
              var blk = document.getElementById('qb-'+qid);
              if(blk){
                var existing = blk.querySelector('.sec-rec-list[data-qid="'+qid+'"]');
                if(existing) existing.remove();
              }
              _enhanceSpeakerRecorders();
            });
          }catch(e){}
        }, 1500);
      }
    }catch(e){ console.warn('[v5 recBank]',e); }
  }
  setInterval(_enhanceSpeakerRecorders, 1500);

  console.log('[patch v5: speaking timer + ghost cleanup + accordions + multi-take] installed');
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     PATCH v6 — full-section accordions + IDB image loader + rich captions
     ═══════════════════════════════════════════════════════════════════════ -->
<style>
/* Rich-text styles inside captions */
.media-ctx b, .media-ctx strong{color:#fde68a;font-weight:700;}
.media-ctx i, .media-ctx em{color:#a5f3fc;font-style:italic;}

/* Tip banner above caption editors */
.v6-fmt-tip{font-size:10px;color:#94a3b8;margin:4px 0 6px;padding:5px 8px;background:rgba(59,130,246,.08);border-left:3px solid #3b82f6;border-radius:4px;}
.v6-fmt-tip code{background:rgba(255,255,255,.07);padding:0 4px;border-radius:3px;color:#a5f3fc;}
</style>
<script>
(function(){
  'use strict';
  if(window.__patchV6Installed) return;
  window.__patchV6Installed = true;

  // ═════════ A. RICH-TEXT MARKDOWN FOR CAPTIONS ═════════
  // Supports: **bold**, *italic*, __underline__, ~~strike~~, ==highlight==,
  // `code`, line breaks. Inputs are first HTML-escaped, then markers re-applied
  // as safe tags. Used to replace x(ctx).replace(/\n/g,"<br>") usage.
  function _esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  window.fmtCaption = function(s){
    if(s==null) return '';
    var t = _esc(s);
    // Code spans first (so other markers don't fire inside)
    t = t.replace(/`([^`\n]+)`/g, function(_,c){return '<code>'+c+'</code>';});
    // Bold (**text**) — must come before italic
    t = t.replace(/\*\*([^*\n]+)\*\*/g, '<b>$1</b>');
    // Italic (*text*) — single-asterisk after bold processed
    t = t.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<i>$2</i>');
    // Underline (__text__)
    t = t.replace(/__([^_\n]+)__/g, '<u>$1</u>');
    // Strikethrough (~~text~~)
    t = t.replace(/~~([^~\n]+)~~/g, '<s>$1</s>');
    // Highlight (==text==)
    t = t.replace(/==([^=\n]+)==/g, '<mark>$1</mark>');
    // Line breaks
    t = t.replace(/\n/g, '<br>');
    return t;
  };

  // ═════════ B. IDB IMAGE LOADER — fix invisible section images ═════════
  // The original _safeImgTag returned a placeholder for "__idb__"-prefixed src
  // which means uploaded images larger than localStorage were never displayed
  // to students. This wraps the renderer to insert a real <img> with deferred
  // src injection from IndexedDB.
  if(typeof window._safeImgTag==='function' && !window.__safeImgWrappedV6){
    window.__safeImgWrappedV6 = true;
    var _origSafe = window._safeImgTag;
    window._safeImgTag = function(src, width, alt){
      try{
        if(typeof src==='string' && src.indexOf('__idb__')===0){
          var key = src.substring('__idb__'.length);
          var uid = 'idbimg_' + Math.random().toString(36).slice(2,9);
          var style='display:block;width:100%;height:auto;object-fit:contain;background:rgba(255,255,255,.03);border-radius:var(--rs);min-height:80px;';
          if(width&&width!=='100%') style='display:block;max-width:'+width+';width:'+width+';height:auto;object-fit:contain;background:rgba(255,255,255,.03);border-radius:var(--rs);min-height:80px;';
          // Schedule async fetch from IndexedDB after current paint
          setTimeout(function(){
            try{
              if(typeof idbGetAudio==='function'){
                idbGetAudio(key, function(data){
                  var el = document.getElementById(uid);
                  if(!el) return;
                  if(data){ el.src = data; el.style.background='transparent'; }
                  else{
                    el.outerHTML = '<div style="padding:14px;font-size:12px;color:#f87171;text-align:center;background:rgba(239,68,68,.08);border:1px dashed rgba(239,68,68,.3);border-radius:8px;">⚠️ Image not found in storage ('+_esc(key)+')</div>';
                  }
                });
              }
            }catch(e){ console.warn('[idb img]',e); }
          }, 30);
          return '<img id="'+uid+'" alt="'+_esc(alt||'Section image')+'" style="'+style+'" data-idb-key="'+_esc(key)+'">';
        }
      }catch(e){ console.warn('[v6 safeimg]',e); }
      return _origSafe.apply(this, arguments);
    };
  }

  // Re-render captions to apply rich-text formatting after each render.
  function _enrichCaptions(){
    try{
      var nodes = document.querySelectorAll('.media-ctx:not([data-fmt-v6])');
      nodes.forEach(function(n){
        var raw = n.getAttribute('data-raw');
        if(raw==null){
          // Recover the original text by reversing simple <br>
          raw = n.innerHTML.replace(/<br\s*\/?>/gi,'\n').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"');
          n.setAttribute('data-raw', raw);
        }
        n.innerHTML = window.fmtCaption(raw);
        n.setAttribute('data-fmt-v6','1');
      });
    }catch(e){ console.warn('[v6 caption]',e); }
  }

  // Helper banner for editor caption fields
  function _injectFormatTips(){
    // [v12] Replaced with icon toolbar
    return;
  }

  // ═════════ C. UNIVERSAL ACCORDION — every .gc on edit & results, all closed ═════════
  function _isAdminOrResults(){
    try{
      if(typeof S==='undefined' || !S) return false;
      return S.view==='admin' || S.view==='results';
    }catch(e){ return false; }
  }
  function _enhanceAllCards(){
    try{
      if(!_isAdminOrResults()) return;
      var cards = document.querySelectorAll('.gc');
      cards.forEach(function(card){
        if(card.dataset.collV6==='1') return;
        var head = card.querySelector(':scope > .gh');
        var body = card.querySelector(':scope > .gb');
        if(!head || !body) return;
        // Don't accordionize cards without a real heading
        var h2 = head.querySelector('h2,h1,h3');
        if(!h2) return;
        card.classList.add('gc-collapsible','gc-collapsed');
        card.dataset.collV6 = '1';
        head.addEventListener('click', function(ev){
          var tgt = ev.target;
          if(tgt && (tgt.tagName==='INPUT'||tgt.tagName==='SELECT'||tgt.tagName==='BUTTON'||tgt.tagName==='A'||tgt.tagName==='TEXTAREA' || (tgt.closest && tgt.closest('button,input,select,a,textarea')))) return;
          card.classList.toggle('gc-collapsed');
        });
      });
    }catch(e){ console.warn('[v6 acc]',e); }
  }

  // ═════════ D. WIRE EVERYTHING ═════════
  function _runAll(){
    _enhanceAllCards();
    _enrichCaptions();
    _injectFormatTips();
  }
  var _t6;
  var _mo6 = new MutationObserver(function(){ clearTimeout(_t6); _t6=setTimeout(_runAll,100); });
  _mo6.observe(document.body,{childList:true,subtree:true});
  document.addEventListener('DOMContentLoaded', _runAll);
  setTimeout(_runAll, 600);

  console.log('[patch v6: full accordions + idb image loader + rich captions] installed');
})();
</script>

<style id="patch-block-v8-style">
.media-ctx-above{margin-top:0;margin-bottom:6px;padding:6px 9px;background:rgba(99,102,241,.10);border-left:3px solid #6366f1;border-radius:4px;font-size:12px;color:#e0e7ff;line-height:1.6;}
.media-ctx{margin-top:6px;}
.gc.gc-collapsible{transition:none !important;}
.gc.gc-collapsible > .gh,.gc.gc-collapsible > .gh *{animation:none !important;}
.acc-empty{padding:14px;text-align:center;color:#94a3b8;font-size:12px;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);border-radius:8px;margin:6px 0;}
.skill-tab.skill-locked .skill-tab-tmr{color:#ef4444 !important;}
.skill-tab.skill-locked{opacity:.55;filter:grayscale(.4);}
</style>
<script id="patch-block-v8">
(function(){
'use strict';
if(window.__patchV8Installed) return;
window.__patchV8Installed=true;

// ─────────────── 1. ACCORDION FIX ───────────────
// Disable v5/v6 click handlers via cloning, install ONE delegated handler.
function _v8RebindAccordions(){
 try{
  var cards=document.querySelectorAll('.gc.gc-collapsible');
  cards.forEach(function(card){
   if(card.dataset.v8Acc==='1') return;
   var head=card.querySelector(':scope > .gh');
   if(!head) return;
   // Clone to strip prior listeners (v5/v6 attached duplicate togglers → cancelled out)
   var fresh=head.cloneNode(true);
   head.parentNode.replaceChild(fresh,head);
   card.dataset.v8Acc='1';
  });
 }catch(e){}
}
// Single delegated click for all collapsible cards
document.addEventListener('click',function(ev){
 var head=ev.target.closest && ev.target.closest('.gc.gc-collapsible > .gh');
 if(!head) return;
 var t=ev.target;
 if(t && (t.tagName==='INPUT'||t.tagName==='SELECT'||t.tagName==='BUTTON'||t.tagName==='A'||t.tagName==='TEXTAREA' || (t.closest && t.closest('button,input,select,a,textarea')))) return;
 var card=head.parentElement;
 if(card && card.classList.contains('gc-collapsible')){
  card.classList.toggle('gc-collapsed');
 }
},true);
// Re-bind whenever DOM changes — but throttle and ignore mutations we caused
var _v8AccTimer=null,_v8Suppress=false;
var _v8Mo=new MutationObserver(function(muts){
 if(_v8Suppress) return;
 // Bail if mutations are caption tip insertions only (avoid fight loops)
 if(_v8AccTimer) clearTimeout(_v8AccTimer);
 _v8AccTimer=setTimeout(function(){
  _v8Suppress=true;
  _v8RebindAccordions();
  setTimeout(function(){_v8Suppress=false;},20);
 },180);
});
try{ _v8Mo.observe(document.body,{childList:true,subtree:true}); }catch(e){}
setTimeout(_v8RebindAccordions,800);
setTimeout(_v8RebindAccordions,2000);

// ─────────────── 2. TIMER STATE MACHINE ───────────────
// Run a global tick each second for every skill that has remaining time and
// has been started (S.timers[pid] is set). Lock skills that hit 0; auto-submit
// when ALL are zero.
function _v8GetCfg(){ try{ return (typeof gcfg==='function')?gcfg():null; }catch(e){return null;} }
function _v8Started(pid){
 try{ return S && S.timers && typeof S.timers[pid]==='number'; }catch(e){return false;}
}
function _v8AllExpired(cfg){
 if(!cfg||!cfg.parts) return false;
 return cfg.parts.every(function(p){
  return S._expiredSkills && S._expiredSkills[p.id];
 });
}
function _v8FinalizeAll(){
 try{
  if(window.__v8FinalDone) return;
  window.__v8FinalDone=true;
  if(typeof toast==='function') toast('⏱ Total exam time elapsed — submitting',true);
  if(S && S.tInt){ try{clearInterval(S.tInt);}catch(e){} S.tInt=null; }
  if(typeof showSubmitModal==='function') showSubmitModal();
  else if(typeof submitExam==='function') submitExam();
 }catch(e){ console.warn('[v8 final]',e); }
}
function _v8GlobalTick(){
 try{
  if(typeof S==='undefined' || !S) return;
  if(S.phase!=='taking' && S.phase!=='speaking' && S.phase!=='waiting') return;
  var cfg=_v8GetCfg(); if(!cfg||!cfg.parts) return;
  S._expiredSkills=S._expiredSkills||{};
  S.timers=S.timers||{};
  var anyChange=false;
  cfg.parts.forEach(function(p,idx){
   var pid=p.id;
   if(S._expiredSkills[pid]) return;
   if(!_v8Started(pid)) return;
   // v18 FIX: ONLY the active skill timer counts down. Non-active timers are PAUSED.
   var isActive = (idx===S.pi) && S.tInt;
   if(isActive) return; // active skill is decremented by its own tick
   // Non-active skills: do NOT decrement — timer is paused until student switches in
   return;
   if(S.timers[pid]<=0){
    S._expiredSkills[pid]=true;
    if(typeof auditLog==='function'){try{auditLog('SKILL_EXPIRED_BG',{skill:pid});}catch(e){}}
   }
  });
  // v18: always update tab labels (paused timers still need display refresh)
  cfg.parts.forEach(function(p,idx){
   var pid=p.id;
   var el=document.querySelector('.skill-tab[data-pi="'+idx+'"] .skill-tab-tmr');
   if(!el) return;
   var sec=S.timers[pid];
   if(sec==null) return;
   var m2=Math.floor(sec/60),s2=sec%60;
   el.textContent='⏱ '+(m2<10?'0':'')+m2+':'+(s2<10?'0':'')+s2;
   var tab=el.closest('.skill-tab');
   if(tab && S._expiredSkills[pid]) tab.classList.add('skill-locked');
  });
  // If active skill expired (not just non-active), lock it
  var actPid=cfg.parts[S.pi] && cfg.parts[S.pi].id;
  if(actPid && S.timers[actPid]<=0 && !S._expiredSkills[actPid]){
   S._expiredSkills[actPid]=true;
  }
  // Speaking-specific: when speaking time hits 0, force-stop the speaking timer
  // (the normal startTimer auto-handles this for taking phase, but speaking
  // sometimes uses S._spTInts which never auto-stop)
  if(actPid==='speaking' && S.timers.speaking<=0){
   try{
    if(S.tInt){ clearInterval(S.tInt); S.tInt=null; }
    Object.keys(S._spTInts||{}).forEach(function(qid){
     try{ clearInterval(S._spTInts[qid]); }catch(e){}
     delete S._spTInts[qid];
     if(S._spTOn) S._spTOn[qid]=false;
    });
   }catch(e){}
  }
  if(_v8AllExpired(cfg)){ _v8FinalizeAll(); }
 }catch(e){ console.warn('[v8 tick]',e); }
}
// Start started-skills automatically: when entering 'taking' for first time,
// initialise all skill timers from cfg.timers so they tick down even before
// student visits them.
function _v8SeedTimers(){
 try{
  if(typeof S==='undefined' || !S) return;
  if(S.phase!=='taking' && S.phase!=='speaking') return;
  var cfg=_v8GetCfg(); if(!cfg||!cfg.parts) return;
  S.timers=S.timers||{};
  // v18 FIX: only seed the ACTIVE skill's timer, not all skills at once
  var activePart = cfg.parts[S.pi];
  if(activePart && typeof S.timers[activePart.id]!=='number'){
   var mins=(cfg.timers && cfg.timers[S.pi]) || 30;
   S.timers[activePart.id]=Math.floor(mins*60);
  }
 }catch(e){}
}
setInterval(function(){ _v8SeedTimers(); _v8GlobalTick(); },1000);

// ─────────────── 3. TEST STATISTICS — empty-subset guard ───────────────
if(typeof window.calcStats==='function' && !window.__statsWrapV8){
 window.__statsWrapV8=true;
 var _origStats=window.calcStats;
 window.calcStats=function(subs,cfg){
  if(!subs || !subs.length){
   return {n:0,mean:0,sd:0,median:0,max:0,min:0,
    skillAvg:{reading:0,listening:0,writing:0,speaking:0},
    receptive:0,productive:0,groupMeans:{},items:[],alpha:0,tots:[],_empty:true};
  }
  return _origStats.apply(this,arguments);
 };
}
// Render-time decoration: when the stat-box appears with _empty stats, replace
// content with a "No data" hint. We detect by the fact that all numeric
// statItems will read 0.0 — instead, we observe the box and inject a banner
// when the underlying subs is empty.
function _v8DecorateStats(){
 try{
  if(typeof S==='undefined' || S.view!=='results') return;
  var cfg=_v8GetCfg(); if(!cfg) return;
  var allLocal=(typeof gsubs==='function')?gsubs():[];
  var fbCache=[]; try{ fbCache=JSON.parse(localStorage.getItem('msa_fb_cache')||'[]'); }catch(e){}
  var allSubs=allLocal.slice();
  fbCache.forEach(function(fs){ if(!allSubs.find(function(ls){return ls.id===fs.id;})) allSubs.push(fs); });
  var subs=S.resGrp==='All'?allSubs:allSubs.filter(function(s){return(s.grp||'?')==S.resGrp;});
  if(subs.length>0) return;
  var box=document.querySelector('.stat-box');
  if(!box || box.dataset.v8NoData==='1') return;
  box.dataset.v8NoData='1';
  // Replace numeric grid with a hint, keep header
  var head=box.querySelector('h4');
  box.innerHTML='';
  if(head) box.appendChild(head);
  var hint=document.createElement('div');
  hint.className='acc-empty';
  hint.style.cssText='padding:18px;text-align:center;color:#94a3b8;font-size:13px;background:rgba(148,163,184,.06);border:1px dashed rgba(148,163,184,.2);border-radius:8px;margin-top:10px;';
  hint.innerHTML='📭 <strong style="color:#cbd5e1;">No submissions for this section.</strong><br><span style="font-size:11px;color:#64748b;">Statistics will appear once students submit results in this group.</span>';
  box.appendChild(hint);
 }catch(e){}
}
setInterval(_v8DecorateStats,800);

console.log('[patch v8: accordion + global timer + stats guard + caption-above] installed');
})();
</script>
