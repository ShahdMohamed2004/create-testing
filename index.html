<script id="patch-v16-js">
(function(){
  "use strict";
  if(window.__patchV16Installed) return;
  window.__patchV16Installed = true;

  var MAX_RERECORDS_PER_CLIP = 2;
  var DEFAULT_SP2_CLIPS = 2;

  // Decide how many clips this question requires.
  // 1) cfg.spClipCount[qid]  (admin override)
  // 2) q.recCount             (per-question setting)
  // 3) default 2 for sp2 questions, 1 otherwise
  function _clipCount(q){
    try{
      var cfg = (typeof gcfg==="function") ? gcfg() : null;
      if(cfg && cfg.spClipCount && cfg.spClipCount[q.id]>0) return +cfg.spClipCount[q.id];
    }catch(e){}
    if(q && q.recCount && +q.recCount>0) return +q.recCount;
    if(q && typeof q.id==="string" && /^sp2/i.test(q.id)) return DEFAULT_SP2_CLIPS;
    return 1;
  }
  function _clipQid(qid, idx){ return qid + "__c" + idx; }
  function _isClipQid(k){ return /__c\d+$/.test(k); }
  function _baseQid(k){ return k.replace(/__c\d+$/,""); }

  function _ordinal(n){
    return ["first","second","third","fourth","fifth","sixth"][n] || ("#"+(n+1));
  }
  function _pictureWord(n){
    var ord = ["first","second","third","fourth","fifth","sixth"][n] || ("#"+(n+1));
    return ord;
  }

  // ── Render N clip slots for a multi-clip speaking question ─────────
  function _renderMultiClip(q, a, n){
    if(typeof S==="undefined" || !S) return "";
    if(!S.spClipsReRec) S.spClipsReRec = {};
    if(!S.spClipsReRec[q.id]) S.spClipsReRec[q.id] = [];

    var html = '<div class="sp-box sp-rec" style="background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.25);">'
      + '<div class="sp-lbl" style="color:#c4b5fd;">🎙️ Self-Recording Mode — '+n+' recordings required</div>'
      + '<div class="v16-clip-prompt">📌 You chose <strong>'+n+' pictures</strong>. '
      + 'Please record <strong>once for each picture</strong> — record once for the <strong>first picture you chose</strong>, '
      + 'then record again for the <strong>second picture you chose</strong>'
      + (n>2 ? ', and so on for the rest' : '')
      + '. Each recording allows up to <strong>'+MAX_RERECORDS_PER_CLIP+' re-record attempts</strong>.</div>';

    // Find which clip is "next" — first one without a recording
    var nextIdx = -1;
    for(var i=0;i<n;i++){
      if(!(S.spRecDone && S.spRecDone[_clipQid(q.id,i)])){ nextIdx=i; break; }
    }

    for(var i=0;i<n;i++){
      var vqid = _clipQid(q.id, i);
      var dur  = (S.spDur && S.spDur[vqid])||0;
      var done = S.spRecDone && S.spRecDone[vqid];
      var isRec= S.spRec && S.spRec[vqid];
      var used = (S.spClipsReRec[q.id][i])||0;
      var lockedNotYet = (i>0) && nextIdx>=0 && i>nextIdx;  // gate next-after-next

      html += '<div class="v16-clip-card'+(lockedNotYet?' v16-clip-locked':'')+'">'
        + '<div class="v16-clip-head">🎬 Recording '+(i+1)+' / '+n
        + ' <span style="font-weight:400;color:#94a3b8;">— for the '+_pictureWord(i)+' picture you chose</span>';
      if(done) html += ' <span class="v16-clip-done">✅ Saved ('+_fmtDur(dur)+')</span>';
      html += '</div>';

      if(lockedNotYet){
        html += '<div style="font-size:11px;color:#94a3b8;">⏳ Finish the previous recording first.</div>';
      } else if(!done){
        if(!isRec){
          html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
            + '<button class="btn bgg" onclick="startRec(\''+vqid+'\')">⏺ Start Recording</button>'
            + '<span style="font-size:11px;color:#94a3b8;">Press to record your answer for the '+_pictureWord(i)+' picture</span>'
            + '</div>';
        } else {
          html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
            + '<button class="btn br" onclick="stopRec(\''+vqid+'\')">⏹ Stop Recording</button>'
            + '<span class="rec-dot" id="rtim-'+vqid+'" style="font-size:12px;">● REC '+_fmtDur(dur)+'</span>'
            + '</div>';
        }
      } else {
        var leftN = Math.max(0, MAX_RERECORDS_PER_CLIP - used);
        html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
          + '<audio controls src="'+done+'" style="height:30px;filter:invert(.75) hue-rotate(175deg);"></audio>'
          + (leftN>0
              ? '<button class="btn bo bsm" onclick="window.__v16ReRec(\''+q.id+'\','+i+')">↺ Re-record</button>'
                + '<span class="v16-rerec-info">'+leftN+' attempt'+(leftN===1?'':'s')+' left</span>'
              : '<span class="v16-rerec-info" style="color:#fca5a5;">⛔ No re-records left</span>')
          + '</div>';
      }
      html += '</div>';

      // After a saved clip, prompt the student to record the next one
      if(done && i<n-1 && (i+1)===nextIdx){
        // already covered by next iteration's card label
      }
      if(done && (i+1)<n && !(S.spRecDone && S.spRecDone[_clipQid(q.id,i+1)])){
        html += '<div class="v16-clip-prompt" style="color:#34d399;border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.08);">'
          + '✅ Recording '+(i+1)+' saved. Now please record your answer for the <strong>'
          + _pictureWord(i+1)+' picture you chose</strong>.</div>';
      }
    }

    // Optional notes (kept compatible with existing scoring)
    html += '<textarea class="essa" style="min-height:50px;" id="sp-'+q.id
      +'" placeholder="Notes (optional)…" oninput="setAns(\''+q.id+'\',this.value)">'
      + (a||"") + '</textarea>';

    html += '</div>';
    return html;
  }

  function _fmtDur(s){
    s = +s||0;
    var m = Math.floor(s/60), x = s%60;
    return (m<10?"0":"")+m+":"+(x<10?"0":"")+x;
  }

  // Re-record handler with per-clip cap (independent of single-clip cap)
  window.__v16ReRec = function(qid, idx){
    try{
      if(!S.spClipsReRec) S.spClipsReRec={};
      if(!S.spClipsReRec[qid]) S.spClipsReRec[qid]=[];
      var used = S.spClipsReRec[qid][idx]||0;
      if(used >= MAX_RERECORDS_PER_CLIP){
        alert("⚠️ You have used all "+MAX_RERECORDS_PER_CLIP+" re-record attempts for this recording.");
        return;
      }
      var left = MAX_RERECORDS_PER_CLIP - used;
      if(!window.confirm("Are you sure you want to re-record this clip?\n\nYou have "+left+" attempt"+(left===1?"":"s")+" left.\nThe current recording will be deleted.")) return;
      S.spClipsReRec[qid][idx] = used+1;
      var vqid = _clipQid(qid, idx);
      if(typeof reRec==="function") reRec(vqid);
      else { delete S.spRecDone[vqid]; S.spRec[vqid]=false; S.spDur[vqid]=0; if(typeof render==="function") render(); }
    }catch(e){ console.warn(e); }
  };

  // ── Override rSpeak to dispatch into multi-clip when needed ────────
  if(typeof window.rSpeak === "function" && !window.__rSpeakV16){
    window.__rSpeakV16 = true;
    var _origRSpeak = window.rSpeak;
    window.rSpeak = function(q, a){
      try{
        var n = _clipCount(q);
        if(n > 1) return _renderMultiClip(q, a, n);
      }catch(e){ console.warn("[v16] rSpeak override fail", e); }
      return _origRSpeak.call(this, q, a);
    };
  }

  // ── Admin: visible bar to edit "Recordings required" for sp2q1 ─────
  function _injectAdminBar(){
    try{
      if(typeof S==="undefined" || !S || S.view!=="admin") return;
      // Place the bar above the Submissions/Results section
      var hostCandidates = document.querySelectorAll("h2, h3, .gc h3, .gc h2, .sec-title");
      var host=null;
      hostCandidates.forEach(function(el){
        if(host) return;
        var t=(el.textContent||"").trim();
        if(/Submissions|Students|Results|Test Statistics/i.test(t)) host=el;
      });
      if(!host) return;
      if(document.getElementById("v16-admin-bar")) return;
      var bar = document.createElement("div");
      bar.id = "v16-admin-bar";
      bar.className = "v16-admin-bar";
      var cfg = (typeof gcfg==="function")?gcfg():{};
      var cur = (cfg.spClipCount && cfg.spClipCount.sp2q1) || DEFAULT_SP2_CLIPS;
      bar.innerHTML = '🎙️ <strong>Speaking Section 2 — Recordings required per student:</strong>'
        + ' <input type="number" min="1" max="6" id="v16-sp2-count" value="'+cur+'">'
        + ' <button class="btn bn bsm" onclick="window.__v16SaveCount()">💾 Save</button>'
        + ' <span style="color:#94a3b8;">(default 2 — one per chosen picture)</span>';
      host.parentNode.insertBefore(bar, host);
    }catch(e){}
  }
  window.__v16SaveCount = function(){
    try{
      var inp = document.getElementById("v16-sp2-count");
      if(!inp) return;
      var n = Math.max(1, Math.min(6, parseInt(inp.value,10)||DEFAULT_SP2_CLIPS));
      var cfg = gcfg();
      if(!cfg.spClipCount) cfg.spClipCount = {};
      cfg.spClipCount.sp2q1 = n;
      scfg(cfg);
      if(typeof toast==="function") toast("✅ Saved — Section 2 now requires "+n+" recording"+(n===1?"":"s"));
      else alert("✅ Saved — "+n+" recording"+(n===1?"":"s"));
    }catch(e){ alert("Save failed: "+e.message); }
  };
  setInterval(_injectAdminBar, 2000);

  // ── Admin viewer: render extra clip players for multi-clip subs ────
  // After each render, for any speaking question with __c clips in sub,
  // append a small "Recordings" strip if it's not already there.
  function _injectAdminClipStrips(){
    try{
      if(typeof S==="undefined" || !S || S.view!=="admin") return;
      // Find all submission cards rendered in admin
      document.querySelectorAll(".acc-q-body, .qb").forEach(function(card){
        if(card.dataset.v16ClipsDone==="1") return;
        // Detect the speaking question id from any audio/play button or rec-block id
        var qid = null;
        var anyEl = card.querySelector("[id^='rec-']");
        if(anyEl){ qid = (anyEl.id.match(/^rec-([\w]+)/)||[])[1]; }
        if(!qid){
          // Try generic data attr or audio src lookup
          var audio = card.querySelector("audio[src*='blob']");
          if(audio && audio.id){
            qid = (audio.id.match(/rplay-([\w]+)/)||[])[1] || null;
          }
        }
        if(!qid) return;
        // Look for matching subs in localStorage
        var subs;
        try{ subs = JSON.parse(localStorage.getItem("msa_s")||"[]"); }catch(e){subs=[];}
        // The card may belong to a single sub — but we don't know which.
        // Safer: search globally for any clip with this qid prefix and append once per visible card.
        // Attach a clip strip showing all recBlobs[qid__c*] across the most recent sub displayed.
        var sub = subs[subs.length-1];
        if(!sub || !sub.recBlobs) return;
        var clips = [];
        Object.keys(sub.recBlobs).forEach(function(k){
          if(k.indexOf(qid+"__c")===0) clips.push({k:k, url:sub.recBlobs[k]});
        });
        if(!clips.length) return;
        clips.sort(function(a,b){return a.k.localeCompare(b.k);});
        var strip = document.createElement("div");
        strip.style.cssText="margin-top:8px;padding:8px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.18);border-radius:6px;";
        strip.innerHTML = '<div style="font-size:11px;font-weight:700;color:#c4b5fd;margin-bottom:6px;">🎙️ All recordings ('+clips.length+')</div>'
          + clips.map(function(c,i){
              return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'
                + '<span style="font-size:11px;color:#94a3b8;min-width:90px;">Picture '+(i+1)+'</span>'
                + '<audio controls src="'+c.url+'" style="height:28px;flex:1;filter:invert(.75) hue-rotate(175deg);"></audio>'
                + '</div>';
            }).join("");
        card.appendChild(strip);
        card.dataset.v16ClipsDone="1";
      });
    }catch(e){}
  }
  // Light, low-frequency to avoid jitter
  setInterval(_injectAdminClipStrips, 2500);

  console.log("[patch v16: speaking section 2 multi-clip] installed");
})();
</script>

        // Wipe local student-related keys (preserve admin config keys)
        var rm = [];
        for(var i=0;i<localStorage.length;i++){
          var k = localStorage.key(i);
          if(k && /student|submission|answer|score|result|exam_state|attempt/i.test(k)) rm.push(k);
        }
        rm.forEach(function(k){ localStorage.removeItem(k); });
      }catch(e){}
      alert('All student data wiped.');
      try{ location.reload(); }catch(e){}
    })();
  }
  window.msaMasterReset = masterReset;

  // ---------- Admin panel injection ----------
  function buildAdminTools(){
    if(document.getElementById('msa-admin-final-tools')) return;
    var gbCards = document.querySelectorAll('#app .gb');
    var host = gbCards.length ? gbCards[gbCards.length - 1] : document.getElementById('app');
    if(!host) return;
    var box = document.createElement('div');
    box.id = 'msa-admin-final-tools';
    box.style.cssText = 'margin:16px 0;padding:16px;border:1px solid var(--gold,#f59e0b);border-radius:12px;background:rgba(255,255,255,.05);position:static;float:none;';
    box.innerHTML = ''+
      '<h3 style="margin:0 0 10px 0;color:#f59e0b;">⚙ Global Admin Tools</h3>'+
      '<label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;">Global Reading Passage (saved to cloud, shown to all students):</label>'+
      '<textarea id="msa-global-reading" rows="8" style="width:100%;background:#0a1428;color:#f1f5f9;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px;font-family:Merriweather,Georgia,serif;"></textarea>'+
      '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">'+
        '<button id="msa-save-reading" style="background:#10b981;color:#fff;border:0;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;">💾 Save Reading to Cloud</button>'+
        '<button id="msa-pull-cfg" style="background:#3b82f6;color:#fff;border:0;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;">⟳ Pull Latest Config</button>'+
        '<button id="msa-master-reset" style="background:#ef4444;color:#fff;border:0;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;margin-left:auto;">🗑 Master Reset (wipe student data)</button>'+
      '</div>'+
      '<div id="msa-admin-status" style="margin-top:8px;font-size:12px;color:#94a3b8;"></div>';
    host.appendChild(box);

    var ta = box.querySelector('#msa-global-reading');
    try{ ta.value = localStorage.getItem('msa_global_reading') || ''; }catch(e){}
    box.querySelector('#msa-save-reading').onclick = async function(){
      try{ localStorage.setItem('msa_global_reading', ta.value || ''); }catch(e){}
      await pushConfig();
      box.querySelector('#msa-admin-status').textContent = '✓ Reading saved to cloud at '+new Date().toLocaleTimeString();
    };
    box.querySelector('#msa-pull-cfg').onclick = async function(){
      await pullConfig();
      try{ ta.value = localStorage.getItem('msa_global_reading') || ta.value; }catch(e){}
      box.querySelector('#msa-admin-status').textContent = '✓ Pulled cloud config at '+new Date().toLocaleTimeString();
    };
    box.querySelector('#msa-master-reset').onclick = masterReset;
  }

  // ---------- UI helpers ----------
  function flash(msg){
    var n = document.createElement('div');
    n.textContent = msg;
    n.style.cssText='position:fixed;bottom:20px;right:20px;background:#0a1428;color:#4ade80;border:1px solid rgba(74,222,128,.4);padding:8px 14px;border-radius:8px;font-size:12px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.4);';
    document.body.appendChild(n);
    setTimeout(function(){ n.style.opacity='0'; n.style.transition='opacity .4s'; }, 1800);
    setTimeout(function(){ try{ n.remove(); }catch(e){} }, 2400);
  }

  // ---------- Wrap legacy submit if present ----------
  function wrapSubmit(){
    if(typeof window.submitExam === 'function' && !window.submitExam.__wrapped){
      var orig = window.submitExam;
      window.submitExam = async function(){
        var r = await orig.apply(this, arguments);
        try{
          var payload = {
            ts: new Date().toISOString(),
            answers: (window.studentAnswers || window._answers || JSON.parse(localStorage.getItem('msa_answers')||'null')),
            writing: (window.writingText || (document.querySelector('#writing-input,[data-writing]')||{}).value),
            audio_url: window.__msaLastSpeakingURL || null,
            student: (window.studentInfo || JSON.parse(localStorage.getItem('msa_student')||'null'))
          };
          await submitToCloud(payload);
        }catch(e){ console.warn(e); }
        return r;
      };
      window.submitExam.__wrapped = true;
    }
  }

  // ---------- Boot ----------
  // v24: ALWAYS pull cfg from Supabase on every page load — cloud is source of truth.
  async function bootPull(){
    try{
      await pullConfig();
      // After pulling, force a re-render so students see latest exam content
      if(typeof render === 'function') setTimeout(render, 80);
      flash('☁ Latest exam config loaded');
    }catch(e){ console.warn('[v24 bootPull]', e); }
  }
  window.addEventListener('load', function(){
    bootPull();
    setTimeout(buildAdminTools, 600);
    setTimeout(buildAdminTools, 2000);
    setTimeout(wrapSubmit, 1500);
  });
  // Also pull when the tab regains focus — catches admin edits made elsewhere
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'visible') bootPull();
  });
  // Re-inject admin tools when admin tab is opened
  document.addEventListener('click', function(e){
    var t = e.target.closest && e.target.closest('#tab-admin, [data-tab="admin"]');
    if(t) setTimeout(buildAdminTools, 250);
  });
})();
</script>

<!-- ══════════════════════════════════════════════════════════════
     PATCH v17 — Session Isolation, Independent Timers,
     Speaking Order, Mic Retry, Soft-Delete Undo, Emergency Backup
     ══════════════════════════════════════════════════════════════ -->
<script>
(function(){
"use strict";

// ════════════════════════════════════════════════════════════
// 1. SESSION ISOLATION — unique localStorage per student
// ════════════════════════════════════════════════════════════
// Generate a per-browser session ID that persists for THIS student only.
// All student answer data is scoped to this ID so two students on
// different browsers never see each other's work.

var _BROWSER_SESSION_KEY = "msa_browser_session_id";
function getBrowserSessionId(){
  var id = localStorage.getItem(_BROWSER_SESSION_KEY);
  if(!id){
    // v25: unique per browser — msa_ + Date.now() + Math.random()
    id = "msa_" + Date.now() + "_" + Math.random().toString(36).slice(2,12);
    localStorage.setItem(_BROWSER_SESSION_KEY, id);
  }
  return id;
}

// Override resumeSession to NOT pull other students' answers from Supabase.
// On refresh, it only reads from the LOCAL draft (msa_draft) which is
// already scoped to the student who was taking the exam on THIS browser.
var _origResumeSession = window.resumeSession;
window.resumeSession = function(){
  try{
    var d = localStorage.getItem("msa_draft");
    if(!d) return;
    var dr = JSON.parse(d);
    // Verify the draft belongs to this browser session
    var currentBSID = getBrowserSessionId();
    if(dr._bsid && dr._bsid !== currentBSID){
      // This draft belongs to a different browser session — discard
      localStorage.removeItem("msa_draft");
      var mr = document.getElementById("modal-root");
      if(mr) mr.innerHTML = "";
      if(typeof render === "function") render();
      return;
    }
    // Proceed with original resume — it only reads localStorage, not Supabase
    _origResumeSession.apply(this, arguments);
  }catch(e){
    localStorage.removeItem("msa_draft");
    var mr2 = document.getElementById("modal-root");
    if(mr2) mr2.innerHTML = "";
    if(typeof render === "function") render();
  }
};

// Patch _draftSaveNow to tag drafts with browser session ID
var _origDraftSaveNow = window._draftSaveNow || null;
(function patchDraftSave(){
  // Find the internal _draftSaveNow and wrap it
  var origSetItem = localStorage.setItem.bind(localStorage);
  var _origLSSet = Storage.prototype.setItem;
  // Simpler approach: override the draft save to include session ID
  // by hooking into the periodic save
  var _patchInterval = setInterval(function(){
    try{
      var raw = localStorage.getItem("msa_draft");
      if(!raw) return;
      var dr = JSON.parse(raw);
      if(!dr._bsid){
        dr._bsid = getBrowserSessionId();
        localStorage.setItem("msa_draft", JSON.stringify(dr));
      }
    }catch(e){}
  }, 2000);
})();

// Prevent fbFetch (Supabase fetch) from overwriting local student answers
// during the "taking" phase. It should only be used for admin/results view.
var _origFbFetch = window.fbFetch;
if(_origFbFetch){
  window.fbFetch = function(onDone){
    if(typeof S !== "undefined" && S && (S.phase === "taking" || S.phase === "waiting" || S.phase === "speaking")){
      // During exam-taking, do NOT fetch other students' data
      if(onDone) onDone(null);
      return;
    }
    return _origFbFetch.apply(this, arguments);
  };
}


// ════════════════════════════════════════════════════════════
// 2. INDEPENDENT TIMERS PER SKILL
// ════════════════════════════════════════════════════════════
// The existing timer system already stores per-skill remaining time in
// S.timers[partId]. The issue is that startTimer/stopTimer share a
// single interval (S.tInt). We ensure that switching skills properly
// saves the current skill's time and starts the new one independently.

// Patch: when switching tabs (skill tabs), properly save current timer
// before starting the new skill's timer.
var _origStartTimer = window.startTimer;
window.startTimer = function(mins){
  // Before starting a new timer, make sure the previous skill's time
  // is properly saved (stopTimer does this)
  if(S.tInt){
    try{
      var cfg = gcfg();
      var currentPid = cfg.parts[S.pi].id;
      // Save current remaining time accurately
      if(S.timers[currentPid] != null && S.timers[currentPid] > 0){
        _timerSaveLive(currentPid, S.timers[currentPid]);
      }
    }catch(e){}
  }
  return _origStartTimer.apply(this, arguments);
};


// ════════════════════════════════════════════════════════════
// 3. SPEAKING SECTION ORDER — Section 1 before Section 2
// ════════════════════════════════════════════════════════════
// Force Speaking to always start at section index 0 (Section 1)
// when entering the speaking phase.

var _origRender = window.render;
window.render = function(){
  try{
    if(typeof S !== "undefined" && S){
      // When entering speaking phase, force Section 1 (si=0)
      if((S.phase === "speaking" || (S.phase === "taking" && S.pi === 3)) && !S._speakingSectionGuarded){
        S._speakingSectionGuarded = true;
        S.si = 0; // Force Section 1
      }
      // Reset guard when leaving speaking
      if(S.pi !== 3){
        S._speakingSectionGuarded = false;
      }
    }
  }catch(e){}
  return _origRender.apply(this, arguments);
};

// Also patch grantSpeakingAccess to ensure Section 1 starts first
var _origGrantSpeaking = window.grantSpeakingAccess;
if(_origGrantSpeaking){
  window.grantSpeakingAccess = function(){
    S.si = 0; // Force Section 1
    S._speakingSectionGuarded = true;
    return _origGrantSpeaking.apply(this, arguments);
  };
}


// ════════════════════════════════════════════════════════════
// 4. SPEAKING MIC ACCESS — Retry button if permissions delayed
// ════════════════════════════════════════════════════════════
var _origStartRec = window.startRec;
window.startRec = function(qid){
  // Try to get mic with a timeout fallback
  var timeoutId = setTimeout(function(){
    // If mic permission is taking too long, show retry UI
    var qb = document.getElementById("qb-" + qid);
    if(!qb) return;
    var existing = document.getElementById("mic-retry-" + qid);
    if(existing) return;
    var retryDiv = document.createElement("div");
    retryDiv.id = "mic-retry-" + qid;
    retryDiv.style.cssText = "background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px;margin-top:8px;text-align:center;";
    retryDiv.innerHTML = '<div style="color:#fca5a5;font-size:12px;margin-bottom:8px;">🎤 Microphone access is pending or blocked.</div>'
      + '<button class="btn bn bsm" onclick="retryMicAccess(\'' + qid + '\')" style="margin-right:6px;">🔄 Retry Mic Access</button>'
      + '<button class="btn bo bsm" onclick="this.parentElement.remove()">✕ Dismiss</button>';
    qb.appendChild(retryDiv);
  }, 5000);

  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    clearTimeout(timeoutId);
    // Remove retry button if it appeared
    var rd = document.getElementById("mic-retry-" + qid);
    if(rd) rd.remove();
    // Release this test stream and call original
    stream.getTracks().forEach(function(t){ t.stop(); });
    _origStartRec(qid);
  }).catch(function(e){
    clearTimeout(timeoutId);
    var qb = document.getElementById("qb-" + qid);
    if(!qb) return;
    var existing = document.getElementById("mic-retry-" + qid);
    if(existing) existing.remove();
    var retryDiv = document.createElement("div");
    retryDiv.id = "mic-retry-" + qid;
    retryDiv.style.cssText = "background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px;margin-top:8px;text-align:center;";
    retryDiv.innerHTML = '<div style="color:#fca5a5;font-size:12px;margin-bottom:8px;">🎤 Microphone access denied: ' + (e.message || "Permission blocked") + '</div>'
      + '<div style="color:#94a3b8;font-size:11px;margin-bottom:8px;">Click the 🔒 icon in your browser address bar → Allow Microphone → then retry.</div>'
      + '<button class="btn bn bsm" onclick="retryMicAccess(\'' + qid + '\')" style="margin-right:6px;">🔄 Retry Mic Access</button>'
      + '<button class="btn bo bsm" onclick="this.parentElement.remove()">✕ Dismiss</button>';
    qb.appendChild(retryDiv);
  });
};

window.retryMicAccess = function(qid){
  var rd = document.getElementById("mic-retry-" + qid);
  if(rd) rd.remove();
  _origStartRec(qid);
};


// ════════════════════════════════════════════════════════════
// 5. DATA INTEGRITY — Students only see THEIR own work
// ════════════════════════════════════════════════════════════
// checkDraft already reads from localStorage (local to this browser).
// Ensure that on refresh during "taking" phase, we don't fetch
// from Supabase. The fbFetch override above handles this.
// Additionally, tag each submission with the browser session ID.

var _origPsub = window.psub;
if(_origPsub){
  window.psub = function(sub){
    if(sub && !sub._bsid) sub._bsid = getBrowserSessionId();
    return _origPsub.apply(this, arguments);
  };
}


// ════════════════════════════════════════════════════════════
// 6. SOFT-DELETE UNDO SYSTEM (Word-like)
// ════════════════════════════════════════════════════════════
var _ARCHIVE_SUBS_KEY = "msa_archived_subs";
var _ARCHIVE_QS_KEY = "msa_archived_qs";

function getArchivedSubs(){
  try{ return JSON.parse(localStorage.getItem(_ARCHIVE_SUBS_KEY) || "[]"); }catch(e){ return []; }
}
function setArchivedSubs(arr){
  try{ localStorage.setItem(_ARCHIVE_SUBS_KEY, JSON.stringify(arr)); }catch(e){}
}
function getArchivedQs(){
  try{ return JSON.parse(localStorage.getItem(_ARCHIVE_QS_KEY) || "[]"); }catch(e){ return []; }
}
function setArchivedQs(arr){
  try{ localStorage.setItem(_ARCHIVE_QS_KEY, JSON.stringify(arr)); }catch(e){}
}

// Override deleteStudentRecord → soft-delete (archive)
window.deleteStudentRecord = function(subId, name){
  if(!window.confirm("⚠️ Warning Shahd: You are about to move this to the Trash. Proceed?\n\nStudent: " + (name || subId))){
    return;
  }
  var subs = gsubs();
  var toArchive = subs.filter(function(s){ return s.id === subId; });
  var remaining = subs.filter(function(s){ return s.id !== subId; });

  if(toArchive.length){
    // Mark as archived and save to archive storage
    var archived = getArchivedSubs();
    toArchive.forEach(function(s){
      s.archived = true;
      s.archivedAt = new Date().toISOString();
      archived.push(s);
    });
    setArchivedSubs(archived);
  }

  try{ localStorage.setItem("msa_s", JSON.stringify(remaining)); }catch(e){ toast("Delete failed", true); return; }
  // Soft-delete from Supabase: update archived flag instead of hard delete
  var sc = getSupaClient();
  if(sc){
    sc.from("submissions").update({archived: true}).eq("id", subId)
      .then(function(){ toast("📦 Moved to Trash (can be restored)"); })
      .catch(function(){ toast("📦 Archived locally"); });
  } else {
    toast("📦 Moved to Trash (can be restored)");
  }
  S.viewSub = null;
  render();
};

// Override deleteQuestion → soft-delete (archive)
window.deleteQuestion = function(pi, si, qi){
  if(!window.confirm("⚠️ Warning Shahd: You are about to move this to the Trash. Proceed?")) return;
  var cfg = gcfg();
  try{
    var q = cfg.parts[pi].secs[si].qs[qi];
    if(q){
      // Archive the question
      var archived = getArchivedQs();
      archived.push({
        question: JSON.parse(JSON.stringify(q)),
        partIndex: pi,
        secIndex: si,
        archivedAt: new Date().toISOString()
      });
      setArchivedQs(archived);
    }
    cfg.parts[pi].secs[si].qs.splice(qi, 1);
    cfg.parts[pi].secs[si].qs.forEach(function(q2, i){ q2.n = i + 1; });
    scfg(cfg);
    toast("📦 Question moved to Trash (can be restored)");
    render();
  }catch(e){ toast("❌ Delete failed: " + e.message, true); }
};


// ════════════════════════════════════════════════════════════
// 7. RESTORE BUTTON (Undo/Restore Deleted Items)
// ════════════════════════════════════════════════════════════
window.showRestorePanel = function(){
  var pw = prompt("🔑 Enter password to access Undo/Restore:");
  if(!pw || pw.trim() !== "238055"){
    if(pw !== null) toast("❌ Incorrect password", true);
    return;
  }

  var archivedSubs = getArchivedSubs();
  var archivedQs = getArchivedQs();

  var mr = document.getElementById("modal-root");
  if(!mr) return;

  var h = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
    + '<div class="modal-box" style="max-width:600px;max-height:80vh;overflow-y:auto;text-align:left;">'
    + '<div style="text-align:center;margin-bottom:14px;">'
    + '<div style="font-size:36px;">🔄</div>'
    + '<h3 style="color:#fbbf24;">Undo / Restore Deleted Items</h3>'
    + '<p style="font-size:11px;color:#94a3b8;">Items moved to Trash can be restored here.</p>'
    + '</div>';

  // Archived Submissions
  h += '<div style="margin-bottom:16px;">'
    + '<h4 style="color:#93c5fd;font-size:13px;margin-bottom:8px;">📋 Archived Student Submissions (' + archivedSubs.length + ')</h4>';
  if(archivedSubs.length === 0){
    h += '<div style="color:#64748b;font-size:12px;padding:8px;">No archived submissions.</div>';
  } else {
    archivedSubs.forEach(function(s, i){
      h += '<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 12px;margin-bottom:4px;">'
        + '<div><span style="font-size:12px;color:#e2e8f0;font-weight:600;">' + (s.name || "Unknown") + '</span>'
        + '<span style="font-size:10px;color:#64748b;margin-left:8px;">ID: ' + (s.sid || s.id) + '</span>'
        + '<span style="font-size:10px;color:#64748b;margin-left:8px;">Archived: ' + (s.archivedAt || "?").slice(0,10) + '</span></div>'
        + '<div style="display:flex;gap:5px;">'
        + '<button class="btn bgg bsm" onclick="restoreArchivedSub(' + i + ')">↩ Restore</button>'
        + '<button class="btn br bsm" onclick="permDeleteArchivedSub(' + i + ')">✕ Permanent</button>'
        + '</div></div>';
    });
  }
  h += '</div>';

  // Archived Questions
  h += '<div style="margin-bottom:16px;">'
    + '<h4 style="color:#93c5fd;font-size:13px;margin-bottom:8px;">❓ Archived Questions (' + archivedQs.length + ')</h4>';
  if(archivedQs.length === 0){
    h += '<div style="color:#64748b;font-size:12px;padding:8px;">No archived questions.</div>';
  } else {
    archivedQs.forEach(function(aq, i){
      var q = aq.question;
      h += '<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 12px;margin-bottom:4px;">'
        + '<div><span style="font-size:12px;color:#e2e8f0;">' + (q.tx || "Question").substring(0, 60) + (q.tx && q.tx.length > 60 ? "..." : "") + '</span>'
        + '<span style="font-size:10px;color:#64748b;margin-left:8px;">Type: ' + (q.tp || "?") + '</span>'
        + '<span style="font-size:10px;color:#64748b;margin-left:8px;">Archived: ' + (aq.archivedAt || "?").slice(0,10) + '</span></div>'
        + '<div style="display:flex;gap:5px;">'
        + '<button class="btn bgg bsm" onclick="restoreArchivedQ(' + i + ')">↩ Restore</button>'
        + '<button class="btn br bsm" onclick="permDeleteArchivedQ(' + i + ')">✕ Permanent</button>'
        + '</div></div>';
    });
  }
  h += '</div>';

  // Restore All buttons
  h += '<div style="display:flex;gap:8px;justify-content:center;border-top:1px solid rgba(255,255,255,.08);padding-top:12px;">';
  if(archivedSubs.length > 0) h += '<button class="btn bgg" onclick="restoreAllSubs()">↩ Restore All Submissions</button>';
  if(archivedQs.length > 0) h += '<button class="btn bn" onclick="restoreAllQs()">↩ Restore All Questions</button>';
  h += '<button class="btn bo" onclick="closeModal()">Close</button>';
  h += '</div></div></div>';

  mr.innerHTML = h;
};

window.restoreArchivedSub = function(idx){
  var archived = getArchivedSubs();
  if(!archived[idx]) return;
  var sub = archived[idx];
  delete sub.archived;
  delete sub.archivedAt;
  psub(sub); // re-add to active submissions
  // Restore in Supabase
  var sc = getSupaClient();
  if(sc){ sc.from("submissions").update({archived: false}).eq("id", sub.id).catch(function(){}); }
  archived.splice(idx, 1);
  setArchivedSubs(archived);
  toast("✅ Submission restored: " + (sub.name || sub.id));
  showRestorePanel(); // refresh the panel
};

window.permDeleteArchivedSub = function(idx){
  if(!window.confirm("⚠️ Warning Shahd: This will PERMANENTLY delete this record. No undo. Proceed?")) return;
  var archived = getArchivedSubs();
  var sub = archived[idx];
  // Hard delete from Supabase
  if(sub){
    var sc = getSupaClient();
    if(sc){ sc.from("submissions").delete().eq("id", sub.id).catch(function(){}); }
  }
  archived.splice(idx, 1);
  setArchivedSubs(archived);
  toast("🗑 Permanently deleted");
  showRestorePanel();
};

window.restoreArchivedQ = function(idx){
  var archived = getArchivedQs();
  if(!archived[idx]) return;
  var aq = archived[idx];
  var cfg = gcfg();
  try{
    var sec = cfg.parts[aq.partIndex].secs[aq.secIndex];
    aq.question.n = sec.qs.length + 1;
    sec.qs.push(aq.question);
    scfg(cfg);
    archived.splice(idx, 1);
    setArchivedQs(archived);
    toast("✅ Question restored");
    showRestorePanel();
    render();
  }catch(e){ toast("❌ Restore failed — section may have changed", true); }
};

window.permDeleteArchivedQ = function(idx){
