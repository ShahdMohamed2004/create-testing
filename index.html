<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSA — English Proficiency Test | TEFL 402</title>
<style>/* Fonts loaded from system */@font-face{font-family:"Merriweather";font-style:normal;font-weight:400 700;src:local("Georgia"),local("serif");}@font-face{font-family:"Inter";font-style:normal;font-weight:300 700;src:local("Segoe UI"),local("system-ui"),local("sans-serif");}</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="window.__supaLoadFailed=true;"></script>
<style>
:root{--r:13px;--rs:8px;--nav:#0a1428;--card:rgba(255,255,255,.055);--bord:rgba(255,255,255,.1);--txt:#f1f5f9;--txt2:#94a3b8;--gold:#f59e0b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;--fs:14px;--fs-q:14px;--fs-h:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1a3050 50%,#0f172a 100%);background-attachment:fixed;color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,.16),transparent);border-radius:50%;top:-200px;left:-200px;filter:blur(80px);pointer-events:none;z-index:0;will-change:transform;animation:ob1 15s ease-in-out infinite;}
body::after{content:'';position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.13),transparent);border-radius:50%;bottom:-200px;right:-200px;filter:blur(80px);pointer-events:none;z-index:0;will-change:transform;animation:ob2 19s ease-in-out infinite;}
@keyframes ob1{0%,100%{transform:translate3d(0,0,0);}50%{transform:translate3d(80px,60px,0);}}
@keyframes ob2{0%,100%{transform:translate3d(0,0,0);}50%{transform:translate3d(-60px,-80px,0);}}
.nav{background:rgba(10,20,40,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bord);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:400;}
.brand{color:#fff;font-weight:700;font-size:14px;}
.brand em{background:linear-gradient(135deg,#f59e0b,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal;}
.tabs{display:flex;gap:3px;}
.tb{background:transparent;border:1px solid transparent;color:rgba(255,255,255,.42);padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all .22s;}
.tb:hover{background:rgba(255,255,255,.08);color:#fff;}
.tb.on{background:linear-gradient(135deg,#d97706,#f59e0b);color:#1e293b;font-weight:700;box-shadow:0 3px 12px rgba(245,158,11,.38);}
.wrap{max-width:920px;margin:0 auto;padding:22px 14px 80px;position:relative;z-index:1;}
.gc{background:var(--card);backdrop-filter:blur(18px);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:15px;}
.gh{background:linear-gradient(135deg,rgba(10,25,55,.97),rgba(15,35,70,.97));color:#fff;padding:13px 19px;border-bottom:1px solid var(--bord);}
.gh h2{font-size:15px;font-family:'Merriweather',serif;}
.gh p{font-size:11px;opacity:.58;margin-top:2px;}
.gb{padding:19px;}
.cov-top{text-align:center;padding:28px 20px 12px;background:linear-gradient(160deg,rgba(8,18,45,.98),rgba(15,35,75,.98));position:relative;overflow:hidden;}
.cov-top::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 65% 35%,rgba(59,130,246,.13),transparent 65%);}
.ci{font-family:'Merriweather',serif;font-size:17px;font-weight:700;color:#f1f5f9;margin-bottom:4px;position:relative;}
.cs{font-size:12px;color:#94a3b8;margin-bottom:3px;position:relative;}
.cc{font-size:11px;font-weight:700;position:relative;background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ct{background:linear-gradient(135deg,rgba(217,119,6,.95),rgba(245,158,11,.95));color:#1e293b;padding:12px 19px;text-align:center;}
.ct h1{font-family:'Merriweather',serif;font-size:15px;font-weight:700;}
.itbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:17px;}
.itbl td{padding:7px 12px;border:1px solid rgba(255,255,255,.07);}
.itbl td:first-child{font-weight:600;background:rgba(255,255,255,.04);color:#cbd5e1;width:38%;}
.itbl td:last-child{color:#e2e8f0;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;font-weight:600;margin-bottom:4px;color:#94a3b8;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.11);border-radius:var(--rs);font-size:13px;font-family:inherit;color:#f1f5f9;transition:all .2s;}
.fg input::placeholder,.fg textarea::placeholder{color:rgba(255,255,255,.26);}
.fg select option{background:#1e293b;color:#f1f5f9;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:rgba(59,130,246,.62);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.fg textarea{resize:vertical;}
.ferr{color:#f87171;font-size:10px;margin-top:3px;display:none;}
input[type="file"]{background:rgba(255,255,255,.05);border:1.5px dashed rgba(255,255,255,.2);border-radius:var(--rs);padding:8px 11px;color:#94a3b8;font-size:12px;cursor:pointer;width:100%;}
input[type="file"]:hover{background:rgba(255,255,255,.08);border-color:rgba(59,130,246,.45);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .22s;white-space:nowrap;}
.btn:active{transform:scale(.95);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
.bn{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;box-shadow:0 3px 11px rgba(59,130,246,.32);}
.bn:hover:not(:disabled){box-shadow:0 5px 17px rgba(59,130,246,.48);transform:translateY(-1px);}
.bg{background:linear-gradient(135deg,#d97706,#f59e0b);color:#1e293b;box-shadow:0 3px 11px rgba(245,158,11,.32);}
.bg:hover:not(:disabled){box-shadow:0 5px 17px rgba(245,158,11,.48);transform:translateY(-1px);}
.bgg{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 3px 11px rgba(16,185,129,.32);}
.bgg:hover:not(:disabled){box-shadow:0 5px 17px rgba(16,185,129,.48);transform:translateY(-1px);}
.br{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 3px 11px rgba(239,68,68,.28);}
.br:hover:not(:disabled){box-shadow:0 5px 17px rgba(239,68,68,.42);transform:translateY(-1px);}
.bp{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;box-shadow:0 3px 11px rgba(139,92,246,.28);}
.bp:hover:not(:disabled){box-shadow:0 5px 17px rgba(139,92,246,.42);transform:translateY(-1px);}
.bo{background:transparent;border:1.5px solid rgba(255,255,255,.22);color:#cbd5e1;}
.bo:hover:not(:disabled){background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.42);}
.bsm{padding:4px 10px;font-size:11px;}
.blg{font-size:14px;padding:11px 24px;}
.pbar{background:rgba(8,18,40,.9);backdrop-filter:blur(12px);border:1px solid var(--bord);border-radius:var(--r);color:#fff;padding:10px 17px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:13px;}
.steps{display:flex;gap:4px;align-items:center;}
.step{position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:10px;font-size:9px;font-weight:500;color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.07);transition:all .4s;cursor:default;}
.step .bulb{font-size:16px;line-height:1;filter:grayscale(1) brightness(.4);transition:all .4s;}
.step .bulb-glow{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,0),rgba(251,191,36,0));transition:all .4s;pointer-events:none;}
.step.done{color:rgba(255,255,255,.65);background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.25);}
.step.done .bulb{filter:grayscale(0) brightness(.75);animation:none;}
.step.done .bulb-glow{background:radial-gradient(circle,rgba(251,191,36,.25),rgba(251,191,36,0));width:26px;height:26px;top:-2px;}
.step.active{background:rgba(251,191,36,.18);border-color:rgba(251,191,36,.55);color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.35);}
.step.active .bulb{filter:grayscale(0) brightness(1.1);animation:glow-pulse 1.5s ease-in-out infinite;}
.step.active .bulb-glow{background:radial-gradient(circle,rgba(251,191,36,.5),rgba(251,191,36,0));width:34px;height:34px;top:-6px;animation:glow-expand 1.5s ease-in-out infinite;}
@keyframes glow-pulse{0%,100%{filter:grayscale(0) brightness(1);drop-shadow(0 0 4px #fbbf24);}50%{filter:grayscale(0) brightness(1.3);}}
@keyframes glow-expand{0%,100%{width:30px;height:30px;opacity:.6;}50%{width:38px;height:38px;opacity:1;}}
.tw{display:flex;align-items:center;gap:10px;}
.tlbl{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:3px 10px;font-size:11px;color:#cbd5e1;}
.timer{font-weight:700;font-size:14px;color:#f1f5f9;font-variant-numeric:tabular-nums;}
.timer.warn{color:#fbbf24;}
.timer.danger{color:#f87171;animation:bl 1s infinite;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:.28;}}
.ibox{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);border-radius:var(--rs);padding:11px 14px;margin-bottom:13px;}
.ibox h4{color:#fbbf24;font-size:12px;font-weight:700;margin-bottom:6px;}
.ibox ul{list-style:none;padding:0;}
.ibox li{font-size:11px;color:#cbd5e1;padding:2px 0 2px 12px;position:relative;line-height:1.5;}
.ibox li::before{content:"➢";position:absolute;left:0;color:#f59e0b;font-size:9px;top:3px;}
.sh{background:linear-gradient(135deg,rgba(30,64,175,.48),rgba(59,130,246,.32));border:1px solid rgba(59,130,246,.22);color:#fff;padding:9px 14px;border-radius:var(--rs);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;}
.sh h3{font-size:13px;font-family:'Merriweather',serif;}
.mb{background:linear-gradient(135deg,#d97706,#f59e0b);color:#1e293b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.pass{background:rgba(255,255,255,.04);border-left:3px solid #f59e0b;border:1px solid rgba(255,255,255,.07);border-left-width:3px;border-left-color:#f59e0b;border-radius:0 var(--rs) var(--rs) 0;padding:13px 16px;margin-bottom:13px;font-size:13px;line-height:1.8;color:#e2e8f0;}
.pass-t{font-family:'Merriweather',serif;font-weight:700;font-size:14px;margin-bottom:10px;color:#fbbf24;}
.abox{background:linear-gradient(135deg,rgba(30,64,175,.44),rgba(37,99,235,.32));border:1px solid rgba(59,130,246,.25);border-radius:var(--r);padding:13px 17px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px;}
.albl{font-weight:600;font-size:12px;color:#e2e8f0;}
.albl small{display:block;opacity:.58;font-size:10px;font-weight:400;margin-top:2px;}
.abtn{background:linear-gradient(135deg,#d97706,#f59e0b);color:#1e293b;border:none;border-radius:15px;padding:7px 15px;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;transition:all .22s;}
.abtn:hover{transform:translateY(-1px);}
@media(hover:none){.abtn:hover,.btn:hover{transform:none;}}
.btn,.abtn{min-height:36px;touch-action:manipulation;}
.bsm{min-height:30px;}
.abtn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
@keyframes loading-bar{0%{background-position:0%}100%{background-position:200%}}
/* ── IMAGE & MEDIA ─────────────────────────────────────── */
.imgb{background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:var(--rs);padding:6px;margin-bottom:12px;overflow:hidden;}
.imgb img,.media-container img{display:block;width:100%;height:auto;object-fit:contain;background:transparent;border-radius:var(--rs);}
.media-grid{display:grid;gap:8px;margin-bottom:10px;}
.media-grid-1,.media-grid-2,.media-grid-3,.media-grid-4{grid-template-columns:1fr;}
.media-container{position:relative;overflow:hidden;border-radius:var(--rs);background:transparent !important;}
.media-ctx{background:rgba(59,130,246,.06);border-top:1px solid rgba(59,130,246,.15);padding:9px 12px;font-size:var(--fs,14px);color:#93c5fd;line-height:1.7;white-space:pre-wrap;}
.imgb img,.media-container img,img{opacity:1 !important;filter:none !important;mix-blend-mode:normal !important;}
/* Upload spinner */
.img-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.qb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--rs);padding:13px;margin-bottom:10px;transition:all .18s;}
.qb:hover{background:rgba(255,255,255,.06);}
.qb.err{border-color:rgba(239,68,68,.58)!important;background:rgba(239,68,68,.07);}
.qb.ok{border-color:rgba(16,185,129,.4);}
.qnum{font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:5px;}
.qreq{color:#f87171;font-size:9px;font-weight:600;margin-left:4px;}
.qtxt{font-size:var(--fs-q,14px);font-weight:500;line-height:1.7;margin-bottom:10px;font-family:'Merriweather',serif;color:#f1f5f9;}

.opts{display:flex;flex-direction:column;gap:6px;}
.opt{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--rs);cursor:pointer;transition:all .18s;font-size:12px;line-height:1.4;color:#e2e8f0;-webkit-user-select:none;user-select:none;}
.opt:hover{background:rgba(255,255,255,.08);border-color:rgba(59,130,246,.32);}
.opt.sel{background:rgba(59,130,246,.16);border-color:rgba(59,130,246,.5);color:#bfdbfe;font-weight:500;}
.odot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.25);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.opt.sel .odot{border-color:#3b82f6;background:#3b82f6;}
.opt.sel .odot::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff;}
.fill{padding:8px 11px;border:1.5px solid rgba(255,255,255,.11);border-radius:var(--rs);font-size:13px;font-family:inherit;width:100%;max-width:380px;background:rgba(255,255,255,.07);color:#f1f5f9;}
.fill::placeholder{color:rgba(255,255,255,.26);}
.fill:focus{outline:none;border-color:rgba(59,130,246,.6);}
.essa{width:100%;padding:9px 11px;border:1.5px solid rgba(255,255,255,.11);border-radius:var(--rs);font-size:13px;font-family:inherit;resize:vertical;min-height:88px;background:rgba(255,255,255,.07);color:#f1f5f9;}
.essa::placeholder{color:rgba(255,255,255,.26);}
.essa:focus{outline:none;border-color:rgba(59,130,246,.6);}
.writa{min-height:155px;}
.wc{font-size:10px;color:#475569;margin-top:3px;}
.sp-box{border-radius:var(--rs);padding:13px;margin-bottom:10px;}
.sp-choose{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);}
.sp-rec{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);}
.sp-exam{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.18);}
.sp-lbl{font-size:11px;font-weight:700;margin-bottom:9px;}
.rec-dot{animation:bl 1s infinite;color:#f87171;}
.pnav{display:flex;justify-content:space-between;align-items:center;padding:15px 0 0;border-top:1px solid rgba(255,255,255,.08);margin-top:11px;}
.psep{background:linear-gradient(135deg,rgba(99,102,241,.24),rgba(59,130,246,.24));border:1px solid rgba(99,102,241,.22);border-radius:var(--r);padding:22px;text-align:center;margin-bottom:15px;}
.psep h2{font-family:'Merriweather',serif;font-size:18px;margin-bottom:7px;}
.psep p{font-size:12px;color:#94a3b8;}
.pgct{text-align:right;font-size:10px;color:#334155;padding:7px 0 0;font-style:italic;}
.page-tracker{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 0 4px;margin-top:8px;border-top:1px solid rgba(255,255,255,.06);}
.page-tracker-badge{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:20px;padding:5px 16px;font-size:12px;font-weight:700;color:#93c5fd;font-family:'Courier New',monospace;letter-spacing:.5px;}
.page-tracker-bar{flex:1;max-width:180px;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.page-tracker-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#818cf8);border-radius:3px;transition:width .4s ease;}
.succ{text-align:center;padding:45px 20px;}
.succ .ico{font-size:56px;display:block;margin-bottom:13px;animation:pop .5s ease;}
@keyframes pop{from{transform:scale(.18);opacity:0;}to{transform:scale(1);opacity:1;}}
.succ h2{font-family:'Merriweather',serif;font-size:21px;margin-bottom:8px;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:15px;}
.scard{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:var(--r);padding:13px;text-align:center;transition:transform .18s;}
.scard:hover{transform:translateY(-2px);}
.sv{font-size:22px;font-weight:700;color:#fbbf24;}
.sl{font-size:10px;color:#64748b;margin-top:3px;}
.chw{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:var(--r);padding:15px;margin-bottom:13px;}
.chw h3{font-size:12px;font-weight:700;margin-bottom:10px;color:#e2e8f0;}
.rtbl{width:100%;border-collapse:collapse;font-size:11px;}
.rtbl th{background:rgba(30,64,175,.44);color:#bfdbfe;padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid rgba(59,130,246,.22);}
.rtbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e1;}
.rtbl tr:hover td{background:rgba(255,255,255,.04);}
.lbdg{display:inline-block;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:700;}
.A1{background:rgba(239,68,68,.22);color:#fca5a5;}.A2{background:rgba(245,158,11,.22);color:#fde68a;}
.B1{background:rgba(6,182,212,.22);color:#a5f3fc;}.B2{background:rgba(16,185,129,.22);color:#a7f3d0;}
.C1{background:rgba(59,130,246,.22);color:#bfdbfe;}.C2{background:rgba(139,92,246,.22);color:#ddd6fe;}
.grpA{background:rgba(59,130,246,.22);color:#bfdbfe;}.grpB{background:rgba(99,102,241,.22);color:#ddd6fe;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:12px;color:#cbd5e1;}
.srow:last-child{border:none;}
.cgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:11px;}
.ccell{padding:8px 3px;border-radius:var(--rs);text-align:center;}
.msin{width:62px;padding:4px 7px;border:1.5px solid rgba(255,255,255,.15);border-radius:var(--rs);font-size:12px;text-align:center;background:rgba(255,255,255,.07);color:#f1f5f9;font-family:inherit;}
.msin:focus{outline:none;border-color:rgba(59,130,246,.6);}
.rtb{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;}
.rtb th{background:rgba(30,64,175,.44);color:#bfdbfe;padding:6px 8px;}
.rtb td{padding:6px 8px;border:1px solid rgba(255,255,255,.07);color:#cbd5e1;}
.rtb tr:nth-child(even) td{background:rgba(255,255,255,.03);}
.ai{padding:8px 12px;border-radius:var(--rs);margin-bottom:6px;font-size:12px;}
.ai.cor{background:rgba(16,185,129,.13);border-left:3px solid #10b981;color:#a7f3d0;}
.ai.wrg{background:rgba(239,68,68,.13);border-left:3px solid #ef4444;color:#fca5a5;}
.ai.man{background:rgba(245,158,11,.1);border-left:3px solid #f59e0b;color:#fde68a;}
.ai.fil{background:rgba(59,130,246,.13);border-left:3px solid #3b82f6;color:#bfdbfe;}

  a1Script:"Receptionist: Good morning. How can I help you today?\nStudent: Good morning. I would like to register for the university library. Someone told me that I need to complete a form first.\nReceptionist: That's right. It's a simple form and it only takes a few minutes. I can help you fill it out if you like.\nStudent: That would be great, thank you.\nReceptionist: First, could you tell me your full name?\nStudent: Yes. My name is Mariam Hassan Ali.\nReceptionist: Thank you, Mariam. Now I need your student ID number.\nStudent: It's 262026.\nReceptionist: Perfect. Which faculty are you studying in?\nStudent: I'm studying in the Faculty of Languages.\nReceptionist: And what year are you in now?\nStudent: I'm currently in my First year.\nReceptionist: Great. I also need a phone number so the library can contact you if necessary.\nStudent: My phone number is 01025098536.\nReceptionist: Thank you. Now, how would you like to receive library notifications? You can choose email or text messages.\nStudent: Email would be more convenient for me.\nReceptionist: No problem. Please read this short statement about the library rules and sign your name at the bottom of the form.\nStudent: Alright, I've read it and signed it.\nReceptionist: Excellent. Your account will be activated within twenty-four hours.\nStudent: That's good to hear. Thank you for your help.\nReceptionist: You're welcome. I hope you enjoy using the library.",
  a2Script:"Student: Good afternoon, Doctor. Do you have a minute? I wanted to ask you something about using artificial intelligence tools in academic research.\nDoctor: Of course. What would you like to discuss?\nStudent: Many students are talking about ChatGPT. Some of them use it to summarize articles or explain difficult topics. I wanted to know if that is acceptable.\nDoctor: That's an important question. AI tools like ChatGPT can be useful for learning, but students must be careful when using them.\nStudent: In what way?\nDoctor: They can help you understand complicated ideas, but they should not replace your own analysis or critical thinking.\nStudent: So it shouldn't be used to write an entire research paper?\nDoctor: Exactly. Academic work must be based on your own understanding and interpretation of reliable sources.\nStudent: Some students also say that AI sometimes gives wrong information.\nDoctor: That can happen. AI systems generate responses based on patterns in data, so the information is not always completely accurate.\nStudent: Then how should students use it responsibly?\nDoctor: It can be used as a starting point for exploring a topic, but you must always verify information by checking academic books, journals, and trusted research databases.\nStudent: That makes sense. I think it can still be helpful if students use it carefully.\nDoctor: I agree. When used responsibly, it can support learning and research.\nStudent: Thank you, Doctor. This conversation really clarified the issue for me.\nDoctor: You're welcome. I'm glad it helped. If you have any other questions about your research, feel free to ask.",

    {id:"rs1",ttl:"Section 1",mx:10,
     pass:{t:"Reading Passage: Technology in Our Daily Lives",tx:"In our daily lives, technology plays a very important role. We wake up to the sound of an alarm on our phone, a device that we carry with us all day. It not only tells us the time but also keeps us connected with friends and family. Through messages and calls, we share news and plan our days.\n\nDuring breakfast, many of us read the news on a tablet or listen to music from a streaming service. The smart fridge in the kitchen tells us when we are running low on milk or eggs. It is clear that gadgets and machines are very helpful in our homes.\n\nWhen we leave the house for work or school, we might use a car that helps us find the way. The GPS system uses satellites to show the best route on a screen. Buses and trains also use technology to run on time and keep passengers safe. It is easy to see that travel has become faster and more comfortable because of technology.\n\nAt work, almost everyone uses a computer to do their tasks. We send emails instead of letters and create documents without using any paper. Meetings are often held through video calls, and this allows people to work together from different places. It saves a lot of time and makes communication easier.\n\nAfter work, many people relax by watching shows on a flat-screen TV or playing games on a console. The internet gives us access to a huge amount of films, songs, and games. We can enjoy these alone or share them with others, even if they are far away.\n\nBefore going to bed, we might read a book on a digital reader that can hold hundreds of books in one place. We set the next day's alarm on our phone and go to sleep. Technology is with us from the moment we wake up until we go to bed. It makes our lives easier and brings us closer to the ones we love."},
     qs:[
      {id:"r1q1",n:1,tp:"mcq",mx:1,tx:"What is the main idea of the passage?",op:["Technology is mainly used for entertainment.","Technology is an important part of daily life and makes life easier.","Technology is mainly used at work."],ans:"B"},
      {id:"r1q2",n:2,tp:"mcq",mx:1,tx:"Which technological device do people often use to wake up in the morning?",op:["The phone alarm","A tablet","A digital reader"],ans:"A"},
      {id:"r1q3",n:3,tp:"mcq",mx:1,tx:"Based on the passage, how has technology changed the way people handle their paperwork at work?",op:["People now spend more time writing letters by hand","People use digital tools to save time and reduce paper use","People no longer need to have meetings with their colleagues"],ans:"B"},
      {id:"r1q4",n:4,tp:"mcq",mx:1,tx:"Which device in the passage helps people know when they are running low on food?",op:["A computer","A smart fridge","A phone"],ans:"B"},
      {id:"r1q5",n:5,tp:"mcq",mx:1,tx:"Choose the following events in the CORRECT ORDER according to the passage.",op:["Setting the alarm → Reading news on tablet → Using computer at work","Reading news on tablet → Setting alarm → Using computer at work","Using computer at work → Reading news → Setting the alarm"],ans:"A"},
      {id:"r1q6",n:6,tp:"mcq",mx:1,tx:"What can we infer about technology and communication from the passage?",op:["Technology makes communication more difficult.","Technology helps people communicate more easily.","Technology replaces communication."],ans:"B"},
      {id:"r1q7",n:7,tp:"mcq",mx:1,tx:"In the sentence \"it not only tells us the time but also keeps us connected,\" the word \"connected\" means:",op:["Being alone and quiet","Staying in touch with friends and family","Travelling to different places"],ans:"B"},

    {id:"rs2",ttl:"Section 2",mx:15,
     pass:{t:"The Second World War",tx:"The Second World War, spanning from 1939 to 1945, stands as the deadliest conflict in human history, with over 50 countries involved. Many historians agree that its roots can be traced to the Treaty of Versailles in 1919. While the treaty ended World War I, its harsh terms, including territorial losses and heavy reparations, left Germany feeling bitter and resentful.\n\nThis resentment, combined with global economic struggles in the 1930s, fueled the rise of dictatorial leaders. Adolf Hitler in Germany, Benito Mussolini in Italy, and Emperor Hirohito in Japan formed a powerful alliance known as the Axis Powers. The war officially began with Hitler's invasion of Poland. The Nazi regime also committed the horrific atrocities of the Holocaust, targeting Jews and other minorities.\n\nInitially, other nations were hesitant to intervene. The turning point came on December 7, 1941, when Japan attacked the U.S. naval base at Pearl Harbor. This act propelled the United States into the war, joining the Allied Powers, which included Great Britain and the Soviet Union. The war featured major battles across Europe, North Africa, and the Pacific. The D-Day invasion of Normandy on June 6, 1944, was a critical moment that led to Germany's surrender on May 7, 1945.\n\nIn the Pacific, the war concluded after the United States dropped atomic bombs on Hiroshima and Nagasaki in August 1945, leading to Japan's surrender on August 14, 1945."},
     qs:[
      {id:"r2q11",n:11,tp:"mcq",mx:1,tx:"What is the main idea of the first paragraph?",op:["Details of the Treaty of Versailles.","The causes and initial outcomes of World War II.","A list of countries that participated in the war."],ans:"B"},
      {id:"r2q12",n:12,tp:"mcq",mx:1,tx:"According to the text, what event led the United States to enter the war?",op:["Germany's invasion of Poland.","Hitler's rise to power.","The attack on Pearl Harbor."],ans:"C"},
      {id:"r2q13",n:13,tp:"mcq",mx:1,tx:"Which of the following countries was part of the \"Axis Powers\"?",op:["France.","Italy.","Great Britain."],ans:"B"},
      {id:"r2q14",n:14,tp:"mcq",mx:1,tx:"The word \"alliance\" in \"formed a powerful alliance\" is closest in meaning to:",op:["A conflict.","A partnership.","A treaty."],ans:"B"},
      {id:"r2q15",n:15,tp:"mcq",mx:1,tx:"What is the best synonym for \"hesitant\" in \"other nations were hesitant to intervene\"?",op:["Eager.","Unsure or slow to act.","Decisive."],ans:"B"},
      {id:"r2q16",n:16,tp:"mcq",mx:1,tx:"How did the Treaty of Versailles affect Germany according to the text?",op:["It made Germany feel peaceful and satisfied.","It made Germany feel bitter and led to more trouble.","It helped Germany become a powerful friend to all nations."],ans:"B"},
      {id:"r2q17",n:17,tp:"mcq",mx:1,tx:"Why did the United States decide to join World War 2?",op:["Because of the attack on Pearl Harbor.","Because Germany surrendered on May 7.","Because of the signing of the Treaty of Versailles."],ans:"A"},
      {id:"r2q18",n:18,tp:"mcq",mx:1,tx:"Which of the following is a FACT according to the passage?",op:["Dropping the atomic bombs was the best decision.","Germany surrendered on May 7, 1945.","Hitler was the worst dictator in history."],ans:"B"},
      {id:"r2q19",n:19,tp:"mcq",mx:1,tx:"What can we conclude about the role of the United States in the war?",op:["The United States joined the war from the beginning.","The United States entered the war after a direct military attack.","The United States refused to participate in the war."],ans:"B"},
      {id:"r2q20",n:20,tp:"mcq",mx:1,tx:"Based on the passage, why was the D-Day invasion important?",op:["It caused the attack on Pearl Harbor.","It led to Germany's eventual surrender.","It ended the war in the Pacific."],ans:"B"},

       {c:"Content (Ideas & Understanding) 60%",m:1.8,d:"1.8 (40–50 Excellent) — Clear YES/NO position with strong, logical, well-supported justification.\n1.35 (30–39 Good) — Clear position with adequate justification.\n0.9 (20–29 Fair) — Position clear but weak justification.\n0.3 (0–19 Poor) — No clear position or unsupported."},

// ══ SCORING ════════════════════════════════════════
function doAutoScore(ans,cfg){
 var sc={};
 cfg.parts.forEach(function(p){p.secs.forEach(function(sec){sec.qs.forEach(function(q){
  if(q.tp==="mcq") sc[q.id]=(ans[q.id]===q.ans)?q.mx:0;
  else if(q.tp==="fill"){var a=(ans[q.id]||"").trim().toLowerCase();sc[q.id]=(q.kw||[]).some(function(k){return a.indexOf(k.toLowerCase())>=0;})?q.mx:0;}
 });});});
 return sc;
}
function calcTot(sub,cfg){
 var aS=sub.aS||{},mS=sub.mS||{};
 var t={reading:0,listening:0,writing:0,speaking:0,pend:false};
 cfg.parts.forEach(function(p){p.secs.forEach(function(sec){sec.qs.forEach(function(q){
  if(!q.mx) return;
  if(q.tp==="mcq"||q.tp==="fill") t[p.id]+=(aS[q.id]||0);
  else if(q.tp==="essay"||q.tp==="write"||q.tp==="speak"||q.tp==="email"||q.tp==="fbpost"||q.tp==="whatsapp"||q.tp==="review"){
   if(mS[q.id]!=null) t[p.id]+=parseFloat(mS[q.id])||0;
   else t.pend=true;
  }
 });});});
 t.total=t.reading+t.listening+t.writing+t.speaking;
 return t;
}

// ══ STATISTICS ═════════════════════════════════════
function calcStats(subs,cfg){
 if(!subs.length) return null;
 var tots=subs.map(function(s){return calcTot(s,cfg);});
 var scores=tots.map(function(t){return t.total;});
 var n=scores.length;
 var mean=scores.reduce(function(a,b){return a+b;},0)/n;
 var variance=scores.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/n;
 var sd=Math.sqrt(variance);
 var sorted=scores.slice().sort(function(a,b){return a-b;});
 var median=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
 // Per-skill averages
 var skills=["reading","listening","writing","speaking"];
 var skillAvg={};
 skills.forEach(function(sk){
  var vs=tots.map(function(t){return t[sk]||0;});
  skillAvg[sk]=vs.reduce(function(a,b){return a+b;},0)/n;
 });
 // Receptive (Listening+Reading) vs Productive (Writing+Speaking)
 var receptive=(skillAvg.reading||0)+(skillAvg.listening||0);
 var productive=(skillAvg.writing||0)+(skillAvg.speaking||0);
 // Per-group means
 var allGroups=cfg.meta&&cfg.meta.groups||["Group A","Group B"];
 var groupMeans={};
 allGroups.forEach(function(g){
  var gSubs=subs.filter(function(s){return(s.grp||"")==g;});
  if(!gSubs.length){groupMeans[g]=null;return;}
  var gTots=gSubs.map(function(s){return calcTot(s,cfg);});
  var gScores=gTots.map(function(t){return t.total;});
  groupMeans[g]=gScores.reduce(function(a,b){return a+b;},0)/gScores.length;
 });
 // MCQ item analysis
 var items=[];
 cfg.parts.forEach(function(p){
  p.secs.forEach(function(sec){
   sec.qs.forEach(function(q){
    if(q.tp!=="mcq") return;
    var correct=subs.filter(function(s){return s.aS&&s.aS[q.id]===q.mx;}).length;
    var pct=n>0?(correct/n)*100:0;
    var k=Math.max(1,Math.floor(n*0.27));
    var sortedSubs=subs.map(function(s){return{s:s,tot:calcTot(s,cfg).total};}).sort(function(a,b){return b.tot-a.tot;});
    var topK=sortedSubs.slice(0,k);var botK=sortedSubs.slice(n-k);
    var topCorr=topK.filter(function(o){return o.s.aS&&o.s.aS[q.id]===q.mx;}).length;
    var botCorr=botK.filter(function(o){return o.s.aS&&o.s.aS[q.id]===q.mx;}).length;
    var disc=k>0?(topCorr-botCorr)/k:0;
    items.push({id:q.id,n:p.lbl+" Q"+q.n,diff:pct/100,pct:pct,disc:disc,part:p.id});
   });
  });
 });
 // Cronbach's Alpha
 var alpha=0;
 if(items.length>1&&n>1){
  var totalVar=variance*n;
  var sumPQ=items.reduce(function(acc,it){return acc+it.diff*(1-it.diff);},0);
  var k2=items.length;
  alpha=k2>1?(k2/(k2-1))*(1-(sumPQ/totalVar)):0;
  alpha=Math.min(1,Math.max(0,alpha));
 }
 return{n:n,mean:mean,sd:sd,median:median,max:Math.max.apply(null,scores),min:Math.min.apply(null,scores),
  skillAvg:skillAvg,receptive:receptive,productive:productive,groupMeans:groupMeans,
  items:items,alpha:alpha,tots:tots};
}

// ══ TIMER ══════════════════════════════════════════
var _timerLocked=false;
// ══ FIX 6: Indestructible Timer ══════════════════════════════════════════
// Syncs remaining seconds to localStorage every tick.
// On page refresh, resumeSession() restores S.timers from the draft,
// and startTimer() here additionally reads msa_timer_live for sub-second accuracy.
var _TIMER_LIVE_KEY = "msa_timer_live";
function _timerSaveLive(pid, left){
  try{ localStorage.setItem(_TIMER_LIVE_KEY, JSON.stringify({pid:pid, left:left, ts:Date.now()})); }catch(e){}
}
function _timerReadLive(pid){
  try{
    var raw = localStorage.getItem(_TIMER_LIVE_KEY);
    if(!raw) return null;
    var obj = JSON.parse(raw);
    if(obj.pid !== pid) return null;
    // Subtract elapsed wall-clock time since the save
    var elapsed = Math.floor((Date.now() - obj.ts) / 1000);
    return Math.max(0, obj.left - elapsed);
  }catch(e){ return null; }
}
function startTimer(mins){
  if(S.phase!=="taking" && S.phase!=="speaking") return;
  stopTimer();
  if(!mins||mins<=0) return;
  var cfg=gcfg();if(!cfg.parts||!cfg.parts[S.pi]) return;
  var totalSec=Math.floor(mins*60);
  var pid=cfg.parts[S.pi].id;
  // FIX 6: Try to recover exact remaining time from live localStorage snapshot
  var liveLeft = _timerReadLive(pid);
  if(liveLeft !== null){
    S.timers[pid] = liveLeft;
  } else if(S.timers[pid]==null){
    S.timers[pid]=totalSec;
  }
  var remaining=Math.max(0,S.timers[pid]);
  S.tStart=Date.now()-(totalSec-remaining)*1000;
  _timerLocked=false;
  var sBar=document.getElementById("sticky-timer");
  if(sBar) sBar.style.display="flex";
  function tick(){
    if(S.phase!=="taking" && S.phase!=="speaking"){stopTimer();return;}
    var elapsed=Math.floor((Date.now()-S.tStart)/1000);
    var left=Math.max(0,totalSec-elapsed);
    S.timers[pid]=left;S.lastTimeLeft=left;
    // FIX 6: Persist every tick so refresh always resumes correctly
    _timerSaveLive(pid, left);
    var m2=Math.floor(left/60),s2=left%60;
    var txt=(m2<10?"0":"")+m2+":"+(s2<10?"0":"")+s2;
    var col=left<=60?"#ef4444":left<=300?"#fbbf24":"#4ade80";
    var se=document.getElementById("st-timer");if(se){se.style.color=col;se.textContent="⏱ "+txt;}
    var te=document.getElementById("tmr");if(te){te.textContent="⏱ "+txt;te.style.color=col;te.className="skill-tab-tmr"+(left<=60?" danger":"");}
    updateStickyPlants();
    // FIX: only auto-advance when timer truly hits 0 AND we're still taking the exam
    if(left<=0){
      clearInterval(S.tInt);S.tInt=null;
      if(S.phase!=="taking"){return;}  // view changed — abort auto-submit
      if(!_timerLocked){_timerLocked=true;autoNext();}
      return;
    }
  }
  // FIX: ensure no leftover interval before starting a new one
  if(S.tInt){clearInterval(S.tInt);S.tInt=null;}
  tick();
  S.tInt=setInterval(tick,1000);
}

function stopTimer(forcePid){
 // FIX: defensive — clear interval first, idempotent
 if(S.tInt){clearInterval(S.tInt);S.tInt=null;}
 if(S.tStart){
  try{
   var cfg=gcfg(),pid=forcePid||cfg.parts[S.pi].id;
   // FIX: tick() already wrote the up-to-date remaining time into S.timers[pid].
   // Do NOT subtract elapsed again (caused double-decrement / time jump).
   var remaining=Math.max(0, S.timers[pid]!=null ? S.timers[pid] : 0);
   S.timers[pid]=remaining;
   _timerSaveLive(pid, remaining);
  }catch(e){}
  S.tStart=null;
 }
}
function pad(n){return String(n).padStart(2,"0");}
function fmtDur(sec){return pad(Math.floor(sec/60))+":"+pad(sec%60);}
function autoNext(){
 var cfg=gcfg();
 var curPid=cfg.parts[S.pi].id;
 S._expiredSkills[curPid]=true;
 S.timers[curPid]=0;
 auditLog("SKILL_EXPIRED",{skill:curPid,sid:S.info.id});
 // Find next available non-expired skill (excluding Speaking pi=3)
 var mainParts=cfg.parts.filter(function(p,i){return i<3;});
 var allExpired=mainParts.every(function(p){return S._expiredSkills[p.id];});
 if(allExpired){
  // All 3 main skills done → go to lobby/submit
  if(cfg.parts[3]&&cfg.parts[3].id==="speaking"){
   _tabVisited[curPid]=true;
   S.pi=3;
   _hardReset_partial();
   S.phase="waiting";
   S._lobbyTs=Date.now();
   lobbyRegister();
   render();
  } else {
   toast("⏱ All skills complete — please submit!");
   showSubmitModal();
  }
  return;
 }
 // Find first non-expired skill to move to
 var nextAvail=-1;
 for(var i=0;i<3;i++){
  if(!S._expiredSkills[cfg.parts[i].id]){nextAvail=i;break;}
 }
 if(nextAvail>=0 && nextAvail!==S.pi){
  toast("⏱ "+cfg.parts[S.pi].lbl+" time's up — locked");
  _tabVisited[curPid]=true;
  stopTimer(curPid);
  S.pi=nextAvail;
  render();
  window.scrollTo(0,0);
  setTimeout(function(){startTimer(cfg.timers[S.pi]||30);},80);
 } else {
  // Already on the right skill or no move needed
  render();
  toast("⏱ "+cfg.parts[S.pi].lbl+" time's up — locked");
 }
}

function checkPostExamAccess(){

// PP is computed dynamically - base start pages per skill
var PP={listening:{sp:2,pg:6},reading:{sp:8,pg:9},writing:{sp:17,pg:8},speaking:{sp:25,pg:5}};
function getPP(cfg){
 // Distribute pages evenly based on section count and total pages
 var tp=cfg.meta.tp||31;
 var parts=cfg.parts;
 var secCounts=parts.map(function(p){return p.secs.length;});
 var totalSecs=secCounts.reduce(function(a,b){return a+b;},0)||1;
 // Page 1 = cover
 var sp=2;var result={};
 parts.forEach(function(p,i){
  var pgs=Math.max(1,Math.round((secCounts[i]/totalSecs)*(tp-1)));
  result[p.id]={sp:sp,pg:pgs,secPg:pgs/Math.max(1,secCounts[i])};
  sp+=pgs;
 });
 return result;
}

 }
 // Right: next section, next skill, or submit
 if(!isLastSec){
  h+='<button class="btn bn" onclick="nextSec()">'+x(part.secs[S.si+1].ttl)+' →</button>';
 } else if(!isLast){
  // Last section of current skill → go to next skill
  h+='<button class="btn bn" onclick="switchTab('+(S.pi+1)+')">'+cfg.parts[S.pi+1].ico+' '+cfg.parts[S.pi+1].lbl+' →</button>';
 } else {
  h+='<button class="btn bgg" style="font-size:13px;padding:10px 20px;" onclick="cfmSub()">✅ Submit Exam</button>';
 }
 h+='</div></div></div>';
 return h;
}

var _tabVisited={};
function _forceRenderNow(){
 try{ window.__forceSync = true; if(typeof renderNow==="function") renderNow(); else render(); }
 finally{ window.__forceSync = false; }
}
function nextSec(){
 var cfg=gcfg(),part=cfg.parts[S.pi];
 if(S.si<part.secs.length-1){
  S.si++;
  _forceRenderNow();
  window.scrollTo(0,0);
 }
}
function prevSec(){
 if(S.si>0){
  S.si--;
  _forceRenderNow();
  window.scrollTo(0,0);
 }
}

function switchTab(i){
 var cfg=gcfg();
 if(i<0||i>=cfg.parts.length) return;
 var curPid=cfg.parts[S.pi].id;
 var targetPid=cfg.parts[i].id;
 // Block admin-locked skills (except the current one)
 if(i!==S.pi&&isSkillAdminLocked(targetPid)){
  toast("🔒 "+cfg.parts[i].lbl+" is currently locked by the examiner",true);
  return;
 }
 // Block expired skills
 if(S._expiredSkills[targetPid]){
  toast("⏰ "+cfg.parts[i].lbl+" time has expired — access locked",true);
  return;
 }
 // Pre-Speaking: validate all 3 main skills, show confirmation if missing answers
 if(i===3 && cfg.parts[3]&&cfg.parts[3].id==="speaking" && !S._spGranted && !isSpeakingGlobalUnlock()){
  var missing=[];
  for(var pi2=0;pi2<3;pi2++){
   var p=cfg.parts[pi2];if(!p)continue;
   p.secs.forEach(function(sec){
    sec.qs.forEach(function(q){
     if(!q.mx||q.tp==="speak"||q.tp==="email"||q.tp==="fbpost"||q.tp==="whatsapp"||q.tp==="review") return;
     var a=S.ans[q.id];
     if(!a||a.toString().trim()==="") missing.push({qid:q.id,pi:pi2,lbl:p.lbl+" Q"+q.n});
    });
   });
  }
  if(missing.length>0){
   missing.forEach(function(m){var el=document.getElementById("qb-"+m.qid);if(el)el.classList.add("err");});
   var mr=document.getElementById("modal-root");
   if(mr){
    var missNames=missing.slice(0,5).map(function(m){return m.lbl;}).join(", ")+(missing.length>5?" …":"");
    mr.innerHTML='<div class="modal-overlay"><div class="modal-box" style="text-align:center;">'
     +'<div style="font-size:36px;margin-bottom:8px;">⚠️</div>'
     +'<h3 style="color:#f87171;">Unanswered Questions</h3>'
     +'<p style="font-size:13px;color:#94a3b8;"><strong style="color:#f87171;">'+missing.length+' unanswered</strong> required question'+(missing.length!==1?'s':'')+':<br><span style="font-size:11px;color:#fca5a5;">'+x(missNames)+'</span></p>'
     +'<p style="font-size:12px;color:#64748b;margin-top:8px;">Submit anyway and proceed to Speaking waiting lobby, or go back to complete?</p>'
     +'<div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">'
     +'<button class="btn bgg" onclick="closeModal();_proceedToLobby()">➡ Submit & Proceed</button>'
     +'<button class="btn br" onclick="closeModal();_goToFirstMissing('+JSON.stringify(missing[0])+')">📝 Go Back</button>'
     +'</div></div></div>';
    return;
   }
  }
  // All answered — proceed to lobby
  _tabVisited[curPid]=true;
  stopTimer(curPid);
  S.pi=i; _hardReset_partial();
  S.phase="waiting"; S._lobbyTs=Date.now();
  lobbyRegister(); render(); window.scrollTo(0,0);
  return;
 }
 // Global speaking unlock — skip lobby, grant immediately
 if(i===3 && cfg.parts[3]&&cfg.parts[3].id==="speaking" && isSpeakingGlobalUnlock() && !S._spGranted){
  _tabVisited[curPid]=true;
  stopTimer(curPid);
  auditLog("SPEAKING_GLOBAL_UNLOCK",{name:S.info.name,sid:S.info.id});
  grantSpeakingAccess();
  return;
 }
 _tabVisited[curPid]=true;
 stopTimer(curPid);
 S.pi=i; S.si=0;
 render(); window.scrollTo(0,0);
 setTimeout(function(){startTimer(cfg.timers[S.pi]||30);},80);
}
function _proceedToLobby(){
 var cfg=gcfg();
 var curPid=cfg.parts[S.pi].id;
 _tabVisited[curPid]=true;
 stopTimer(curPid);
 S.pi=3; _hardReset_partial();
 S.phase="waiting"; S._lobbyTs=Date.now();
 lobbyRegister(); render(); window.scrollTo(0,0);
}
function _goToFirstMissing(m){
 if(!m) return;

}

}

function startLobbyPoll(){
  stopLobbyPoll();
  var dotFrames=["●○○","○●○","○○●","○●○"]; var df=0;
  var _supaCheckInterval = 4000; // poll Supabase every 4 s as fallback
  var _lastSupaCheck = 0;
  S._lobbyPoll = setInterval(function(){
    // Animate dots
    var de=document.getElementById("lobby-dots");
    if(de){ df=(df+1)%4; de.textContent=dotFrames[df]; }
    // Update elapsed timer
    var elapsed=S._lobbyTs?Math.round((Date.now()-S._lobbyTs)/1000):0;
    var mins=Math.floor(elapsed/60),secs=elapsed%60;
    var el=document.getElementById("lobby-elapsed");
    if(el) el.textContent=(mins>0?mins+"m ":"")+secs+"s";
    // Legacy localStorage check (admin on same device)
    var res=lobbyCheckGrant();
    if(res==="granted"){
      stopLobbyPoll(); sbUnsubscribeMyStatus();
      auditLog("SPEAKING_GRANTED",{name:S.info.name,sid:S.info.id});
      grantSpeakingAccess(); return;
    } else if(res==="auto_submit"){
      stopLobbyPoll(); sbUnsubscribeMyStatus();
      auditLog("AUTO_SUBMITTED",{name:S.info.name,sid:S.info.id});
      forceAutoSubmit(); return;
    }
    // Supabase polling fallback (in case realtime misses the event)
    var now=Date.now();
    if(now-_lastSupaCheck >= _supaCheckInterval){
      _lastSupaCheck = now;
      sbCheckMyStatus(S.info.id).then(function(status){
        if(status==="approved"){
          stopLobbyPoll(); sbUnsubscribeMyStatus();
          auditLog("SPEAKING_GRANTED_POLL",{name:S.info.name,sid:S.info.id});
          grantSpeakingAccess();
        } else if(status==="rejected"){
          stopLobbyPoll(); sbUnsubscribeMyStatus();
          auditLog("SPEAKING_REJECTED_POLL",{name:S.info.name,sid:S.info.id});
          var mr=document.getElementById("modal-root");
          if(mr) mr.innerHTML='<div class="modal-overlay"><div class="modal-box" style="text-align:center;">'+
            '<div style="font-size:40px;margin-bottom:10px;">ℹ️</div>'+
            '<h3 style="color:#fbbf24;">Speaking Not Granted</h3>'+
            '<p style="font-size:13px;color:#94a3b8;">The examiner has closed access.<br>Your exam will be submitted now.</p>'+
            '<button class="btn bgg" style="margin-top:14px;" onclick="closeModal();doSubmit()">✅ Submit Exam</button>'+
            '</div></div>';
        }
      });
    }
  }, 1500);
}

 if(S._lobbyPoll){clearInterval(S._lobbyPoll);S._lobbyPoll=null;}
}

 lobbyLeave();

var _mr=null,_ms=null,_mc=[],_mt=null;
function startRec(qid){
 navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
  _ms=stream;_mc=[];
  _mr=new MediaRecorder(stream);
  _mr.ondataavailable=function(e){if(e.data.size>0)_mc.push(e.data);};
  _mr.onstop=function(){
   var blob=new Blob(_mc,{type:"audio/webm"});
   var url=URL.createObjectURL(blob);
   S.spRecDone[qid]=url;S.spRec[qid]=false;
   clearInterval(_mt);_mt=null;
   render();if(S.phase==="taking"&&S.view==="exam")startTimer(gcfg().timers[S.pi]||30);
  };
  _mr.start();S.spRec[qid]=true;S.spDur[qid]=0;
  var t0=Date.now();
  _mt=setInterval(function(){
   S.spDur[qid]=Math.floor((Date.now()-t0)/1000);
   var el=document.getElementById("rtim-"+qid);
   if(el)el.textContent="● REC "+fmtDur(S.spDur[qid]);
  },500);
  render();if(S.phase==="taking"&&S.view==="exam")startTimer(gcfg().timers[S.pi]||30);
 }).catch(function(e){
  alert("Microphone access denied.\n\n"+e.message+"\n\nPlease click the microphone icon in your browser address bar and allow access, then try again.");
 });
}
function stopRec(qid){
 if(_mr&&_mr.state!=="inactive")_mr.stop();
 if(_ms)_ms.getTracks().forEach(function(t){t.stop();});

function playAud(secId, akey){
  // ── Configurable play limit using localStorage ──
  var maxPlays = S.maxAudioPlays || 2;
  var lsKey = 'plays_' + akey;
  var count = parseInt(localStorage.getItem(lsKey) || '0', 10);
  var btn = document.getElementById('aud-btn-' + akey);

  // Check limit BEFORE playing
  if(count >= maxPlays){
    if(btn){
      btn.disabled = true;
      btn.textContent = '\u274C Limit Reached';
      btn.style.opacity = '0.5';
      btn.style.background = 'rgba(239,68,68,.25)';
      btn.style.cursor = 'not-allowed';
    }
    toast('\u26A0\uFE0F You have reached the maximum of ' + maxPlays + ' plays.', true);
    return;
  }

  // Resolve audio source (custom from IDB or embedded fallback)
  getAudioSrc(akey, function(src){
    if(!src){ toast('No audio available', true); return; }
    // Stop any currently playing audio
    if(window._currentAudio){
      try{ window._currentAudio.pause(); window._currentAudio.currentTime = 0; }catch(e){}
    }
    var audio = new Audio(src);
    window._currentAudio = audio;

    // Increment count in localStorage
    count++;
    localStorage.setItem(lsKey, String(count));

    // Update button to "Playing..." state
    if(btn){
      var remaining = maxPlays - count;
      btn.disabled = true;
      btn.textContent = '\u25B6\uFE0F Playing... (' + remaining + ' left)';
      btn.style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
    }

    // Update counter badge
    var badge = document.getElementById('aud-cnt-' + akey);
    if(badge) badge.textContent = count + ' / ' + maxPlays;

    audio.play().catch(function(e){ toast('Audio error: ' + e.message, true); });

    audio.onended = function(){
      window._currentAudio = null;
      if(btn){
        if(count >= maxPlays){
          btn.disabled = true;
          btn.textContent = '\u274C Limit Reached';
          btn.style.opacity = '0.5';
          btn.style.background = 'rgba(239,68,68,.25)';
          btn.style.cursor = 'not-allowed';
        } else {
          btn.disabled = false;
          btn.textContent = '\uD83D\uDD0A Play Audio (' + (maxPlays - count) + ' remaining)';
          btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
        }
      }
    };

    audio.onerror = function(){
      window._currentAudio = null;
      // Rollback count on error
      count--;
      localStorage.setItem(lsKey, String(Math.max(0, count)));
      if(btn){ btn.disabled = false; btn.textContent = '\uD83D\uDD0A Play Audio (retry)'; }
      toast('Audio playback failed', true);
    };
  });
}

// ── Skill analysis helpers ────────────────────────────────────
function skillPct(score, max){ return max>0 ? Math.round((score/max)*100) : 0; }
function bestWorstSkill(t){
  var skills=[
    {id:"reading",  lbl:"📖 Reading",   score:t.reading,  max:25},
    {id:"listening",lbl:"🎧 Listening", score:t.listening,max:25},
    {id:"writing",  lbl:"✍️ Writing",   score:t.writing,  max:25},
    {id:"speaking", lbl:"🗣️ Speaking",  score:t.speaking, max:25}
  ];
  // exclude pending skills (score 0 and pend=true) from best/worst
  var valid=skills.filter(function(s){ return !(s.score===0&&t.pend); });
  if(!valid.length) return {best:null,worst:null};
  valid.sort(function(a,b){ return skillPct(b.score,b.max)-skillPct(a.score,a.max); });
  return {best:valid[0], worst:valid[valid.length-1]};
}
function skillBar(score, max, col){
  var pct=skillPct(score,max);
  return '<div style="display:flex;align-items:center;gap:5px;font-size:10px;">'+
    '<div style="flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;min-width:40px;">'+
    '<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:3px;transition:width .6s;"></div></div>'+
    '<span style="color:'+col+';font-weight:600;min-width:22px;">'+pct+'%</span></div>';
}
function rankColor(rank,total){
  if(rank<=Math.ceil(total*0.25)) return "#f87171"; // bottom 25%
  if(rank<=Math.ceil(total*0.5))  return "#fbbf24"; // bottom 50%
  if(rank<=Math.ceil(total*0.75)) return "#60a5fa"; // top 50%
  return "#4ade80"; // top 25%
}

// ── Ranking table: weakest → strongest ───────────────────────
function rRankingTable(subs, tots){
  if(!subs.length) return '';
  // Sort ascending (weakest first)
  var ranked=subs.map(function(s,i){return{sub:s,t:tots[i],rank:subs.length-i};}).slice()
    .sort(function(a,b){ return a.t.total-b.t.total; });
  var h='<div class="gc" style="margin-bottom:13px;">'+
    '<div class="gh"><h2>🏆 Student Ranking — Weakest → Strongest</h2></div>'+
    '<div class="gb" style="overflow-x:auto;">'+
    '<table class="rtbl"><thead><tr>'+
    '<th>Rank</th><th>Name</th><th>ID</th><th>Group</th>'+
    '<th>Total/100</th><th>%</th>'+
    '<th>📖 R%</th><th>🎧 L%</th><th>✍️ W%</th><th>🗣️ Sp%</th>'+
    '<th>Best Skill</th><th>Weakest Skill</th>'+
    '</tr></thead><tbody>';
  ranked.forEach(function(r,ri){
    var sub=r.sub, t=r.t;
    var rankNum=ri+1, total=ranked.length;
    var rankCol=rankColor(rankNum,total);
    var bw=bestWorstSkill(t);
    var rPct=skillPct(t.reading,25), lPct=skillPct(t.listening,25);
    var wPct=skillPct(t.writing,25),  sPct=skillPct(t.speaking,25);
    function pCell(p){ return '<span style="color:'+(p>=80?'#4ade80':p>=60?'#fbbf24':'#f87171')+'">'+p+'%</span>'; }
    h+='<tr>'+
      '<td><span style="font-weight:800;color:'+rankCol+';">#'+rankNum+'</span></td>'+
      '<td><strong>'+x(sub.name)+'</strong></td>'+
      '<td style="font-size:10px;color:#64748b;">'+sub.sid+'</td>'+
      '<td><span class="lbdg'+(sub.grp==='Group B'?' grpB':' grpA')+'">'+x(sub.grp||'?')+'</span></td>'+
      '<td><strong style="color:'+rankCol+'">'+t.total+'</strong></td>'+
      '<td style="font-size:11px;color:#94a3b8;">'+Math.round(t.total)+'%</td>'+
      '<td>'+pCell(rPct)+'</td><td>'+pCell(lPct)+'</td>'+
      '<td>'+pCell(wPct)+'</td><td>'+pCell(sPct)+'</td>'+
      '<td style="font-size:11px;color:#4ade80;">'+(bw.best?bw.best.lbl+'<br><small>'+bw.best.score+'/25</small>':'–')+'</td>'+
      '<td style="font-size:11px;color:#f87171;">'+(bw.worst?bw.worst.lbl+'<br><small>'+bw.worst.score+'/25</small>':'–')+'</td>'+
      '</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function rSkillAnalysisPanel(subs, tots, stats){
  if(!subs.length||!stats) return '';

    {id:'reading',  lbl:'📖 Reading',  col:'#3b82f6', avg:stats.skillAvg.reading||0,  max:25},

      '<div style="font-size:10px;color:#64748b;">/ '+s.max+' marks</div>'+
      '<div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin:8px 0 4px;overflow:hidden;">'+
      '<div style="height:100%;width:'+pct+'%;background:'+s.col+';border-radius:3px;"></div></div>'+
      '<div style="font-size:10px;color:'+pctCol+';">'+pct+'% avg</div>'+
      '</div>';
  });
  h+='</div>';

  // Best skill vs Worst skill distribution
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">';
  // Best skill distribution
  h+='<div style="background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:12px;">'+
    '<div style="font-size:12px;font-weight:700;color:#4ade80;margin-bottom:8px;">💪 Best Skill Distribution</div>';
  sk.forEach(function(s){
    var cnt=bestCount[s.id]||0;
    var pct=n>0?Math.round(cnt/n*100):0;
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">'+

      '<div style="height:100%;width:'+pct+'%;background:'+s.col+';border-radius:3px;"></div></div>'+
      '<span style="font-size:10px;color:#64748b;min-width:32px;">'+cnt+' ('+pct+'%)</span>'+
      '</div>';
  });
  h+='</div>';
  // Worst skill distribution
  h+='<div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:12px;">'+

      '<span style="font-size:11px;min-width:80px;color:#e2e8f0;">'+s.lbl+'</span>'+
      '<div style="flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;">'+
      '<div style="height:100%;width:'+pct+'%;background:'+s.col+';border-radius:3px;"></div></div>'+

      '</div>';
  });
  h+='</div>';

  h+='<div style="font-size:11px;font-weight:700;color:#fbbf24;margin-bottom:6px;">📋 Skill Averages Summary</div>';

  h+='</tbody></table>';
  h+='</div></div>';
  return h;

function saveMS(subId,qId,maxM){

// ══ DELETE FUNCTIONS ═══════════════════════════════
function delById(){
 var id=window.prompt("Enter Student ID to delete:");
 if(!id)return;
 var subs=gsubs();
 var found=subs.filter(function(s){return s.sid===id.trim();});
 if(!found.length){alert("No submission found with ID: "+id);return;}
 if(window.confirm("Delete submission(s) for ID: "+id+"?\n("+found.length+" record(s) found)")){
  var remaining=subs.filter(function(s){return s.sid!==id.trim();});
  localStorage.setItem("msa_s",JSON.stringify(remaining));
  toast("✅ Deleted "+found.length+" record(s)");
  render();
 }
}
function delAll(){
 var pwd=window.prompt("🔒 MASTER DELETE — Security Verification\n\nThis will permanently erase ALL student records.\nEnter the Security Password to proceed:");
 if(pwd===null)return;
 if(pwd.trim()!=="238055"){toast("❌ Incorrect security password. Deletion blocked.",true);return;}
 if(!window.confirm("⚠️ FINAL CONFIRMATION\n\nYou have entered the correct password.\nExport all data before deleting?\n\nOK = Export CSV then delete\nCancel = Keep data"))return;
 expExcel();
 setTimeout(function(){
  localStorage.removeItem("msa_s");
  var sc=getSupaClient();
  if(sc){sc.from("submissions").delete().neq("id","").then(function(){toast("☁️ Cloud records cleared too");}).catch(function(){});}
  render();toast("✅ All records exported and cleared.");
 },800);
}

 var cfg=gcfg(),subs=gsubs();
 if(!subs.length){alert("No submissions.");return;}

 var wb=XLSX.utils.book_new();

 // Sheet 1: Summary
 var summaryData=[["MSA TEFL 402 — Exam Results Export","","","",""],["Date:",new Date().toLocaleString(),"","",""],["","","","",""],["Student Name","ID","Group","Faculty","Reading /25","Listening /25","Writing /25","Speaking /25","Total /100","Percentage","CEFR Level","Pending"]];
 subs.forEach(function(sub){
  var t=calcTot(sub,cfg),lvl=t.pend?"Pending":clvl(t.total);
  summaryData.push([sub.name,sub.sid,sub.grp||"?",sub.fac,t.reading,t.listening,t.writing,t.speaking,t.total,Math.round(t.total)+"%",lvl,t.pend?"Yes":"No"]);
 });
 var ws1=XLSX.utils.aoa_to_sheet(summaryData);
 ws1['!cols']=[{wch:22},{wch:10},{wch:12},{wch:20},{wch:12},{wch:14},{wch:12},{wch:13},{wch:11},{wch:11},{wch:11},{wch:9}];
 XLSX.utils.book_append_sheet(wb,ws1,"Results");

 // Sheet 2: Statistics
 var tots=subs.map(function(s){return calcTot(s,cfg);});
 var stats=calcStats(subs,cfg);
 if(stats){
  var statData=[["TEST STATISTICS"],["Metric","Value"],["Total Students",stats.n],["Mean Score",stats.mean.toFixed(2)],["Standard Deviation",stats.sd.toFixed(2)],["Median",stats.median.toFixed(2)],["Highest Score",stats.max],["Lowest Score",stats.min],["Avg Reading",stats.skillAvg.reading.toFixed(2)],["Avg Listening",stats.skillAvg.listening.toFixed(2)],["Avg Writing",stats.skillAvg.writing.toFixed(2)],["Avg Speaking",stats.skillAvg.speaking.toFixed(2)],["Cronbach's Alpha",(stats.alpha).toFixed(3)],["",""],["CEFR DISTRIBUTION"],["Level","Count","Percentage"]];
  var cd={A1:0,A2:0,B1:0,B2:0,C1:0,C2:0};
  tots.forEach(function(t){if(!t.pend)cd[clvl(t.total)]++;});
  ["C2","C1","B2","B1","A2","A1"].forEach(function(L){statData.push([L,cd[L],((cd[L]/subs.length)*100).toFixed(1)+"%"]);});
  if(stats.items.length>0){
   statData.push(["",""],["ITEM ANALYSIS"],["Question","Part","Difficulty","% Correct","Discrimination","Quality"]);
   stats.items.forEach(function(it){statData.push([it.n,it.part,it.diff.toFixed(2),it.pct.toFixed(0)+"%",it.disc.toFixed(2),it.diff>0.8?"Easy":it.diff<0.3?"Hard":"Moderate"]);});
  }
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(statData),"Statistics");
 }

 // Sheet 3: Per-group
 (cfg.meta.groups||["Group A","Group B"]).forEach(function(grp){
  var grpSubs=subs.filter(function(s){return(s.grp||"?")==grp;});
  if(!grpSubs.length)return;
  var grpData=[["Group: "+grp],["Name","ID","Reading","Listening","Writing","Speaking","Total","CEFR"]];
  grpSubs.forEach(function(sub){
   var t=calcTot(sub,cfg),lvl=t.pend?"Pending":clvl(t.total);
   grpData.push([sub.name,sub.sid,t.reading,t.listening,t.writing,t.speaking,t.total,lvl]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(grpData),grp.replace(/\s/g,"_").slice(0,28));
 });

 XLSX.writeFile(wb,"MSA_Results_"+new Date().toISOString().slice(0,10)+".xlsx");
 toast("📊 Excel exported!");
}

 parts.push('<div class="header"><div><div class="name">'+sub.name+'</div><div class="meta">ID: '+sub.sid+' | '+sub.fac+' | '+sub.grp+' | '+new Date(sub.at).toLocaleString()+'</div><div class="meta">'+cfg.meta.code+' — '+cfg.meta.exam+'</div></div>'
  +'<div><div class="score-big">'+t.total+'/100</div><div class="lvl">'+lvl+'</div></div></div>');
 // Skill score cards
 parts.push('<div class="skill-grid">');
 [{k:"listening",n:"🎧 Listening"},{k:"reading",n:"📖 Reading"},{k:"writing",n:"✍️ Writing"},{k:"speaking",n:"🗣️ Speaking"}].forEach(function(sk){

  parts.push('<div class="skill-card"><div class="skill-name">'+sk.n+'</div><div class="skill-score">'+sc+'<span style="font-size:13px;color:#94a3b8;">/25</span></div><div class="skill-bar"><div class="skill-bar-fill" style="width:'+pct+'%;"></div></div></div>');

 w.document.write(parts.join(""));
 w.document.close();
 setTimeout(function(){w.print();},700);
 toast("📄 Student portfolio ready — Save as PDF");

function syncIdbMeta(keys, cb){
  var pending=keys.length;
  if(!pending){cb();return;}
  keys.forEach(function(k){
    idbGetAudio(k,function(data){
      if(data) _idbMetaSet(k,true);
      if(--pending===0) cb();
    });
  });
}

  var h = '<div class="gc" style="margin-bottom:14px;border:1px solid rgba(139,92,246,.35);" id="speaking-ctrl-panel">'

   +'<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:10px;text-align:center;">'

   +'<div style="background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);border-radius:8px;padding:10px;text-align:center;">'

window.refreshSpeakingPanel = function(){
  sbFetchAllRequests().then(function(rows){
    window._sbRequestsCache = rows;
    // Re-render only the speaking panel
    var panel=document.getElementById("speaking-ctrl-panel");
    if(panel){ var tmp=document.createElement("div"); tmp.innerHTML=rSpeakingControl(); panel.outerHTML=tmp.innerHTML; }
    else render();
  });
};
window.adminApproveOne = async function(sid){
  var ok = await sbApproveStudent(sid);
  if(ok){ toast("✅ Approved: "+sid); window.refreshSpeakingPanel(); }
  else    toast("❌ Could not approve",true);
};
window.adminRejectOne = async function(sid){
  var ok = await sbRejectStudent(sid);
  if(ok){ toast("✕ Rejected: "+sid); window.refreshSpeakingPanel(); }
  else    toast("❌ Could not reject",true);
};
window.adminApproveAll = async function(){
  if(!window.confirm("Approve ALL waiting students?")) return;
  var ok = await sbApproveAll();
  if(ok){ toast("✅ All waiting students approved!"); window.refreshSpeakingPanel(); }
  else    toast("❌ Approve all failed",true);
};
window.adminRejectAll = async function(){
  if(!window.confirm("Reject ALL waiting students? They will be prompted to submit.")) return;
  var ok = await sbRejectAll();
  if(ok){ toast("✕ All waiting students rejected"); window.refreshSpeakingPanel(); }
  else    toast("❌ Reject all failed",true);
};
window.adminClearAllRequests = async function(){
  if(!window.confirm("Delete ALL speaking_requests rows?")) return;
  var db=getSupaClient();
  if(!db){ toast("❌ Supabase not ready",true); return; }
  try{
    await db.from("speaking_requests").delete().neq("student_id","__none__");
    window._sbRequestsCache=[];
    toast("🗑 All requests cleared"); window.refreshSpeakingPanel();
  }catch(e){ toast("❌ Clear failed",true); }
};

// ══ SAFE IMAGE UPLOAD — Canvas Normalization Pipeline ══
// Fixes green tinting / pixelation by:
// 1. Decoding via Image element (browser normalizes color profile)
// 2. Re-drawing on Canvas in sRGB color space (strips CMYK/exotic profiles)
// 3. Compressing to JPEG/WebP at quality 0.92 (eliminates data packet loss)
// 4. Never using raw FileReader binary (which bypasses color normalization)
// ── IMAGE ENGINE v5: 10MB limit, 1000px compress, async, spinner ──
var _IMG_MAX_MB = 10;
function _processImage(file, _a, _b, _c, callback){
 // v7: Canvas resize with createImageBitmap (async, non-blocking) + FileReader fallback
 if(!file){toast("No file selected",true);return;}
 if(!file.type.startsWith("image/")){toast("Please select an image file (JPG, PNG, WebP)",true);return;}
 if(file.size > _IMG_MAX_MB*1024*1024){
  toast("❌ File too large (max "+_IMG_MAX_MB+"MB). Please resize first.",true);return;
 }
 var MAX_DIM=1000, JPEG_Q=0.82;
 // Try createImageBitmap (async, native, no main-thread block)
 if(typeof createImageBitmap === "function"){
  createImageBitmap(file).then(function(bmp){
   var w=bmp.width, h=bmp.height;
   var ratio=Math.min(MAX_DIM/w, MAX_DIM/h);
   if(ratio<1){w=Math.round(w*ratio); h=Math.round(h*ratio);}
   // Yield before canvas draw
   setTimeout(function(){
    try{
     var cv=document.createElement("canvas");
     cv.width=w; cv.height=h;
     cv.getContext("2d").drawImage(bmp,0,0,w,h);
     bmp.close();
     var mime=(file.type==="image/png"&&w<=600)?"image/png":"image/jpeg";
     var out=cv.toDataURL(mime,JPEG_Q);
     cv.width=1;cv.height=1;cv=null;
     callback(out&&out.length>200?out:_readRaw(file,callback,true));
    }catch(ex){_readRaw(file,callback);}
   },20);
  }).catch(function(){_readRaw(file,callback);});
 } else {
  _readRaw(file,callback);
 }
}
function _readRaw(file,callback,alreadyCalled){
 if(alreadyCalled) return;
 var r=new FileReader();
 r.onload=function(e){
  var raw=e.target.result;
  if(!raw||raw.length<100){toast("❌ Could not read file",true);return;}
  // For large images that bypassed canvas, do a canvas resize via img element
  var MAX_DIM=1000, JPEG_Q=0.82;
  if(file.size > 200*1024){
   var img=new Image();
   img.onload=function(){
    var w=img.naturalWidth,h=img.naturalHeight;
    var ratio=Math.min(MAX_DIM/w,MAX_DIM/h);
    if(ratio>=1){callback(raw);return;}
    w=Math.round(w*ratio);h=Math.round(h*ratio);
    setTimeout(function(){
     try{
      var cv=document.createElement("canvas");
      cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      var out=cv.toDataURL("image/jpeg",JPEG_Q);
      cv.width=1;cv.height=1;cv=null;
      callback(out&&out.length>200?out:raw);
     }catch(ex){callback(raw);}
    },20);
   };
   img.onerror=function(){callback(raw);};
   img.src=raw;
  } else {
   callback(raw);
  }
 };
 r.onerror=function(){toast("❌ File read failed",true);};
 r.readAsDataURL(file);
}

 });

// ── GRADE DISTRIBUTION ───────────────────────────────
function calcGradeTable(subs,cfg){
  var tots=subs.map(function(s){return calcTot(s,cfg);}),n=subs.length;
  if(!n) return null;
  var grades=[
    {grade:'A+',min:95,max:100,color:'rgba(139,92,246,.22)',tc:'#ddd6fe'},
    {grade:'A', min:90,max:94, color:'rgba(59,130,246,.22)',tc:'#bfdbfe'},
    {grade:'B+',min:85,max:89, color:'rgba(16,185,129,.22)',tc:'#a7f3d0'},
    {grade:'B', min:75,max:84, color:'rgba(6,182,212,.22)', tc:'#a5f3fc'},
    {grade:'C+',min:65,max:74, color:'rgba(245,158,11,.22)',tc:'#fde68a'},
    {grade:'C', min:55,max:64, color:'rgba(245,158,11,.18)',tc:'#fef08a'},
    {grade:'D', min:45,max:54, color:'rgba(249,115,22,.22)',tc:'#fdba74'},
    {grade:'F', min:0, max:44, color:'rgba(239,68,68,.22)', tc:'#fca5a5'}
  ];
  grades.forEach(function(g){
    var cnt=tots.filter(function(t){return t.total>=g.min&&t.total<=g.max;}).length;
    g.count=cnt; g.pct=n>0?Math.round((cnt/n)*100):0; g.range=g.min+'–'+g.max+'%';
  });
  return grades;
}

function getAdj(partId,tp){

  return t[Math.floor(Math.random()*t.length)]||'Provide additional practice for this skill.';

function calcWeaknessReport(subs,cfg){
  var report=[];
  cfg.parts.forEach(function(part){
    part.secs.forEach(function(sec){
      sec.qs.forEach(function(q){
        if(!q.mx||(q.tp!=='mcq'&&q.tp!=='fill')) return;
        var n=subs.length;
        var correct=subs.filter(function(s){return s.aS&&s.aS[q.id]===q.mx;}).length;
        report.push({
          part:part.lbl+': '+part.ttl, partId:part.id, sec:sec.ttl, qn:q.n,
          qtext:q.tx.slice(0,60)+(q.tx.length>60?'…':''),
          tp:q.tp, skill:(SKILL_MAP[q.tp]||{skill:''}).skill,
          level:(SKILL_MAP[q.tp]||{level:''}).level,
          pct:n>0?Math.round((correct/n)*100):0, correct:correct, total:n
        });
      });
    });
  });
  return report.sort(function(a,b){return a.pct-b.pct;});
}

var _idb = null;

function openIDB(cb){
  if(_idb){ cb(_idb); return; }
  var req = indexedDB.open("msa_audio_db", 1);
  req.onupgradeneeded = function(e){
    e.target.result.createObjectStore("audio", {keyPath:"key"});
  };
  req.onsuccess = function(e){ _idb = e.target.result; cb(_idb); };
  req.onerror   = function(){ cb(null); };
}


// ── Audio metadata tracker (never lost on re-render) ──────────────
var _idbMeta = (function(){
  try{
    var s=sessionStorage.getItem("_idbMeta");
    return s?JSON.parse(s):{};
  }catch(e){return{};}
})();

function _idbMetaSet(key,val){
  _idbMeta[key]=val;
  try{sessionStorage.setItem("_idbMeta",JSON.stringify(_idbMeta));}catch(e){}
}
function _idbMetaGet(key){ return _idbMeta[key]||false; }

function idbSaveAudio(key, dataUrl, onDone){
  openIDB(function(db){
    if(!db){ toast("❌ IndexedDB غير متاح", true); return; }
    var tx  = db.transaction("audio","readwrite");
    var st  = tx.objectStore("audio");
    st.put({key:key, data:dataUrl});
    tx.oncomplete = function(){ if(onDone) onDone(); };
    tx.onerror    = function(){ toast("❌ خطأ في الحفظ", true); };
  });
}

function idbGetAudio(key, cb){
  openIDB(function(db){
    if(!db){ cb(null); return; }
    var req = db.transaction("audio","readonly").objectStore("audio").get(key);
    req.onsuccess = function(){ cb(req.result ? req.result.data : null); };
    req.onerror   = function(){ cb(null); };
  });
}

function idbDeleteAudio(key, cb){
  openIDB(function(db){
    if(!db){ if(cb)cb(); return; }
    var tx = db.transaction("audio","readwrite");
    tx.objectStore("audio").delete(key);
    tx.oncomplete = function(){ if(cb)cb(); };
  });
}

// Cache resolved audio so playback is instant
var _audioCache = {};

function getAudioSrc(key, cb){
  if(_audioCache[key]){ cb(_audioCache[key]); return; }
  idbGetAudio(key, function(data){
    if(data){ _audioCache[key]=data; cb(data); }
    else{ cb(key==="a1"?A1:A2); }  // fallback to embedded
  });
}

function hasCustomAudio(key, cb){
  idbGetAudio(key, function(data){ cb(!!data); });
}

var _vk="msa_versions",_mx=20;
function saveVersion(l){
 var cfg=gcfg();
 var themeSnap=null;try{themeSnap=localStorage.getItem("msa_theme");}catch(e){}
 try{
  var vv=JSON.parse(localStorage.getItem(_vk)||"[]");
  vv.unshift({ts:Date.now(),label:l||("Save "+new Date().toLocaleTimeString()),cfg:JSON.stringify(cfg),theme:themeSnap});
  if(vv.length>_mx)vv=vv.slice(0,_mx);
  localStorage.setItem(_vk,JSON.stringify(vv));
  toast("✅ Version saved!");
 }catch(e){toast("Save failed",true);}
}
function getVersions(){try{return JSON.parse(localStorage.getItem(_vk)||"[]");}catch(e){return[];}}

 var vv=getVersions();if(!vv[i])return;
 if(!window.confirm("Restore version: \""+vv[i].label+"\"?\n\nThis will restore the exam content and color theme."))return;
 try{
  scfg(JSON.parse(vv[i].cfg));
  if(vv[i].theme){try{localStorage.setItem("msa_theme",vv[i].theme);loadSavedTheme();}catch(e){}}
  toast("✅ Restored: "+vv[i].label);render();
 }catch(e){toast("❌ Restore failed",true);}
}
function deleteVersion(i){

    var bodyId = 'stuWeakBody-'+sub.id;

      + '<div class="gc" id="stuWeakCard-'+sub.id+'" style="margin-bottom:13px;">'
      +   '<div class="gh stu-weak-toggle" data-target="'+bodyId+'" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;">'
      +     '<h2>🔍 تحليل نقاط القوة والضعف — '+_esc(sub.name||'')+'</h2>'
      +     '<span class="toggle-ic" style="font-size:14px;color:#94a3b8;">▼</span>'
      +   '</div>'
      +   '<div class="gb" id="'+bodyId+'">'
      +     '<p style="font-size:11px;color:#94a3b8;margin-bottom:10px;">معتمد على أسئلة MCQ و Fill-in التي تُصحح تلقائياً</p>'
      +     '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;">'+skillCards+'</div>'
      +     (weak.length   ? '<div style="font-size:12px;font-weight:700;color:#fca5a5;margin-bottom:8px;">⚠️ نقاط الضعف (أقل من 60%) — '+weak.length+'</div>'+weakHTML : '')
      +     (ok.length     ? '<div style="font-size:12px;font-weight:700;color:#fde68a;margin:11px 0 8px;">⚖️ متوسط (60% – 79%) — '+ok.length+'</div>'+okHTML : '')
      +     (strong.length ? '<div style="font-size:12px;font-weight:700;color:#a7f3d0;margin:11px 0 8px;">✅ نقاط القوة (80% فأكثر) — '+strong.length+'</div>'+strongHTML : '')

  function injectPerStudentWeakness(){
    try{
      if(typeof S==='undefined' || !S || !S.viewSub) return;
      if(document.getElementById('stuWeakCard-'+S.viewSub)) return;
      var card = document.getElementById('student-card-'+S.viewSub);
      if(!card) return;
      var subs = (typeof gsubs==='function') ? gsubs() : [];
      var sub = subs.find(function(s){return s.id===S.viewSub;});
      if(!sub) return;
      var cfg = (typeof gcfg==='function') ? gcfg() : null;
      if(!cfg) return;
      var html = renderStudentWeaknessHTML(sub, cfg);
      if(!html) return;
      var wrap = document.createElement('div');
      wrap.innerHTML = html;
      var el = wrap.firstChild;
      card.parentNode.insertBefore(el, card.nextSibling);
    }catch(e){ console.warn('injectPerStudentWeakness',e); }

  function makeOverallWeaknessCollapsible(){
    try{
      document.querySelectorAll('.gc .gh h2').forEach(function(h){
        var txt = (h.textContent||'');
        if(txt.indexOf('Skills & Weakness Analysis')<0
           && txt.indexOf('Grade Distribution')<0
           && txt.indexOf('CEFR Level Distribution')<0) return;
        var gh = h.parentElement;
        var gc = gh && gh.closest && gh.closest('.gc');
        if(!gc || gc._collapsibleAdded) return;
        var gb = gc.querySelector('.gb');
        if(!gb) return;
        gc._collapsibleAdded = true;
        gh.style.cursor = 'pointer';
        gh.style.display = 'flex';
        gh.style.alignItems = 'center';
        gh.style.justifyContent = 'space-between';

          var ic = document.createElement('span');
          ic.className = 'toggle-ic';
          ic.style.cssText = 'font-size:14px;color:#94a3b8;margin-left:auto;padding-left:8px;';
          ic.textContent = '▼';
          gh.appendChild(ic);
        }
        gh.addEventListener('click', function(ev){
          var tg = ev.target;
          if(tg.tagName==='BUTTON' || tg.tagName==='INPUT' || tg.tagName==='SELECT' || tg.tagName==='A') return;
          var ic2 = gh.querySelector('.toggle-ic');
          if(gb.style.display==='none'){ gb.style.display=''; if(ic2) ic2.textContent='▼'; }
          else { gb.style.display='none'; if(ic2) ic2.textContent='▶'; }
        });
