.img-instr-edit{margin-top:8px;padding:8px 10px;background:rgba(99,102,241,.06);border:1px dashed rgba(99,102,241,.25);border-radius:6px;}
.img-instr-edit .head{font-size:10px;font-weight:700;color:#a5b4fc;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.img-instr-edit .row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.img-instr-edit .row .num{font-size:10px;font-weight:700;color:#818cf8;min-width:18px;text-align:right;}
.img-instr-edit .row input{flex:1;padding:5px 8px;font-size:11px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:#f1f5f9;font-family:inherit;}
.img-instr-edit .row button{padding:3px 7px;font-size:10px;}
.img-instr-edit .add{display:flex;gap:5px;margin-top:6px;}
.img-instr-edit .add input{flex:1;padding:5px 8px;font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;color:#f1f5f9;}
</style>

<script id="patch-v9-js">
(function(){
  'use strict';
  if(window.__patchV9Installed) return;
  window.__patchV9Installed = true;

  // ════════════════════════════════════════════════════════════════════
  // 1) PERMANENT DELETE — blacklist that survives Supabase re-sync
  // ════════════════════════════════════════════════════════════════════
  var BLK_KEY = 'msa_deleted_ids';
  function getBlacklist(){
    try{return JSON.parse(localStorage.getItem(BLK_KEY)||'[]');}catch(e){return [];}
  }
  function addToBlacklist(id){
    if(!id) return;
    var b = getBlacklist();
    if(b.indexOf(id) === -1){ b.push(String(id)); }
    try{localStorage.setItem(BLK_KEY, JSON.stringify(b));}catch(e){}
  }
  window.getDeletedBlacklist = getBlacklist;

  // Strip blacklisted ids from local store every 1.5s — beats any
  // Supabase realtime push that re-introduces a deleted record.
  function _stripBlacklisted(){
    try{
      var b = getBlacklist(); if(!b.length) return;
      var raw = localStorage.getItem('msa_s'); if(!raw) return;
      var arr = JSON.parse(raw); if(!Array.isArray(arr)) return;
      var before = arr.length;
      arr = arr.filter(function(s){
        if(!s) return false;
        var sid = String(s.id||'');
        var stid = String(s.studentId||s.sid||'');
        if(b.indexOf(sid)>=0) return false;
        if(stid && b.indexOf(stid)>=0) return false;
        return true;
      });
      if(arr.length !== before){
        localStorage.setItem('msa_s', JSON.stringify(arr));
        if(typeof S!=='undefined' && S && S.view==='results' && typeof render==='function') render();
      }
    }catch(e){}
  }
  setInterval(_stripBlacklisted, 1500);

  // permanentDeleteStudent — blacklist + delete from Supabase by all keys
  window.permanentDeleteStudent = function(subId, studentId, name){
    if(!subId && !studentId) return false;
    var label = name ? (name+' (#'+(studentId||subId)+')') : (studentId||subId);
    if(!window.confirm('🚨 PERMANENT delete:\n\n'+label+
      '\n\nThis blacklists the ID so it cannot reappear from cloud sync.\n\nProceed?')) return false;

    if(subId)     addToBlacklist(subId);
    if(studentId) addToBlacklist(studentId);

    // local
    try{
      var raw = localStorage.getItem('msa_s')||'[]';
      var arr = JSON.parse(raw);
      arr = arr.filter(function(s){
        if(!s) return false;
        if(subId && s.id===subId) return false;
        if(studentId && (s.studentId===studentId || s.sid===studentId)) return false;
        return true;
      });
      localStorage.setItem('msa_s', JSON.stringify(arr));
    }catch(e){}

    // Supabase — best-effort by every plausible key column
    try{
      var sc = (typeof getSupaClient==='function') ? getSupaClient() : null;
      if(sc){
        if(subId){
          sc.from('submissions').delete().eq('id', subId).then(function(){}).catch(function(){});
        }
        if(studentId){
          // v29: submissions table only has id column
          try{ sc.from('submissions').delete().eq('id', studentId).then(function(){}).catch(function(){}); }catch(e){}
          try{ sc.from('speaking_requests').delete().eq('student_id', studentId).then(function(){}).catch(function(){}); }catch(e){}
        }
      }
    }catch(e){}

    if(typeof toast==='function') toast('🗑️ Permanently deleted — blacklist updated');
    if(typeof S!=='undefined' && S){ S.viewSub = null; }
    if(typeof render==='function') render();
    return true;
  };

  // Add a "🚫 Erase Permanently" button next to every delete button on the
  // results screen. Idempotent — only adds where not yet present.
  function _injectPermDelButtons(){
    try{
      if(typeof S==='undefined' || !S || S.view!=='results') return;
      var rows = document.querySelectorAll('[data-sub-id], [data-subid], tr[data-id]');
      // Fallback: locate via existing delete buttons
      var dels = document.querySelectorAll('button[onclick*="deleteStudentRecord"], .btn-delete-student, [data-delete-student]');
      dels.forEach(function(btn){
        if(btn.dataset.permWired==='1') return;
        btn.dataset.permWired='1';
        // Try to extract the subId from inline onclick
        var m = (btn.getAttribute('onclick')||'').match(/deleteStudentRecord\(['"]([^'"]+)['"]\s*,\s*['"]?([^'"\)]*)/);
        var subId = m ? m[1] : (btn.getAttribute('data-sub-id')||btn.getAttribute('data-id')||'');
        var nm    = m ? m[2] : '';
        if(!subId) return;
        // figure out studentId from local store
        var stid = '';
        try{
          var arr = JSON.parse(localStorage.getItem('msa_s')||'[]');
          var found = arr.find(function(s){return s && s.id===subId;});
          if(found) stid = found.studentId || found.sid || '';
        }catch(e){}
        var perm = document.createElement('button');
        perm.type='button';
        perm.className='btn br bsm';
        perm.style.cssText='margin-left:4px;font-size:10px;padding:3px 7px;background:#7f1d1d;border-color:#991b1b;';
        perm.title='Permanent delete — blacklist this ID so it cannot return from cloud sync';
        perm.textContent='🚫 Erase';
        perm.onclick=function(ev){
          ev.preventDefault(); ev.stopPropagation();
          window.permanentDeleteStudent(subId, stid, nm);
        };
        if(btn.parentNode) btn.parentNode.insertBefore(perm, btn.nextSibling);
      });
    }catch(e){}
  }
  setInterval(_injectPermDelButtons, 1500);

  // Admin button to clear the blacklist (in case something was wrongly nuked)
  window.clearDeleteBlacklist = function(){
    if(!window.confirm('Clear the deletion blacklist? Records previously erased could re-appear from cloud sync.')) return;
    try{localStorage.removeItem(BLK_KEY);}catch(e){}
    if(typeof toast==='function') toast('Blacklist cleared');
    if(typeof render==='function') render();
  };

  // ════════════════════════════════════════════════════════════════════
  // 2) SKILL ACCESS CONTROL — guard every entry point, not just switchTab
  // ════════════════════════════════════════════════════════════════════
  // The original file only checks `isSkillAdminLocked` inside switchTab.
  // Wrap the parts-tab click handler at the DOM level so any path
  // (programmatic, custom button, keyboard) is gated.
  function _isLockedForCurrentUser(partId){
    try{
      // examiner / admin can still browse
      if(typeof S!=='undefined' && S && (S.phase==='admin' || S.phase==='results')) return false;
      return (typeof isSkillAdminLocked==='function') && isSkillAdminLocked(partId);
    }catch(e){return false;}
  }
  document.addEventListener('click', function(ev){
    var t = ev.target.closest('[data-tab-pid], [data-pid], .stab, .skill-tab');
    if(!t) return;
    var pid = t.getAttribute('data-tab-pid') || t.getAttribute('data-pid');
    if(!pid){
      // fallback: parse from inline onclick like switchTab(2)
      var m = (t.getAttribute('onclick')||'').match(/switchTab\((\d+)\)/);
      if(m){
        try{
          var cfg = (typeof gcfg==='function')?gcfg():null;
          if(cfg && cfg.parts && cfg.parts[+m[1]]) pid = cfg.parts[+m[1]].id;
        }catch(e){}
      }
    }
    if(pid && _isLockedForCurrentUser(pid)){
      ev.preventDefault();
      ev.stopPropagation();
      ev.stopImmediatePropagation();
      if(typeof toast==='function') toast('🔒 This skill is locked by the examiner', true);
    }
  }, true); // capture-phase — wins over inline onclicks

  // Also stamp data-tab-pid on rendered tabs so future clicks are caught
  function _stampTabPids(){
    try{
      if(typeof gcfg!=='function') return;
      var cfg = gcfg(); if(!cfg||!cfg.parts) return;
      document.querySelectorAll('[onclick*="switchTab("]').forEach(function(el){
        if(el.dataset.tabPidWired==='1') return;
        var m = (el.getAttribute('onclick')||'').match(/switchTab\((\d+)\)/);
        if(!m) return;
        var p = cfg.parts[+m[1]];
        if(p){ el.setAttribute('data-tab-pid', p.id); el.dataset.tabPidWired='1'; }
      });
    }catch(e){}
  }
  setInterval(_stampTabPids, 1200);

  // Hard-guard the renderer: if the student is currently inside a locked
  // skill (e.g. they were on the page when the lock came in), bounce them.
  setInterval(function(){
    try{
      if(typeof S==='undefined' || !S) return;
      if(S.phase!=='taking') return;
      var cfg = (typeof gcfg==='function')?gcfg():null;
      if(!cfg||!cfg.parts) return;
      var cur = cfg.parts[S.pi]; if(!cur) return;
      if(_isLockedForCurrentUser(cur.id)){
        // find the first non-locked tab and switch to it
        for(var i=0;i<cfg.parts.length;i++){
          if(!_isLockedForCurrentUser(cfg.parts[i].id)){
            if(typeof toast==='function') toast('🔒 Examiner locked this skill — moved to "'+cfg.parts[i].lbl+'"', true);
            S.pi = i; S.si = 0;
            if(typeof render==='function') render();
            return;
          }
        }
      }
    }catch(e){}
  }, 2000);

  // ════════════════════════════════════════════════════════════════════
  // 3) HIGHER-QUALITY UPLOADS — raise MAX_DIM and JPEG quality on _processImage
  //    The original capped at 1000 px / q=0.82, which makes images blurry
  //    once the user zooms. We override to 1800 px / q=0.92.
  // ════════════════════════════════════════════════════════════════════
  try{
    if(typeof window._processImage === 'function' && !window._processImageV9){
      window._processImageV9 = true;
      var _origProc = window._processImage;
      window._processImage = function(file, _a, _b, _c, callback){
        try{
          if(!file || !file.type || !/^image\//.test(file.type)){ return _origProc(file, _a, _b, _c, callback); }
          var MAX_DIM = 1800, Q = 0.92;
          var rdr = new FileReader();
          rdr.onload = function(e){
            var img = new Image();
            img.onload = function(){
              var w = img.naturalWidth, h = img.naturalHeight;
              var sc = Math.min(1, MAX_DIM/Math.max(w,h));
              w = Math.round(w*sc); h = Math.round(h*sc);
              var c = document.createElement('canvas');
              c.width = w; c.height = h;
              var ctx = c.getContext('2d');
              ctx.imageSmoothingEnabled = true;
              ctx.imageSmoothingQuality = 'high';
              ctx.drawImage(img, 0, 0, w, h);
              try{ callback(c.toDataURL('image/jpeg', Q)); }
              catch(err){ _origProc(file, _a, _b, _c, callback); }
            };
            img.onerror = function(){ _origProc(file, _a, _b, _c, callback); };
            img.src = e.target.result;
          };
          rdr.onerror = function(){ _origProc(file, _a, _b, _c, callback); };
          rdr.readAsDataURL(file);
        }catch(err){ _origProc(file, _a, _b, _c, callback); }
      };
    }
  }catch(e){}

  // ════════════════════════════════════════════════════════════════════
  // 4) PER-IMAGE INSTRUCTIONS — admin editor + student renderer
  //    Stored at: cfg.imgs[ <imgKey> + '_instrs' ] = string[]
  //    Rendered next to each section image on the student side.
  // ════════════════════════════════════════════════════════════════════
  function _x(s){
    return String(s==null?'':s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  function getImgInstrs(imgKey){
    try{
      var cfg = gcfg(); var arr = (cfg.imgs||{})[imgKey+'_instrs'];
      return Array.isArray(arr) ? arr : [];
    }catch(e){return [];}
  }
  function setImgInstrs(imgKey, arr){
    try{
      var cfg = gcfg();
      if(!cfg.imgs) cfg.imgs = {};
      cfg.imgs[imgKey+'_instrs'] = Array.isArray(arr) ? arr : [];
      scfg(cfg);
    }catch(e){}
  }
  window.addImgInstr = function(imgKey){
    var inp = document.getElementById('newimginstr-'+imgKey);
    var v = inp ? (inp.value||'').trim() : '';
    if(!v){ if(typeof toast==='function') toast('Type the instruction first',true); return; }
    var arr = getImgInstrs(imgKey); arr.push(v); setImgInstrs(imgKey, arr);
    if(typeof toast==='function') toast('➕ Instruction added');
    if(typeof render==='function') render();
  };
  window.delImgInstr = function(imgKey, ii){
    var arr = getImgInstrs(imgKey); arr.splice(ii,1); setImgInstrs(imgKey, arr);
    if(typeof render==='function') render();
  };
  window.moveImgInstr = function(imgKey, ii, dir){
    var arr = getImgInstrs(imgKey);
    var j = ii + dir; if(j<0||j>=arr.length) return;
    var tmp = arr[ii]; arr[ii] = arr[j]; arr[j] = tmp;
    setImgInstrs(imgKey, arr);
    if(typeof render==='function') render();
  };
  window.saveImgInstrEdits = function(imgKey){
    var arr = getImgInstrs(imgKey);
    var changed = false;
    arr.forEach(function(_, i){
      var el = document.getElementById('eimginstr-'+imgKey+'-'+i);
      if(el && el.value !== arr[i]){ arr[i] = el.value; changed = true; }
    });
    if(changed){ setImgInstrs(imgKey, arr); if(typeof toast==='function') toast('💾 Saved'); }
    else if(typeof toast==='function') toast('Nothing to save');
  };

  // STUDENT-SIDE renderer: locate every image inside the student exam view
  // and render the instruction list right after it.
  function _renderImgInstrsStudent(){
    try{
      if(typeof S==='undefined' || !S) return;
      if(S.phase !== 'taking' && S.view !== 'cover') return;
      var cfg = gcfg(); if(!cfg||!cfg.imgs) return;
      // Walk every <img> that has data-imgkey OR whose src equals one of cfg.imgs values
      var allImgs = document.querySelectorAll('img');
      allImgs.forEach(function(img){
        if(img.dataset.instrWired==='1') return;
        var imgKey = img.getAttribute('data-imgkey');
        if(!imgKey){
          // try matching src to a cfg.imgs slot
          var src = img.getAttribute('src')||'';
          if(!src || src.length < 40) return;
          var keys = Object.keys(cfg.imgs);
          for(var k=0;k<keys.length;k++){
            var key = keys[k];
            if(/_(ctx|ctxA|w|d|instrs)$/.test(key)) continue;
            if(cfg.imgs[key] === src){ imgKey = key; break; }
          }
        }
        if(!imgKey) return;
        var arr = getImgInstrs(imgKey);
        if(!arr.length){ img.dataset.instrWired='1'; return; }
        // Build the box once
        var box = document.createElement('div');
        box.className = 'img-instr-box';
        box.setAttribute('data-img-instr-for', imgKey);
        var html = '<div class="ih">📋 Instructions</div><ol>';
        arr.forEach(function(s){ html += '<li>'+_x(s)+'</li>'; });
        html += '</ol>';
        box.innerHTML = html;
        // Insert after the image's wrapper (or after the image itself)
        var anchor = img.closest('.media-container') || img.closest('.imgb') || img;
        if(anchor.parentNode){
          // avoid dup if already injected
          var nxt = anchor.nextElementSibling;
          if(nxt && nxt.classList && nxt.classList.contains('img-instr-box') && nxt.getAttribute('data-img-instr-for')===imgKey){
            img.dataset.instrWired='1'; return;
          }
          anchor.parentNode.insertBefore(box, anchor.nextSibling);
        }
        img.dataset.instrWired='1';
      });
    }catch(e){}
  }
  // Run on every render + as a safety poll
  setInterval(_renderImgInstrsStudent, 800);

  // ADMIN-SIDE editor: inject the instructions editor under each image
  // shown in the admin "Section Images" panel.
  function _renderImgInstrsAdmin(){
    try{
      if(typeof S==='undefined' || !S) return;
      if(S.view !== 'admin') return;
      // Find admin thumbnails — they sit inside .gb under the Section Images panel.
      // Each thumbnail has an "✕ Remove" button whose onclick contains rmSecImg('img_x_y_z',null)
      var rmBtns = document.querySelectorAll('button[onclick*="rmSecImg("]');
      rmBtns.forEach(function(btn){
        var m = (btn.getAttribute('onclick')||'').match(/rmSecImg\(['"]([^'"]+)['"]/);
        if(!m) return;
        var imgKey = m[1];
        // The container is the row holding the thumbnail and editors
        var row = btn.closest('div[style*="display:flex"]') ||
                  btn.closest('div');
        if(!row) return;
        // Walk up until we reach the per-image card (background:.04)
        var card = row;
        for(var i=0;i<5 && card && card.parentElement;i++){
          if((card.getAttribute('style')||'').indexOf('background:rgba(255,255,255,.04)')>=0) break;
          card = card.parentElement;
        }
        if(!card) card = row;
        if(card.querySelector('.img-instr-edit[data-key="'+imgKey+'"]')) return;
        var arr = getImgInstrs(imgKey);
        var html = '<div class="img-instr-edit" data-key="'+imgKey+'">'
          + '<div class="head"><span>📋 Image Instructions ('+arr.length+')</span>'
          + '<button class="btn bn bsm" style="font-size:9px;padding:2px 6px;" onclick="saveImgInstrEdits(\''+imgKey+'\')">💾</button>'
          + '</div>';
        arr.forEach(function(ins, ii){
          html += '<div class="row">'
            + '<span class="num">'+(ii+1)+'.</span>'
            + '<input type="text" id="eimginstr-'+imgKey+'-'+ii+'" value="'+_x(ins)+'">'
            + '<button class="btn bo bsm" onclick="moveImgInstr(\''+imgKey+'\','+ii+',-1)">↑</button>'
            + '<button class="btn bo bsm" onclick="moveImgInstr(\''+imgKey+'\','+ii+',1)">↓</button>'
            + '<button class="btn br bsm" onclick="delImgInstr(\''+imgKey+'\','+ii+')">✕</button>'
            + '</div>';
        });
        html += '<div class="add">'
          + '<input type="text" id="newimginstr-'+imgKey+'" placeholder="New instruction…" '
          + 'onkeydown="if(event.key===\'Enter\')addImgInstr(\''+imgKey+'\')">'
          + '<button class="btn bgg bsm" onclick="addImgInstr(\''+imgKey+'\')">➕ Add</button>'
          + '</div></div>';
        var wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        card.appendChild(wrapper.firstChild);
      });
    }catch(e){}
  }
  setInterval(_renderImgInstrsAdmin, 1500);

  // ════════════════════════════════════════════════════════════════════
  // 5) Anti-shake belt-and-suspenders: kill willChange/transform spam on
  //    images so layout doesn't oscillate when the page reflows.
  // ════════════════════════════════════════════════════════════════════
  setInterval(function(){
    document.querySelectorAll('img').forEach(function(img){
      if(img.dataset.shakeFixed==='1') return;
      try{
        img.style.transform='none';
        img.style.willChange='auto';
        img.style.backfaceVisibility='visible';
        img.dataset.shakeFixed='1';
      }catch(e){}
    });
  }, 2500);

  console.log('[patch v9: blacklist-delete + lock-hardening + image-quality + per-image-instrs] installed');
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     PATCH v10 — KILL ALL FLICKER AT THE ROOT
     Root causes addressed:
       (a) _rtInt realtime sync calling render() every 5s during exam
       (b) _renderImgInstrsStudent 800ms poll re-injecting DOM nodes
       (c) v9 anti-shake interval mutating img.style every 2.5s
       (d) Render storms — multiple render() calls per second from
           timer ticks / decorate-stats / strip-blacklisted, each
           rebuilding the whole exam DOM from scratch.
     ═══════════════════════════════════════════════════════════════════════ -->
<style id="patch-v10-css">
.qb, .qb *, .media-container, .media-container *, .imgb, .imgb *,
.media-grid, .media-grid *, .img-instr-box, .img-instr-box *{
  animation:none !important;
  transition:none !important;
}
.media-container img, .imgb img, .media-grid img{
  transform:none !important;
  will-change:auto !important;
  backface-visibility:visible !important;
}
.media-container, .imgb{contain:layout style;}
</style>
<script id="patch-v10-js">
(function(){
  'use strict';
  if(window.__patchV10Installed) return;
  window.__patchV10Installed = true;

  function _isTaking(){
    try{ return typeof S!=='undefined' && S && S.phase==='taking'; }catch(e){return false;}
  }

  // 1) Block Supabase realtime sync from re-rendering during exam
  try{
    if(typeof window.startRealtimeSync === 'function'){
      var _origStart = window.startRealtimeSync;
      window.startRealtimeSync = function(){
        if(_isTaking()) return;
        return _origStart.apply(this, arguments);
      };
    }
  }catch(e){}

  // 2) Coalesce render() calls into one per animation frame during exam
  try{
    if(typeof window.render === 'function' && !window.__renderWrappedV10){
      window.__renderWrappedV10 = true;
      var _origRender = window.render;
      var _renderQueued = false;
      var _renderRaf = null;
      window.render = function(){
        var ctx = this, args = arguments;
        if(window.__forceSync){
          try{ return _origRender.apply(ctx, args); }
          finally{ try{ _injectImgInstrsNow(); }catch(e){} }
        }
        if(_isTaking()){
          if(_renderQueued) return;
          _renderQueued = true;
          if(_renderRaf) cancelAnimationFrame(_renderRaf);
          _renderRaf = requestAnimationFrame(function(){
            _renderQueued = false; _renderRaf = null;
            try{ _origRender.apply(ctx, args); }catch(e){}
            try{ _injectImgInstrsNow(); }catch(e){}
          });
          return;
        }
        try{ return _origRender.apply(ctx, args); }
        finally{ try{ _injectImgInstrsNow(); }catch(e){} }
      };
    }
  }catch(e){}

  // 3) One-shot instruction injection — replaces the 800ms poll behavior
  function _x(s){
    return String(s==null?'':s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  function _getCfg(){ try{ return (typeof gcfg==='function')?gcfg():null; }catch(e){return null;} }
  function _injectImgInstrsNow(){
    var cfg = _getCfg(); if(!cfg||!cfg.imgs) return;
    document.querySelectorAll('img').forEach(function(img){
      if(img.dataset.instrWiredV10==='1') return;
      var imgKey = img.getAttribute('data-imgkey');
      if(!imgKey){
        var src = img.getAttribute('src')||'';
        if(!src || src.length < 40) return;
        var keys = Object.keys(cfg.imgs);
        for(var k=0;k<keys.length;k++){
          var key = keys[k];
          if(/_(ctx|ctxA|w|d|instrs)$/.test(key)) continue;
          if(cfg.imgs[key] === src){ imgKey = key; break; }
        }
      }
      if(!imgKey){ img.dataset.instrWiredV10='1'; return; }
      var arr = cfg.imgs[imgKey+'_instrs'];
      if(!Array.isArray(arr) || !arr.length){ img.dataset.instrWiredV10='1'; return; }
      var anchor = img.closest('.media-container') || img.closest('.imgb') || img;
      var nxt = anchor.nextElementSibling;
      if(nxt && nxt.classList && nxt.classList.contains('img-instr-box') &&
         nxt.getAttribute('data-img-instr-for')===imgKey){
        img.dataset.instrWiredV10='1'; return;
      }
      var box = document.createElement('div');
      box.className = 'img-instr-box';
      box.setAttribute('data-img-instr-for', imgKey);
      var html = '<div class="ih">📋 Instructions</div><ol>';
      arr.forEach(function(s){ html += '<li>'+_x(s)+'</li>'; });
      html += '</ol>';
      box.innerHTML = html;
      if(anchor.parentNode){
        anchor.parentNode.insertBefore(box, anchor.nextSibling);
      }
      img.dataset.instrWiredV10='1';
    });
  }

  // 4) Neutralize v9's 800ms img-instructions poll by pre-marking every
  //    image with the v9 marker, so its loop early-exits.
  setInterval(function(){
    try{
      document.querySelectorAll('img[data-instr-wired-v10="1"]').forEach(function(img){
        if(img.dataset.instrWired!=='1') img.dataset.instrWired='1';
      });
    }catch(e){}
  }, 1000);

  // 5) Neutralize v9's 2.5s img-style sweep by pre-marking every image.
  setInterval(function(){
    try{
      document.querySelectorAll('img').forEach(function(img){
        if(img.dataset.shakeFixed!=='1') img.dataset.shakeFixed='1';
      });
    }catch(e){}
  }, 1500);

  // 6) Initial pass
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(_injectImgInstrsNow, 50); });
  } else {
    setTimeout(_injectImgInstrsNow, 50);
  }

  console.log('[patch v10: flicker-killer — render coalesced + polls neutralized] installed');
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════

<style id="patch-v11-css">
/* ── WYSIWYG editor wrapper (replaces textarea visually) ── */
.rt-wrap{display:block;width:100%;}

.rt-edit{min-height:120px;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#f1f5f9;font-family:inherit;font-size:14px;line-height:1.6;outline:none;white-space:pre-wrap;word-break:break-word;overflow-y:auto;}

<script id="patch-v11-js">
(function(){
  'use strict';
  if(window.__patchV11Installed) return;
  window.__patchV11Installed = true;

  // ════════════════════════════════════════════════════════════════
  // (A) WYSIWYG TOOLBAR — bind every answer textarea inside the
  //     student exam to a contentEditable mirror.
  // ════════════════════════════════════════════════════════════════
  // Selectors that mark "answer" textareas in the student exam
  var ANSWER_SELECTORS = [
    'textarea.essa',          // essay / writing
    'textarea.writa',         // extended writing
    'textarea.email-body-area', // email body
    'textarea.fb-textarea',   // facebook post
    'textarea.rv-ta',         // review body
    'textarea[id^="es-"]',    // essay
    'textarea[id^="we-"]',    // writing extended
    'textarea[id^="sp-"]',    // speaking notes
    'textarea[id^="em-body-"]', // email body
    'textarea[id^="fb-"]',    // facebook
    'textarea[id^="wa-"]',    // whatsapp
    'textarea[id^="rvb-"]'    // review body
  ];

  function _isStudentExamCtx(){
    try{
      if(typeof S==='undefined' || !S) return false;
      // Student is taking the exam
      return S.phase==='taking' || S.phase==='speaking';
    }catch(e){return false;}
  }

  function _bindWysiwyg(ta){
    if(!ta || ta.dataset.rtBound==='1') return;
    if(ta.classList.contains('rt-bound')) return;
    // Skip if inside admin/edit area — we only want student exam
    if(ta.closest('.gc') && !_isStudentExamCtx()) return;

    var wrap = document.createElement('div');
    wrap.className = 'rt-wrap';
    wrap.dataset.rtFor = ta.id || '';

    var tb = document.createElement('div');
    tb.className = 'rt-tb';
    tb.innerHTML =
      '<button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>'
    + '<button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>'
    + '<button type="button" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>'
    + '<select data-cmd="fontSize" title="Font size">'
    +   '<option value="">Size</option>'
    +   '<option value="1">Small</option>'
    +   '<option value="3">Normal</option>'
    +   '<option value="4">Large</option>'
    +   '<option value="5">X-Large</option>'
    +   '<option value="6">XX-Large</option>'
    +   '<option value="7">Huge</option>'
    + '</select>'
    + '<button type="button" data-cmd="removeFormat" title="Clear formatting" style="margin-left:auto;">✕ Clear</button>';

    var ed = document.createElement('div');
    ed.className = 'rt-edit';
    ed.contentEditable = 'true';
    ed.spellcheck = true;
    ed.dir = 'auto';
    ed.setAttribute('data-placeholder', ta.getAttribute('placeholder') || '');
    // Seed initial content from textarea — preserve existing answer
    var initial = ta.value || '';
    // Detect if value already contains HTML tags
    if(/<[a-z][\s\S]*>/i.test(initial)){
      ed.innerHTML = initial;
    } else {
      ed.textContent = initial;
    }

    // Match existing textarea sizing
    var minH = parseInt(getComputedStyle(ta).minHeight,10) || 120;
    if(minH > 0) ed.style.minHeight = minH + 'px';

    // Insert wrap into DOM right before the textarea, then move textarea inside
    ta.parentNode.insertBefore(wrap, ta);
    wrap.appendChild(tb);
    wrap.appendChild(ed);
    wrap.appendChild(ta);
    ta.classList.add('rt-bound');
    ta.dataset.rtBound = '1';

    var _syncRaf = null;
    function syncToTextarea(){
      if(_syncRaf) return;
      _syncRaf = requestAnimationFrame(function(){
        _syncRaf = null;
        ta.value = ed.innerHTML;
        try{ ta.dispatchEvent(new Event('input', {bubbles:true})); }catch(e){
          var ev = document.createEvent('Event');
          ev.initEvent('input', true, true);
          ta.dispatchEvent(ev);
        }
      });
    }

    ed.addEventListener('input', syncToTextarea);
    ed.addEventListener('blur', function(){ _syncRaf=null; syncToTextarea(); });

    // Toolbar handlers
    tb.addEventListener('click', function(ev){
      var btn = ev.target.closest('button[data-cmd]');
      if(!btn) return;
      ev.preventDefault();
      ed.focus();
      try{ document.execCommand(btn.getAttribute('data-cmd'), false, null); }catch(e){}
      syncToTextarea();
    });
    tb.addEventListener('change', function(ev){
      var sel = ev.target.closest('select[data-cmd]');
      if(!sel) return;
      var cmd = sel.getAttribute('data-cmd');
      var val = sel.value;
      if(!val) return;
      ed.focus();
      try{ document.execCommand(cmd, false, val); }catch(e){}
      sel.value = '';
      syncToTextarea();
    });

    // Keyboard shortcuts handled by execCommand defaults already in browser,
    // but make sure typing fires sync
    // [v12] removed redundant keyup — input event already syncs
  }

  function _scanAndBind(){
    if(!_isStudentExamCtx()) return;
    var sel = ANSWER_SELECTORS.join(',');
    document.querySelectorAll(sel).forEach(_bindWysiwyg);
  }

  // Bind after each render (the v10 wrapper already calls back; piggy-back)
  // Also poll lightly for late-mounted fields.
  setInterval(_scanAndBind, 1200);
  if(document.readyState !== 'loading') setTimeout(_scanAndBind, 200);
  else document.addEventListener('DOMContentLoaded', function(){ setTimeout(_scanAndBind,200); });

  // ════════════════════════════════════════════════════════════════
  // (B) PER-IMAGE ALIGNMENT — admin editor injects align selector,
  //     student renderer applies data-align to media-container.
  // ════════════════════════════════════════════════════════════════
  function _gcfg(){ try{ return (typeof gcfg==='function')?gcfg():null; }catch(e){return null;} }
  function _scfg(c){ try{ if(typeof scfg==='function') scfg(c); }catch(e){} }

  // Admin: inject alignment selector under each image row
  function _injectAlignAdmin(){
    try{
      if(typeof S==='undefined' || !S || S.view!=='admin') return;
      var cfg = _gcfg(); if(!cfg) return;
      var rmBtns = document.querySelectorAll('button[onclick*="rmSecImg("]');
      rmBtns.forEach(function(btn){
        if(btn.dataset.alignWired==='1') return;
        var m = (btn.getAttribute('onclick')||'').match(/rmSecImg\(['"]([^'"]+)['"]/);
        if(!m) return;
        var imgKey = m[1];
        // Find the per-image card (the .04 background card)
        var card = btn;
        for(var i=0;i<6 && card && card.parentElement;i++){
          if((card.getAttribute && (card.getAttribute('style')||'').indexOf('background:rgba(255,255,255,.04)')>=0)) break;
          card = card.parentElement;
        }
        if(!card) return;
        if(card.querySelector('.img-align-edit[data-key="'+imgKey+'"]')) {
          btn.dataset.alignWired='1';
          return;
        }
        var cur = (cfg.imgs && cfg.imgs[imgKey+'_align']) || 'center';
        var box = document.createElement('div');
        box.className = 'img-align-edit';
        box.setAttribute('data-key', imgKey);
        box.style.cssText = 'margin-top:6px;display:flex;align-items:center;gap:6px;font-size:10px;color:#a5b4fc;';
        box.innerHTML =
            '<span>📐 Position:</span>'
          + '<select data-align-for="'+imgKey+'" '
          +   'style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:#f1f5f9;font-size:11px;padding:3px 6px;">'
          +   '<option value="left"'+(cur==='left'?' selected':'')+'>⬅ Left</option>'
          +   '<option value="center"'+(cur==='center'?' selected':'')+'>⏺ Center</option>'
          +   '<option value="right"'+(cur==='right'?' selected':'')+'>➡ Right</option>'
          + '</select>';
        card.appendChild(box);
        var selEl = box.querySelector('select');
        selEl.addEventListener('change', function(){
          var c = _gcfg(); if(!c) return;
          if(!c.imgs) c.imgs = {};
          c.imgs[imgKey+'_align'] = selEl.value;
          _scfg(c);
          if(typeof toast==='function') toast('📐 Position saved: '+selEl.value);
        });
        btn.dataset.alignWired='1';
      });
    }catch(e){}
  }
  setInterval(_injectAlignAdmin, 1500);

  // Student: apply data-align attribute to each image's container
  function _applyAlignStudent(){
    try{
      var cfg = _gcfg(); if(!cfg||!cfg.imgs) return;
      document.querySelectorAll('img').forEach(function(img){
        if(img.dataset.alignApplied==='1') return;
        var imgKey = img.getAttribute('data-imgkey');
        if(!imgKey){
          var src = img.getAttribute('src')||'';
          if(!src || src.length < 40) return;
          var keys = Object.keys(cfg.imgs);
          for(var k=0;k<keys.length;k++){
            var key = keys[k];
            if(/_(ctx|ctxA|w|d|instrs|align)$/.test(key)) continue;
            if(cfg.imgs[key] === src){ imgKey = key; break; }
          }
        }
        if(!imgKey){ img.dataset.alignApplied='1'; return; }
        var align = cfg.imgs[imgKey+'_align'];
        if(!align){ img.dataset.alignApplied='1'; return; }
        var anchor = img.closest('.media-container') || img.closest('.imgb');
        if(anchor){ anchor.setAttribute('data-align', align); }
        img.dataset.alignApplied='1';
      });
    }catch(e){}
  }
  setInterval(_applyAlignStudent, 1000);

  // ════════════════════════════════════════════════════════════════
  // (C) AUTO-TRIGGER GEMINI for all unscored long-form answers when
  //     the examiner opens a submission detail view.
  // ════════════════════════════════════════════════════════════════
  function _autoAiScoreOnOpen(){
    try{
      if(typeof S==='undefined' || !S) return;
      if(S.view !== 'results') return;
      if(!S.viewSub) return;
      if(typeof window.runAIScore !== 'function') return;
      if(typeof gsubs !== 'function' || typeof gcfg !== 'function') return;
      var subs = gsubs(); var sub = subs.find(function(s){return s.id===S.viewSub;});
      if(!sub) return;
      // Avoid re-firing for the same sub repeatedly
      if(window.__aiAutoFired && window.__aiAutoFired[S.viewSub]) return;
      var cfg = gcfg();
      var pending = [];
      cfg.parts.forEach(function(p){ p.secs.forEach(function(sec){ sec.qs.forEach(function(q){
        if(['essay','write','email','review','whatsapp','fbpost'].indexOf(q.tp) === -1) return;
        var ans = (sub.ans && sub.ans[q.id]) || '';
        if(typeof ans !== 'string' || ans.replace(/<[^>]+>/g,'').trim().length < 5) return;
        if(sub.aiS && sub.aiS[q.id]) return; // already scored
        pending.push({qid:q.id, mx:q.mx});
      });});});
      if(!pending.length){
        if(!window.__aiAutoFired) window.__aiAutoFired = {};
        window.__aiAutoFired[S.viewSub] = true;
        return;
      }
      // Stagger calls by 1.2s to avoid quota burst
      if(!window.__aiAutoFired) window.__aiAutoFired = {};
      window.__aiAutoFired[S.viewSub] = true;
      pending.forEach(function(item, i){
        setTimeout(function(){
          try{ window.runAIScore(S.viewSub, item.qid, item.mx, null); }catch(e){}
        }, 1200 * i + 400);
      });
      if(typeof toast === 'function') toast('🤖 Auto-scoring '+pending.length+' answers with Gemini…');
    }catch(e){}
  }
  setInterval(_autoAiScoreOnOpen, 2000);

  console.log('[patch v11: WYSIWYG + image align + auto AI score] installed');
})();
</script>


<!-- PATCH v12 — Icon toolbars + Word-style align + anti-jitter -->
<style id="patch-v12-css">
.v12-cap-tb{display:flex;gap:3px;margin-bottom:4px;padding:3px 5px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.18);border-radius:5px;flex-wrap:wrap;align-items:center;}

<script id="patch-v12-js">
(function(){
  "use strict";
  if(window.__patchV12Installed) return;
  window.__patchV12Installed = true;

  function _mkTb(tid, full){
    var tb = document.createElement("div");
    tb.className = "v12-cap-tb";
    var h = '<button type="button" onclick="applyFmt(\x27'+tid+'\x27,\x27**\x27,\x27**\x27)" title="Bold"><b>B</b></button>'
      + '<button type="button" onclick="applyFmt(\x27'+tid+'\x27,\x27*\x27,\x27*\x27)" title="Italic"><i>I</i></button>'
      + '<button type="button" onclick="applyFmt(\x27'+tid+'\x27,\x27__\x27,\x27__\x27)" title="Underline"><u>U</u></button>';
    if(full){
      h += '<button type="button" onclick="applyFmt(\x27'+tid+'\x27,\x27~~\x27,\x27~~\x27)" title="Strikethrough"><s>S</s></button>'
        + '<span class="sep"></span>'
        + '<button type="button" onclick="applyFmt(\x27'+tid+'\x27,\x27==\x27,\x27==\x27)" title="Highlight" style="background:rgba(251,191,36,.12);color:#fbbf24;">H</button>'
        + '<button type="button" onclick="applyFmt(\x27'+tid+'\x27,\x27\x60\x27,\x27\x60\x27)" title="Code" style="font-family:monospace;">&lt;/&gt;</button>';
    }
    tb.innerHTML = h;
    return tb;
  }

  function _injectCaptionToolbars(){
    try{
      if(typeof S==="undefined" || !S || S.view!=="admin") return;
      document.querySelectorAll('textarea[id^="ictx-"],textarea[id^="ictxA-"],textarea[id^="ig-"]').forEach(function(ta){
        if(ta.dataset.v12tb==="1") return; ta.dataset.v12tb="1";
        if(!ta.id) return;
        ta.parentNode.insertBefore(_mkTb(ta.id, true), ta);
      });
      document.querySelectorAll('input[id^="einstr-"],input[id^="ecovins-"],input[id^="eimginstr-"]').forEach(function(inp){
        if(inp.dataset.v12tb==="1") return; inp.dataset.v12tb="1";
        if(!inp.id) return;
        inp.parentNode.insertBefore(_mkTb(inp.id, false), inp);
      });
    }catch(e){}
  }
  setInterval(_injectCaptionToolbars, 1500);

  function _enhanceAlignSelectors(){
    try{
      if(typeof S==="undefined" || !S || S.view!=="admin") return;
      document.querySelectorAll("select[data-align-for]").forEach(function(sel){
        if(sel.dataset.v12enh==="1") return; sel.dataset.v12enh="1";
        if(!sel.querySelector('option[value="float-left"]')){
          var o1=document.createElement("option"); o1.value="float-left"; o1.textContent="\u2B05 Float Left (wrap)";
          sel.appendChild(o1);
          var o2=document.createElement("option"); o2.value="float-right"; o2.textContent="\u27A1 Float Right (wrap)";
          sel.appendChild(o2);
          try{ var cfg=(typeof gcfg==="function")?gcfg():null;
            if(cfg&&cfg.imgs){ var key=sel.getAttribute("data-align-for"); sel.value=cfg.imgs[key+"_align"]||"center"; }
          }catch(e){}
        }
      });
    }catch(e){}
  }
  setInterval(_enhanceAlignSelectors, 2000);

  function _cleanOldTips(){ document.querySelectorAll(".v6-fmt-tip").forEach(function(el){el.remove();}); }
  setTimeout(_cleanOldTips, 500); setTimeout(_cleanOldTips, 2000);

  function _premarkImages(){
    document.querySelectorAll("img").forEach(function(img){
      if(!img.dataset.shakeFixed) img.dataset.shakeFixed="1";
      if(!img.dataset.instrWired) img.dataset.instrWired="1";
    });
  }
  try{
    if(typeof window.render==="function" && !window.__renderWrappedV12){
      window.__renderWrappedV12=true;
      var _origR12=window.render;
      window.render=function(){ var r=_origR12.apply(this,arguments); setTimeout(_premarkImages,50); return r; };
    }
  }catch(e){}

  if(typeof window.applyFmt==="function" && !window.__applyFmtV12){
    window.__applyFmtV12=true;
    window.applyFmt=function(tid,open,close){
      var el=document.getElementById(tid); if(!el) return;
      var s=el.selectionStart,e=el.selectionEnd;
      if(s===undefined) return;
      var sel=el.value.substring(s,e);
      el.value=el.value.substring(0,s)+open+sel+close+el.value.substring(e);
      el.selectionStart=s+open.length; el.selectionEnd=s+open.length+sel.length;
      el.focus();
    };
  }

  console.log("[patch v12: icon toolbars + word-style align + anti-jitter] installed");
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════

/* ──────────────────────────────────────────────────────────────────
   DROPDOWN CONTRAST FIX — match site dark theme
   Forces every <select> popup to use the site's dark navy palette
   (background:#1e293b slate-800, text:#f1f5f9 slate-100) so menu
   items have proper contrast and never inherit OS dark/light mode.
   ────────────────────────────────────────────────────────────────── */
select{
  color-scheme: dark !important;
}
select option,
select optgroup{
  background-color: #1e293b !important;   /* slate-800 — site card tone */
  color: #f1f5f9 !important;               /* slate-100 — site text */
  -webkit-text-fill-color: #f1f5f9 !important;
}
select option:checked,
select option:hover,

  -webkit-text-fill-color: #64748b !important;

    -webkit-text-fill-color: #f1f5f9 !important;

<script id="patch-v13-js">
(function(){
  "use strict";
  if(window.__patchV13Installed) return;
  window.__patchV13Installed = true;

  // ──────────────────────────────────────────────────────────────────
  // (A) HIDE "Text BELOW image (caption)" admin field
  //     The function is merged into Image Instructions (eimginstr-*).
  // ──────────────────────────────────────────────────────────────────
  function _hideBelowImageField(){
    try{
      if(typeof S==="undefined" || !S || S.view!=="admin") return;
      document.querySelectorAll('textarea[id^="ictx-"]').forEach(function(ta){
        var fg = ta.closest(".fg");
        if(!fg) return;
        var lbl = fg.querySelector("label");
        if(lbl && /BELOW image/i.test(lbl.textContent || "")){
          fg.classList.add("v13-hide-below");
        }
      });
    }catch(e){}
  }
  setInterval(_hideBelowImageField, 1500);

  // ──────────────────────────────────────────────────────────────────
  // (B) ↑ / ↓ arrows for skill-level instructions (einstr-pi-ii)
  //     The original renderer at line 4085 only has ✕ Delete.
  // ──────────────────────────────────────────────────────────────────
  window.moveInstr = function(pi, ii, dir){
    try{
      if(typeof gcfg!=="function" || typeof scfg!=="function") return;
      // Persist any unsaved edits in the matching part's inputs first
      var cfg = gcfg();
      if(!cfg.parts || !cfg.parts[pi] || !cfg.parts[pi].instr) return;
      var inputs = document.querySelectorAll('input[id^="einstr-'+pi+'-"]');
      if(inputs.length){
        var arr = [];
        inputs.forEach(function(el){
          var v = (el.value || "").trim();
          if(v) arr.push(v);
        });
        cfg.parts[pi].instr = arr;
      }
      var list = cfg.parts[pi].instr;
      var ni = ii + dir;
      if(ni < 0 || ni >= list.length) return;
      var tmp = list[ii]; list[ii] = list[ni]; list[ni] = tmp;
      scfg(cfg);
      if(typeof render==="function") render();
    }catch(e){ console.warn("moveInstr",e); }
  };

  function _injectInstrArrows(){
    try{
      if(typeof S==="undefined" || !S || S.view!=="admin") return;
      document.querySelectorAll('input[id^="einstr-"]').forEach(function(inp){
        if(inp.dataset.v13arrows==="1") return;
        // Parse pi/ii from id "einstr-PI-II"
        var m = inp.id.match(/^einstr-(\d+)-(\d+)$/);
        if(!m) return;
        var pi = m[1], ii = m[2];
        // Insert ↑ / ↓ buttons right before the delete (✕) button
        var row = inp.parentElement; if(!row) return;
        var delBtn = row.querySelector('button.br');
        if(!delBtn) return;
        var up = document.createElement("button");
        up.type="button";
        up.className="btn bo bsm v13-mv";
        up.textContent="↑";
        up.setAttribute("onclick","moveInstr("+pi+","+ii+",-1)");
        var dn = document.createElement("button");
        dn.type="button";
        dn.className="btn bo bsm v13-mv";
        dn.textContent="↓";
        dn.setAttribute("onclick","moveInstr("+pi+","+ii+",1)");
        row.insertBefore(up, delBtn);
        row.insertBefore(dn, delBtn);
        inp.dataset.v13arrows="1";
      });
    }catch(e){}
  }
  setInterval(_injectInstrArrows, 1500);

  // ──────────────────────────────────────────────────────────────────
  // (C) Stable Speaking Access Control — patch refreshSpeakingPanel so
  //     it only swaps the .gb innerHTML instead of replacing the whole
  //     panel; this kills the layout-shift "shake" entirely.
  // ──────────────────────────────────────────────────────────────────
  try{
    if(typeof window.refreshSpeakingPanel==="function" && !window.__refreshSpStable){
      window.__refreshSpStable = true;
      var _origRefresh = window.refreshSpeakingPanel;
      window.refreshSpeakingPanel = function(){
        try{
          if(typeof sbFetchAllRequests!=="function") return _origRefresh.apply(this, arguments);
          return sbFetchAllRequests().then(function(rows){
            window._sbRequestsCache = rows;
            var panel = document.getElementById("speaking-ctrl-panel");
            if(!panel){
              if(typeof render==="function") render();
              return;
            }
            // Build the new panel HTML and swap only the inner .gb body
            if(typeof rSpeakingControl!=="function") return;
            var tmp = document.createElement("div");
            tmp.innerHTML = rSpeakingControl();
            var newPanel = tmp.firstElementChild;
            if(!newPanel){ return; }
            var oldBody = panel.querySelector(".gb");
            var newBody = newPanel.querySelector(".gb");
            if(oldBody && newBody){
              oldBody.innerHTML = newBody.innerHTML;
            } else {
              panel.outerHTML = tmp.innerHTML;
            }
          });
        }catch(e){
          return _origRefresh.apply(this, arguments);
        }
      };
    }
  }catch(e){}

  // ──────────────────────────────────────────────────────────────────
  // (D) Hardened cascading delete for student records
  //     Override deleteStudentRecord with a version that:
  //       1. Removes from localStorage 'msa_s' (submissions)
  //       2. Removes from Supabase submissions
  //       3. Cleans lobby + grants + audit traces
  //       4. Strips the row from the DOM immediately (no ghost data)
  //       5. Recomputes statistics by forcing a full render()
  // ──────────────────────────────────────────────────────────────────
  function _v13DeleteStudent(subId, name){
    if(!subId) return;
    var label = name ? (name+" (ID: "+subId+")") : ("ID: "+subId);
    if(!window.confirm("هل أنت متأكد من حذف هذا الطالب؟\n\n"+label+"\n\nسيتم حذف كل سجلاته وتواجده في الإحصائيات نهائياً ولا يمكن التراجع.")) return;

    var removedCount = 0;
    try{
      // 1) Submissions
      var raw = localStorage.getItem("msa_s");
      var subs = raw ? JSON.parse(raw) : [];
      if(!Array.isArray(subs)) subs = [];
      var before = subs.length;
      subs = subs.filter(function(s){ return !s || s.id !== subId; });
      removedCount = before - subs.length;
      localStorage.setItem("msa_s", JSON.stringify(subs));
    }catch(e){ console.warn("[v13 del:subs]",e); }

    // 2) Lobby + grants (legacy)
    try{
      var lo = JSON.parse(localStorage.getItem("msa_lobby")||"{}");
      if(lo[subId]){ delete lo[subId]; localStorage.setItem("msa_lobby", JSON.stringify(lo)); }
    }catch(e){}
    try{
      var gr = JSON.parse(localStorage.getItem("msa_sp_grants")||"{}");
      if(gr[subId]){ delete gr[subId]; localStorage.setItem("msa_sp_grants", JSON.stringify(gr)); }
    }catch(e){}

    // 3) Audit log entries (best effort)
    try{
      var au = JSON.parse(localStorage.getItem("msa_audit")||"[]");
      if(Array.isArray(au)){
        au = au.filter(function(e){
          if(!e || !e.data) return true;
          var sid = e.data.sid || e.data.id || "";
          return sid !== subId;
        });
        localStorage.setItem("msa_audit", JSON.stringify(au));
      }
    }catch(e){}

    // 4) Supabase: submissions + speaking_requests
    try{
      if(typeof getSupaClient==="function"){
        var sc = getSupaClient();
        if(sc){
          try{ sc.from("submissions").delete().eq("id", subId).then(function(){}); }catch(e){}
          try{ sc.from("speaking_requests").delete().eq("student_id", subId).then(function(){}); }catch(e){}
        }
      }
    }catch(e){}

    // 5) Strip the DOM row immediately so the user sees instant feedback
    try{
      document.querySelectorAll('tr,div').forEach(function(node){
        var btn = node.querySelector && node.querySelector('button[onclick*="'+subId+'"]');
        if(btn && (node.tagName==="TR" || (node.className||"").indexOf("res-row")>=0)){
          node.classList.add("v13-removed");
        }
      });
    }catch(e){}

    if(typeof toast==="function") toast("🗑 تم حذف الطالب بالكامل ("+ removedCount +" record)");

    // 6) Force statistics recompute via full re-render
    setTimeout(function(){
      try{
        if(typeof S!=="undefined" && S){ S.viewSub = null; }
        if(typeof window.__renderQueued==="boolean") window.__renderQueued = false;
        if(typeof render==="function") render();
      }catch(e){ console.warn("[v13 del:render]",e); }
    }, 60);
  }
  // Install the override (and re-install if some later script overwrites it)
  window.deleteStudentRecord = _v13DeleteStudent;
  setInterval(function(){
    if(window.deleteStudentRecord !== _v13DeleteStudent){
      window.deleteStudentRecord = _v13DeleteStudent;
    }
  }, 4000);

  // ──────────────────────────────────────────────────────────────────
  // (E) Make sure cover and image instruction inputs ALSO get B/I/U
  //     buttons via v12's _injectCaptionToolbars — already wired, but
  //     also bind them in the destroy & re-create case.
  // ──────────────────────────────────────────────────────────────────
  // (handled by v12 already — no-op here, just left as documentation)

  console.log("[patch v13: instr arrows + hide below-image + stable speaking panel + cascading delete] installed");
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     PATCH v14 — PER-FIELD TEXT-SIZE CONTROL
     Adds a small font-size selector inside every formatting toolbar
     (next to B / I / U) for per-section / per-instruction / per-image-
     caption / per-question fields. Each field's size is remembered
     individually in localStorage by its element id.
     ═══════════════════════════════════════════════════════════════════════ -->
<style id="patch-v14-css">
.v14-fs-sel{
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.14);
  color: #e2e8f0;
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 4px;
  font-family: inherit;
  cursor: pointer;
  height: 24px;
  line-height: 1;
  margin-left: 4px;
  min-width: 64px;
}
.v14-fs-sel:hover{ border-color:#6366f1; background: rgba(99,102,241,.18); }
.v14-fs-sel:focus{ outline: 2px solid rgba(99,102,241,.45); outline-offset: 1px; }
.v14-fs-lbl{
  font-size: 9px;
  color: #94a3b8;
  margin-left: 2px;
  align-self: center;
}
</style>
<script id="patch-v14-js">
(function(){
  "use strict";
  if(window.__patchV14Installed) return;
  window.__patchV14Installed = true;

  var STORE_KEY = "msa_field_font_sizes";
  var DEFAULT_SIZE = "";   // empty = use stylesheet default
  var SIZES = ["", "11", "12", "13", "14", "15", "16", "18", "20", "22", "24", "26", "28", "32"];

  function loadMap(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      var obj = raw ? JSON.parse(raw) : {};
      return (obj && typeof obj === "object") ? obj : {};
    }catch(e){ return {}; }
  }
  function saveMap(map){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(map)); }catch(e){}
  }
  function applySize(el, px){
    if(!el) return;
    if(px && /^\d+$/.test(String(px))){
      el.style.setProperty("font-size", px + "px", "important");
      el.style.setProperty("line-height", "1.55", "important");
    } else {
      el.style.removeProperty("font-size");
      el.style.removeProperty("line-height");
    }
  }

  // Apply persisted sizes to every known field — call after each render.
  function applyAll(){
    var map = loadMap();
    Object.keys(map).forEach(function(id){
      var el = document.getElementById(id);
      if(el) applySize(el, map[id]);
    });
  }

  function buildSelect(targetId){
    var map = loadMap();
    var cur = map[targetId] || "";
    var sel = document.createElement("select");
    sel.className = "v14-fs-sel";
    sel.title = "Font size for this field";
    sel.setAttribute("data-fs-for", targetId);
    SIZES.forEach(function(sz){
      var opt = document.createElement("option");
      opt.value = sz;
      opt.textContent = sz === "" ? "Size" : (sz + "px");
      if(sz === cur) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener("change", function(){
      var m = loadMap();
      var v = sel.value;
      if(v) m[targetId] = v;
      else delete m[targetId];
      saveMap(m);
      var t = document.getElementById(targetId);
      applySize(t, v);
    });
    sel.addEventListener("click", function(ev){ ev.stopPropagation(); });
    return sel;
  }

  // Inject font-size selector into every v12 caption / instruction toolbar.
  function injectIntoToolbars(){
    try{
      document.querySelectorAll(".v12-cap-tb").forEach(function(tb){
        if(tb.dataset.v14fs === "1") return;
        // Find the field this toolbar belongs to — it's the next sibling
        // (input or textarea), or any sibling with id matching v12 pattern.
        var target = tb.nextElementSibling;
        if(!target || !target.id){
          // walk forward — sometimes there's a wrapping element
          var n = tb.parentElement;
          if(n){
            target = n.querySelector(
              'input[id^="einstr-"],input[id^="ecovins-"],input[id^="eimginstr-"],'
              +'textarea[id^="ictx-"],textarea[id^="ictxA-"],textarea[id^="ig-"]');
          }
        }
        if(!target || !target.id) return;
        // Append a separator + label + size selector at the end of the toolbar
        var sep = document.createElement("span");
        sep.className = "sep";
        var lbl = document.createElement("span");
        lbl.className = "v14-fs-lbl";
        lbl.textContent = "🔠";
        var sel = buildSelect(target.id);
        tb.appendChild(sep);
        tb.appendChild(lbl);
        tb.appendChild(sel);
        tb.dataset.v14fs = "1";
        // Apply current size if any
        var m = loadMap();
        if(m[target.id]) applySize(target, m[target.id]);
      });
    }catch(e){}
  }

  // ── Inject font-size selector into the WYSIWYG (.rt-tb) toolbars
  //    used for student answer textareas. They already have a size
  //    select but it only changes inline — we add a per-field
  //    persistent option that works on the textarea itself too.
  function injectIntoRtToolbars(){
    try{
      document.querySelectorAll(".rt-tb").forEach(function(tb){
        if(tb.dataset.v14fs === "1") return;
        var wrap = tb.closest(".rt-wrap");
        if(!wrap) return;
        var ed = wrap.querySelector(".rt-edit");
        var ta = wrap.querySelector("textarea.rt-bound");
        var target = ed || ta;
        if(!target) return;
        // Use textarea id as the key (more stable than the editable div)
        var keyId = ta && ta.id ? ta.id : (ed && ed.id ? ed.id : null);
        if(!keyId){
          if(ed && !ed.id){ ed.id = "rt-ed-" + Math.random().toString(36).slice(2,9); }
          keyId = ed.id;
        }
        var sep = document.createElement("span");
        sep.style.cssText = "width:1px;height:14px;background:rgba(255,255,255,.12);margin:0 4px;";
        var lbl = document.createElement("span");
        lbl.className = "v14-fs-lbl";
        lbl.textContent = "🔠";
        var sel = document.createElement("select");
        sel.className = "v14-fs-sel";
        sel.title = "Font size for this field";
        SIZES.forEach(function(sz){
          var opt = document.createElement("option");
          opt.value = sz;
          opt.textContent = sz === "" ? "Size" : (sz + "px");
          sel.appendChild(opt);
        });
        var map = loadMap();
        var cur = map[keyId] || "";
        if(cur) sel.value = cur;
        sel.addEventListener("change", function(){
          var m = loadMap();
          var v = sel.value;
          if(v) m[keyId] = v; else delete m[keyId];
          saveMap(m);
          if(ed) applySize(ed, v);
          if(ta) applySize(ta, v);
        });
        sel.addEventListener("click", function(ev){ ev.stopPropagation(); });
        tb.appendChild(sep);
        tb.appendChild(lbl);
        tb.appendChild(sel);
        tb.dataset.v14fs = "1";
        if(cur){
          if(ed) applySize(ed, cur);
          if(ta) applySize(ta, cur);
        }
      });
    }catch(e){}
  }

  function tick(){
    injectIntoToolbars();
    injectIntoRtToolbars();
    applyAll();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", function(){ setTimeout(tick, 200); });
  } else {
    setTimeout(tick, 200);
  }
  setInterval(tick, 1500);

  // Remove the legacy floating widget if it exists from older v14 install
  setInterval(function(){
    var old = document.getElementById("v14-fs-widget");
    if(old) old.remove();
  }, 2000);

  console.log("[patch v14: per-field text-size control] installed");
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     PATCH v15 — User-requested fixes (2026-04-28)
     1) Make Writing/Email body text DARK (so examiner can read it)
     2) Remove "Assessed by Examiner" speaking option (Self-Record only)
     3) Limit Speaking re-records to 2 attempts (anti-cheat)
     4) Open Gmail compose (from shahd's address) when admin clicks student email
     5) One-time wipe of all submissions/stats (zero everything until new students)
     ═══════════════════════════════════════════════════════════════════════ -->
<style id="patch-v15-css">

       The contentEditable mirror (.rt-edit) is bound to em-body-* textareas.

}
</style>
<script id="patch-v15-js">
(function(){
  "use strict";
  if(window.__patchV15Installed) return;
  window.__patchV15Installed = true;

  // ── (5) One-time wipe of all student submissions/stats ──────────────
  // Bumping the version key re-runs the wipe. Clears submissions + drafts
  // + audit log + lobby/grants/locks so admin shows ZERO students and
  // averages = 0. Future students added after this load are counted normally.
  var V15_RESET_KEY = "msa_v15_reset_2026_04_28";
  try{
    if(!localStorage.getItem(V15_RESET_KEY)){
      ["msa_s","msa_draft","msa_fb_cache",
       "msa_lobby","msa_grants","msa_skill_locks","msa_speaking_global",
       "msa_audit","msa_timer_live"].forEach(function(k){
        try{ localStorage.removeItem(k); }catch(e){}
      });
      // Also remove any keys that look like recordings/attempts caches
      try{
        for(var i=localStorage.length-1;i>=0;i--){
          var k=localStorage.key(i);
          if(!k) continue;
          if(/^msa_(takes|akcnt|recording|sub|stat)/i.test(k)) localStorage.removeItem(k);
        }
      }catch(e){}
      localStorage.setItem(V15_RESET_KEY,"1");
      console.log("[v15] all student data wiped — fresh slate");
    }
  }catch(e){}

  // ── (4) Gmail compose helper for student-email cells ────────────────
  // Sender: primary shahd.mohamed33@msa.edu.eg, fallback shahdmohamed25042004@gmail.com.
  // We rewrite mailto: links inside the admin results table to open Gmail
  // compose pre-filled with the student as recipient and shahd as sender
  // (Gmail's authuser hint), in a new tab — automatically.
  var SENDER_PRIMARY  = "shahd.mohamed33@msa.edu.eg";
  var SENDER_FALLBACK = "shahdmohamed25042004@gmail.com";
  function _gmailCompose(to, subj, body, sender){
    var u = "https://mail.google.com/mail/?view=cm&fs=1"
          + "&authuser=" + encodeURIComponent(sender || SENDER_PRIMARY)
          + "&to="       + encodeURIComponent(to||"");
    if(subj) u += "&su="   + encodeURIComponent(subj);
    if(body) u += "&body=" + encodeURIComponent(body);
    return u;
  }
  window.__openStudentMail = function(to, subj, body){
    var url = _gmailCompose(to, subj||"", body||"", SENDER_PRIMARY);
    var w = window.open(url, "_blank", "noopener");
    if(!w){
      // Pop-up blocked → fall back to mailto with shahd's address as sender hint
      window.location.href = "mailto:"+encodeURIComponent(to||"")
        + "?subject="+encodeURIComponent(subj||"")
        + "&body="+encodeURIComponent((body||"")+"\n\n— Sent by "+SENDER_PRIMARY);
    }
  };
  function _rewriteStudentEmailLinks(){
    document.querySelectorAll('td[data-col="student-email"] a[href^="mailto:"]').forEach(function(a){
      if(a.dataset.v15==="1") return; a.dataset.v15="1";
      var to = (a.getAttribute("href")||"").replace(/^mailto:/,"").split("?")[0];
      try{ to = decodeURIComponent(to); }catch(e){}
      a.setAttribute("href",  _gmailCompose(to, "", "", SENDER_PRIMARY));
      a.setAttribute("target","_blank");
      a.setAttribute("rel",   "noopener");
      a.title = "Open Gmail compose — sender: "+SENDER_PRIMARY;
    });
  }
  setInterval(_rewriteStudentEmailLinks, 1500);

  // ── (4b) When the feedback panel sends, prefer Gmail compose over mailto ──
  // We wrap window.open so any mailto: opened during sendStudentEmail() is
  // upgraded to a Gmail compose URL with shahd as the sender.
  try{
    var _origOpen = window.open;
    window.open = function(u, t, f){
      try{
        if(typeof u==="string" && /^mailto:/i.test(u)){
          var rest = u.replace(/^mailto:/i,"");
          var qIdx = rest.indexOf("?");
          var to   = qIdx<0 ? rest : rest.slice(0,qIdx);
          var qs   = qIdx<0 ? ""   : rest.slice(qIdx+1);
          var subj="", body="";
          qs.split("&").forEach(function(p){
            var kv=p.split("="); if(!kv[0]) return;
            var k=decodeURIComponent(kv[0]||"");
            var v=decodeURIComponent((kv[1]||"").replace(/\+/g," "));
            if(k==="subject") subj=v;
            else if(k==="body") body=v;
          });
          try{ to = decodeURIComponent(to); }catch(e){}
          u = _gmailCompose(to, subj, body, SENDER_PRIMARY);
          t = "_blank";
        }
      }catch(e){}
      return _origOpen.call(window, u, t, f);
    };
  }catch(e){}

  // ── (2) Remove "Assessed by Examiner" + (3) cap re-records at 2 ─────
  // Force speaking mode to "record" whenever it's "choose" or "examiner",
  // and replace confirmReRec with a counter-aware version.
  function _forceRecordMode(){
    try{
      if(typeof S==="undefined" || !S || !S.spMode) return;
      var changed=false;
      Object.keys(S.spMode).forEach(function(k){
        if(S.spMode[k]==="examiner" || S.spMode[k]==="choose"){
          S.spMode[k]="record"; changed=true;
        }
      });
      if(changed && typeof render==="function") render();
    }catch(e){}
  }
  // Patch setSpMode so it always lands on "record"
  if(typeof window.setSpMode==="function" && !window.__setSpModeV15){
    window.__setSpModeV15=true;
    var _origSetSp = window.setSpMode;
    window.setSpMode=function(qid, mode){
      // Block examiner mode entirely; collapse "choose" → "record"
      if(mode==="examiner" || mode==="choose") mode="record";
      return _origSetSp.call(this, qid, mode);
    };
  }

  var MAX_RERECORDS = 2;
  if(!window.__confirmReRecV15){
    window.__confirmReRecV15=true;
    window.confirmReRec = function(qid){
      try{
        if(!S.spReRecCount) S.spReRecCount={};
        var used = S.spReRecCount[qid]||0;
        if(used >= MAX_RERECORDS){
          alert("⚠️ You have used all "+MAX_RERECORDS+" re-record attempts.\nNo more recordings are allowed for this question.");
          return;
        }
        var left = MAX_RERECORDS - used;
        if(window.confirm("Are you sure you want to re-record?\n\nYou have "+left+" attempt"+(left===1?"":"s")+" left.\nYour current recording will be deleted.")){
          S.spReRecCount[qid] = used + 1;
          if(typeof reRec==="function") reRec(qid);
        }
      }catch(e){ console.warn(e); }
    };
  }

  // Periodically scrub any "choose"/"examiner" mode that slipped in
  setInterval(_forceRecordMode, 2000);

  // ── (2b) Hide the "Assessed by Examiner" button if it ever renders ──
  function _hideExaminerBtn(){
    document.querySelectorAll('button.btn.bo').forEach(function(b){
      var t=(b.textContent||"").trim();
      if(/Assessed by Examiner/i.test(t)) b.style.display="none";
    });
  }
  setInterval(_hideExaminerBtn, 1500);

  console.log("[patch v15: writing-color + record-only + rerec-cap-2 + gmail-compose + reset] installed");
})();
</script>

     PATCH v16 — Speaking Section 2: multi-clip recording
     • Section 2 has 3 pictures; student picks 2 → must record 2 clips total.
     • Each clip: independent Start/Stop + up to 2 re-record attempts.
     • Number of clips is editable by admin (cfg.spClipCount[questionId]).
     • Both clips are saved + visible to examiner; nothing else changes.
     ═══════════════════════════════════════════════════════════════════════ -->
<style id="patch-v16-css">
